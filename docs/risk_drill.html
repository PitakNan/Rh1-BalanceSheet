<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สาเหตุวิกฤต — เขตสุขภาพที่ 1</title>
<script>(function(){const t=localStorage.getItem('rh1-theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--mut:#64748b;--line:#e2e8f0;--blue:#3b82f6;--gold:#d97706;--orange:#ea580c;--red:#dc2626;--green:#16a34a;
  --hd1:#0f172a;--hd2:#1e293b;--th-bg:#f8fafc;--row-strip:#f1f5f9;--hover:#eff6ff;
  --good-bg:#f0fdf4;--good-bd:#bbf7d0;--good-ink:#166534;
  --bad-bg:#fef2f2;--bad-bd:#fecaca;--bad-ink:#991b1b;
  --mid-bg:#eff6ff;--mid-bd:#bfdbfe;--mid-ink:#1e40af;
  --shadow:rgba(0,0,0,.04)}
@media (prefers-color-scheme: dark){
  :root{--bg:#0f1115;--card:#181b21;--ink:#e6e9ef;--mut:#96a0b2;--line:#2a2f3a;--blue:#5b9dff;--gold:#e0a840;--orange:#fb923c;--red:#f0685f;--green:#4ade80;
    --hd1:#0a0c10;--hd2:#151922;--th-bg:#1d2129;--row-strip:#1b1e25;--hover:#1c2635;
    --good-bg:#112016;--good-bd:#1f4a2c;--good-ink:#5fd989;
    --bad-bg:#2a1414;--bad-bd:#5a2222;--bad-ink:#f2a0a0;
    --mid-bg:#131c2a;--mid-bd:#26426b;--mid-ink:#8fb8f0;
    --shadow:rgba(0,0,0,.3)}
}
:root[data-theme="dark"]{--bg:#0f1115;--card:#181b21;--ink:#e6e9ef;--mut:#96a0b2;--line:#2a2f3a;--blue:#5b9dff;--gold:#e0a840;--orange:#fb923c;--red:#f0685f;--green:#4ade80;
  --hd1:#0a0c10;--hd2:#151922;--th-bg:#1d2129;--row-strip:#1b1e25;--hover:#1c2635;
  --good-bg:#112016;--good-bd:#1f4a2c;--good-ink:#5fd989;
  --bad-bg:#2a1414;--bad-bd:#5a2222;--bad-ink:#f2a0a0;
  --mid-bg:#131c2a;--mid-bd:#26426b;--mid-ink:#8fb8f0;
  --shadow:rgba(0,0,0,.3)}
:root[data-theme="light"]{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--mut:#64748b;--line:#e2e8f0;--blue:#3b82f6;--gold:#d97706;--orange:#ea580c;--red:#dc2626;--green:#16a34a;
  --hd1:#0f172a;--hd2:#1e293b;--th-bg:#f8fafc;--row-strip:#f1f5f9;--hover:#eff6ff;
  --good-bg:#f0fdf4;--good-bd:#bbf7d0;--good-ink:#166534;
  --bad-bg:#fef2f2;--bad-bd:#fecaca;--bad-ink:#991b1b;
  --mid-bg:#eff6ff;--mid-bd:#bfdbfe;--mid-ink:#1e40af;
  --shadow:rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .15s,color .15s}
header{background:linear-gradient(135deg,var(--hd1) 0%,var(--hd2) 50%,var(--hd1) 100%);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
header h1{font-size:16px;font-weight:700}
header .sub{font-size:11.5px;color:#cbd5e1}
#themeBtn{background:none;border:1px solid #ffffff33;color:#fff;border-radius:99px;width:30px;height:30px;font-size:14px;cursor:pointer;flex-shrink:0}
#themeBtn:hover{background:#ffffff22}
#menuBtn{display:none;background:none;border:1px solid #ffffff33;color:#fff;border-radius:8px;width:32px;height:32px;font-size:16px;cursor:pointer;flex-shrink:0}
#menuBtn:hover{background:#ffffff22}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40}
.backdrop.show{display:block}
.drawer-close{display:none}
.main{display:flex;flex:1;overflow:hidden}
/* LEFT: hospital list */
.left{width:340px;min-width:260px;display:flex;flex-direction:column;border-right:1px solid var(--line);background:var(--card);flex-shrink:0}
.lfilt{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:6px}
.lfilt select,.lfilt input{font-family:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);width:100%}
.lfilt .row{display:flex;gap:6px}
.lfilt .row>*{flex:1}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{font-family:inherit;font-size:11.5px;font-weight:600;padding:5px 8px;border:none;background:var(--card);color:var(--mut);cursor:pointer;flex:1}
.seg button.on{background:var(--ink);color:var(--bg)}
.llist{flex:1;overflow-y:auto}
.lrow{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--row-strip);cursor:pointer}
.lrow:hover{background:var(--hover)}
.lrow.actv{background:var(--mid-bg)}
.lrow .rk{width:20px;font-size:11px;color:var(--mut);flex-shrink:0}
.lrow .nm{flex:1;min-width:0}
.lrow .nm .n1{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lrow .nm .n2{font-size:10.5px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:22px;border-radius:7px;font-size:12px;font-weight:700;color:#fff;padding:0 5px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:2px}
.trend-arrow{font-size:11px;flex-shrink:0;width:16px;text-align:center}
/* RIGHT: detail */
.right{flex:1;overflow-y:auto;min-width:0}
.hint-empty{padding:60px 20px;text-align:center;color:var(--mut);font-size:14px}
.dwrap{max-width:980px;margin:0 auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.dhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.dhead h2{font-size:18px;font-weight:700;flex:1;min-width:200px}
.dhead .meta{font-size:12px;color:var(--mut)}
#headline{padding:10px 14px;border-radius:10px;font-size:14px;font-weight:600;line-height:1.55}
#headline.good{background:var(--good-bg);border:1px solid var(--good-bd);color:var(--good-ink)}
#headline.bad{background:var(--bad-bg);border:1px solid var(--bad-bd);color:var(--bad-ink)}
#headline.mid{background:var(--mid-bg);border:1px solid var(--mid-bd);color:var(--mid-ink)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 11px;border-radius:99px;font-weight:600;border:1px solid var(--line);color:var(--mut);background:var(--card)}
.chip.on{background:var(--bad-bg);border-color:var(--bad-bd);color:var(--bad-ink)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.panel h3{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.panel h3::before{content:'';width:4px;height:16px;border-radius:99px;background:linear-gradient(180deg,#f59e0b,#d97706)}
.panel h3 .sp{flex:1}
.tip{position:relative;display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--line);color:var(--mut);font-size:10px;font-weight:700;font-family:Georgia,serif;cursor:help;flex-shrink:0;vertical-align:middle}
.tip:hover,.tip:focus,.tip.show{background:var(--blue);color:#fff;outline:none}
.tip .tip-box{display:none;position:absolute;z-index:90;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);width:max-content;max-width:min(300px,80vw);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:11.5px;font-weight:400;line-height:1.6;color:var(--ink);white-space:pre-line;text-align:left;box-shadow:0 10px 28px var(--shadow);cursor:auto}
.tip:hover .tip-box,.tip:focus .tip-box,.tip.show .tip-box{display:block}
.tip .tip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--card)}
.tip .tip-box b{color:var(--blue)}
h3 .tip{margin:0 2px}
.metric-tabs{display:flex;gap:4px}
.mtab{font-family:inherit;font-size:11.5px;font-weight:600;padding:4px 10px;border:1px solid var(--line);border-radius:99px;background:var(--card);color:var(--mut);cursor:pointer}
.mtab.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.peer-tabs{display:flex;gap:4px}
.chartbox{position:relative;height:260px}
.decomp-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dcard{border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.dcard .lbl{font-size:12px;color:var(--mut);font-weight:600}
.dcard .tot{font-size:19px;font-weight:700;margin:4px 0}
.dcard .brk{font-size:11.5px;color:var(--mut);display:flex;flex-direction:column;gap:2px}
.dcard .brk b{font-variant-numeric:tabular-nums}
@media(max-width:640px){.decomp-row{grid-template-columns:1fr}}
.wf-toggle{display:flex;justify-content:flex-end;margin-bottom:8px}
.wf-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:720px){.wf-cols{grid-template-columns:1fr}}
.wf-title{font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.wf-row{padding:6px 0;border-bottom:1px solid var(--row-strip)}
.wf-row .top{display:flex;justify-content:space-between;gap:8px;font-size:12.5px}
.wf-row .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.wf-row .dl{font-weight:700;white-space:nowrap}
.wf-bar{height:5px;border-radius:3px;background:var(--row-strip);overflow:hidden;margin-top:3px;position:relative}
.wf-bar>i{display:block;height:100%;border-radius:3px;position:absolute;top:0}
table.acctbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.acctbl th{background:var(--th-bg);color:var(--mut);font-weight:600;text-align:right;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
table.acctbl th:nth-child(1),table.acctbl th:nth-child(2){text-align:left}
table.acctbl td{padding:5px 8px;border-bottom:1px solid var(--row-strip);text-align:right;white-space:nowrap}
table.acctbl td:nth-child(1),table.acctbl td:nth-child(2){text-align:left;white-space:normal}
.clstag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px}
.clstag.CA,.clstag.REV{background:var(--good-bg);color:var(--good-ink)}
.clstag.CL,.clstag.EXP{background:var(--bad-bg);color:var(--bad-ink)}
.note{font-size:11.5px;color:var(--mut)}
.src-note{font-size:11px;color:var(--mut);background:var(--th-bg);border:1px solid var(--line);border-radius:8px;padding:6px 10px;line-height:1.5;margin-bottom:10px}
.acctbl-wrap{max-height:340px;overflow-y:auto}
.nibridge-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
@media(max-width:640px){.nibridge-row{grid-template-columns:1fr}}
table.wltbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.wltbl th{background:var(--th-bg);color:var(--mut);font-weight:600;padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
table.wltbl td{padding:8px;border-bottom:1px solid var(--row-strip);vertical-align:top}
table.wltbl tr.click{cursor:pointer}
table.wltbl tr.click:hover{background:var(--hover)}
table.wltbl .bullets{margin:0;padding-left:14px}
table.wltbl .bullets li{margin-bottom:2px}
.backlink{font-size:12.5px;color:var(--blue);cursor:pointer;text-decoration:none}
.backlink:hover{text-decoration:underline}
details.refpanel{border:1px solid var(--line);border-radius:12px;background:var(--card)}
details.refpanel summary{padding:12px 16px;font-weight:700;font-size:13.5px;cursor:pointer;list-style:none}
details.refpanel summary::-webkit-details-marker{display:none}
details.refpanel summary::before{content:'▶ ';font-size:11px}
details.refpanel[open] summary::before{content:'▼ '}
.refbody{padding:0 16px 16px}
.wl-panel summary{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.wl-panel summary .meta{font-weight:400}
.pillar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(max-width:720px){.pillar-grid{grid-template-columns:1fr}}
.pillar-card{border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.pillar-card h4{font-size:12.5px;margin-bottom:6px}
.pillar-card ul{padding-left:16px;font-size:12px;color:var(--mut);line-height:1.6}
table.systbl{width:100%;border-collapse:collapse;font-size:12px}
table.systbl th{background:var(--th-bg);padding:6px 8px;border:1px solid var(--line);text-align:left}
table.systbl td{padding:8px;border:1px solid var(--line);vertical-align:top;line-height:1.6}
table.systbl td ul{padding-left:16px;margin:0}
.eff-tbl{width:100%;border-collapse:collapse;font-size:13px}
.eff-tbl th{background:var(--th-bg);color:var(--mut);padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)}
.eff-tbl td{padding:7px 8px;border-bottom:1px solid var(--row-strip)}
.eff-pass{color:var(--green);font-weight:700}
.eff-fail{color:var(--red);font-weight:700}
/* ── Gap-to-Target Solver ─────────────────────────────── */
table.gaptbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.gaptbl th{background:var(--th-bg);color:var(--mut);font-weight:600;text-align:right;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
table.gaptbl th:first-child,table.gaptbl td:first-child{text-align:left}
table.gaptbl th.l,table.gaptbl td.l{text-align:left}
table.gaptbl td{padding:6px 8px;border-bottom:1px solid var(--row-strip);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
table.gaptbl td.opt{text-align:left;white-space:normal;font-size:11.5px;color:var(--mut);line-height:1.5}
table.gaptbl tr.pass-row td{opacity:.72}
.lvchip{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;white-space:nowrap}
.lvchip.flow{background:var(--good-bg);color:var(--good-ink)}
.lvchip.stock{background:var(--mid-bg);color:var(--mid-ink)}
.gp-pass{color:var(--green);font-weight:700}
.gp-fail{color:var(--red);font-weight:700}
.ladder{display:flex;flex-direction:column;margin-top:4px}
.ladder .rung{display:grid;grid-template-columns:44px 1fr auto;gap:12px;align-items:center;padding:9px 2px;border-bottom:1px solid var(--row-strip)}
.ladder .rung:last-child{border-bottom:none}
.rung .rbadge{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0}
.rung .rmain .rl{font-size:13px;font-weight:600}
.rung .rmain .rs{font-size:11.5px;color:var(--mut);line-height:1.45}
.rung .rcost{text-align:right;font-size:11.5px;font-variant-numeric:tabular-nums;white-space:nowrap}
.rung .rcost .cf{color:var(--good-ink);font-weight:700}
.rung .rcost .cs{color:var(--mid-ink);font-weight:700}
.rung .rcost .cl{font-size:10px;color:var(--mut);display:block}
.gap-note{font-size:11.5px;color:var(--mut);background:var(--th-bg);border:1px solid var(--line);border-radius:8px;padding:8px 11px;line-height:1.55;margin-top:8px}
.gap-note b{color:var(--ink)}
.spark{display:inline-flex;align-items:flex-end;gap:2px;height:20px;vertical-align:-5px}
.spark i{width:5px;border-radius:1px;display:block;min-height:1px}
.gap-hl{padding:9px 13px;border-radius:9px;font-size:13px;font-weight:600;line-height:1.5;margin-bottom:10px}
.gap-hl.flow{background:var(--good-bg);border:1px solid var(--good-bd);color:var(--good-ink)}
.gap-hl.stock{background:var(--mid-bg);border:1px solid var(--mid-bd);color:var(--mid-ink)}
.gap-hl.done{background:var(--good-bg);border:1px solid var(--good-bd);color:var(--good-ink)}
/* ── NI Bridge (สะพานกำไร 3 ชั้น) ─────────────────────── */
.ni-bridge{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:stretch;gap:8px;margin:2px 0 4px}
.ni-tier{border:1px solid var(--line);border-radius:10px;padding:10px 12px;text-align:center}
.ni-tier .lbl{font-size:11.5px;font-weight:600;line-height:1.35}
.ni-tier .lbl span{font-size:10px;color:var(--mut);font-weight:400}
.ni-tier .val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:4px}
.ni-tier.pos{background:var(--good-bg);border-color:var(--good-bd)}
.ni-tier.pos .val{color:var(--good-ink)}
.ni-tier.neg{background:var(--bad-bg);border-color:var(--bad-bd)}
.ni-tier.neg .val{color:var(--bad-ink)}
.ni-op{display:flex;flex-direction:column;justify-content:center;text-align:center;font-size:11px;color:var(--mut);white-space:nowrap;padding:0 2px;font-weight:600}
.ni-op b{color:var(--ink);font-variant-numeric:tabular-nums}
.ni-verdict{padding:10px 13px;border-radius:9px;font-size:13px;line-height:1.55;margin-top:10px}
.ni-verdict.good{background:var(--good-bg);border:1px solid var(--good-bd);color:var(--good-ink)}
.ni-verdict.mid{background:var(--mid-bg);border:1px solid var(--mid-bd);color:var(--mid-ink)}
.ni-verdict.bad{background:var(--bad-bg);border:1px solid var(--bad-bd);color:var(--bad-ink)}
@media(max-width:640px){.ni-bridge{grid-template-columns:1fr}.ni-op{flex-direction:row;gap:6px;padding:2px 0}}
/* ── Payables Stress (เจ้าหนี้การค้ารายหมวด) ───────────── */
.mo-chip{display:inline-block;font-size:11px;font-weight:700;padding:1px 8px;border-radius:6px;font-variant-numeric:tabular-nums;white-space:nowrap}
.mo-chip.hi{background:var(--bad-bg);color:var(--bad-ink)}
.mo-chip.warn{background:var(--th-bg);color:var(--gold)}
.mo-chip.ok{background:var(--good-bg);color:var(--good-ink)}
.mo-chip.na{color:var(--mut)}
.pay-recon{font-size:11.5px;color:var(--mut);margin-top:8px;line-height:1.5}
.pay-sub{font-size:12px;font-weight:700;color:var(--mut);margin:14px 0 4px;text-transform:none}
/* ── D: Survival Simulator ─────────────────────────────── */
.surv-ctrl{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px;margin-bottom:12px}
@media(max-width:560px){.surv-ctrl{grid-template-columns:1fr}}
.surv-ctrl .fld{display:flex;flex-direction:column;gap:3px}
.surv-ctrl label{font-size:12.5px;color:var(--mut)}
.surv-ctrl label b{color:var(--ink);font-variant-numeric:tabular-nums}
.surv-ctrl input[type=range]{width:100%;accent-color:var(--blue);cursor:pointer}
.surv-sum{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.surv-pill{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:12.5px;background:var(--card)}
.surv-pill .rb{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.surv-pill.out{background:var(--bad-bg);border-color:var(--bad-bd);color:var(--bad-ink);font-weight:600}
.surv-pill.down{background:var(--good-bg);border-color:var(--good-bd)}
.surv-pill.up{background:var(--bad-bg);border-color:var(--bad-bd);color:var(--bad-ink);font-weight:600}
.surv-base{display:block;font-size:10.5px;color:var(--mut);margin-top:3px;line-height:1.4}
.surv-base b{color:var(--ink);font-variant-numeric:tabular-nums}
.surv-base a{color:var(--blue);text-decoration:none}.surv-base a:hover{text-decoration:underline}
.surv-chartbox{position:relative;height:170px}
.surv-now{font-size:12.5px;color:var(--mut);margin-bottom:8px}
.surv-now b{color:var(--ink);font-variant-numeric:tabular-nums}
.surv-now b.neg{color:var(--red)}.surv-now b.pos{color:var(--green)}
.surv-cash-cap{font-size:11px;color:var(--mut);margin:10px 0 4px}
/* เป้าหมายระดับวิกฤตภายใน ก.ย. (Target Solver — แก้สมการย้อนกลับ) */

.tgt-card{border:1px solid var(--line);border-radius:10px;background:var(--card);padding:10px 12px}

.tgt-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px dashed var(--line);font-size:12.5px;flex-wrap:wrap;line-height:1.55}
.tgt-row:first-of-type{border-top:none}
.tgt-row b{font-variant-numeric:tabular-nums}

/* Overview Allocation Planner */
.ovm{display:flex;flex-direction:column;gap:2px;font-size:11.5px;white-space:nowrap}
.ovm label{cursor:pointer;display:flex;align-items:center;gap:4px}

.ovlink{font-size:10.5px;color:var(--blue);text-decoration:none;white-space:nowrap}
.ovlink:hover{text-decoration:underline}
.ovtgl{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:8px;padding:4px 8px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap}
.ovbulk-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:2px}
.ovbulk{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ovbulkbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:8px;padding:4px 10px;font-size:11.5px;font-family:inherit;cursor:pointer;white-space:nowrap}
.ovbulkbtn:hover{background:var(--hover);border-color:var(--blue)}

tr.ovbad td{background:rgba(220,60,60,.06)}

.ovsub-box{display:flex;flex-direction:column;gap:10px}
.ovsub-box .fld{display:flex;flex-direction:column;gap:3px}
.ovsub-box .fld label{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px}
.ovsub-box input[type=range]{width:100%;max-width:520px;accent-color:var(--blue);cursor:pointer}
.ovsub-box select{font-family:inherit;font-size:11.5px;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:2px 4px}
/* ── Executive tab (แนวทางสำหรับผู้บริหาร) ── */
.extbl input[type=range]{width:150px;max-width:38vw;accent-color:var(--blue);cursor:pointer;vertical-align:middle}
.exchip{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;border:1px solid var(--line);color:var(--mut);white-space:nowrap}
.exchip.op{color:var(--blue);border-color:var(--blue)}
.exchip.ip{color:var(--orange);border-color:var(--orange)}

.exctl{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:12.5px}

/* ปุ่ม + ป็อปอัปประมาณการ NI รายหมวด (แนว Planfin) */
.planfin-btn{font-family:inherit;font-size:11px;font-weight:600;padding:2px 9px;border:1px solid var(--blue);border-radius:7px;background:var(--card);color:var(--blue);cursor:pointer;margin-left:8px;white-space:nowrap;vertical-align:middle}
.planfin-btn:hover{background:var(--blue);color:#fff}
.nip-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:none;align-items:center;justify-content:center;padding:18px}
.nip-modal{background:var(--card);border:1px solid var(--line);border-radius:14px;width:100%;max-width:780px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.35)}

@media(max-width:620px){.nip-body{grid-template-columns:1fr}}
.nip-col h4{display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin:2px 0 6px;position:sticky;top:0;background:var(--card);padding-bottom:3px;z-index:1}
.nip-col h4 .nip-100{font-weight:400;text-transform:none;font-size:10.5px;letter-spacing:0}

.nip-row label{flex:1 1 32%;font-size:11.5px;line-height:1.25;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.nip-foot{padding:12px 18px;border-top:1px solid var(--line);flex-shrink:0}

.nip-totline b{font-variant-numeric:tabular-nums;color:var(--ink)}
.nip-ni{margin-left:auto;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.nip-btns{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:11px}
.nip-btns button{font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 15px;border-radius:9px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink)}
.nip-btns button:hover{background:var(--hover)}
.nip-btns .primary{background:var(--blue);border-color:var(--blue);color:#fff}
.nip-btns .primary:hover{filter:brightness(1.1)}
.dp-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--line)}

.dp-row .dp-lab .nm{font-size:11.5px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp-row .dp-lab .ctx{font-size:10px;color:var(--mut)}
.dp-row input[type=range]{flex:1 1 90px;min-width:56px;accent-color:var(--blue);cursor:pointer}
.dp-row .dp-num,.dp-row .acp-num{width:70px;font-family:inherit;font-size:12.5px;text-align:right;padding:3px 6px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--ink);font-variant-numeric:tabular-nums;flex-shrink:0}
.dp-row .u{font-size:10px;color:var(--mut);flex-shrink:0}
.dp-net{font-size:12.5px;line-height:1.55}
.dp-net b{font-variant-numeric:tabular-nums}
.cl-panel-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.cl-panel-tbl th,.cl-panel-tbl td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums}

.cl-panel-tbl td.l,.cl-panel-tbl th.l{text-align:left}
.cl-panel-tbl .clbar{height:7px;border-radius:3px;background:var(--blue);display:inline-block;vertical-align:middle}
.cl-panel-tbl tfoot td{font-weight:700;border-top:2px solid var(--line)}
.panel{overflow-x:auto}
.acctbl-wrap{overflow-x:auto}
@media(max-width:768px){
  #menuBtn{display:inline-flex;align-items:center;justify-content:center}
  header h1{font-size:14.5px}
  header .sub{font-size:10.5px}
  .left{position:fixed;top:0;left:0;bottom:0;width:86vw;max-width:360px;z-index:50;
    transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px var(--shadow)}
  .left.open{transform:translateX(0)}
  .drawer-close{display:flex;justify-content:flex-end;padding:8px 12px 0}
  .drawer-close button{font-family:inherit;font-size:12.5px;font-weight:600;padding:6px 12px;
    border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink)}
  .dwrap{padding:14px 12px}
  .dhead h2{font-size:16px}
  .decomp-row,.nibridge-row,.pillar-grid{grid-template-columns:1fr}
  /* Watchlist: ตาราง 7 คอลัมน์ → การ์ดต่อ รพ. (ไม่ต้องปัดซ้าย-ขวา) */
  table.wltbl{display:block}
  table.wltbl tbody{display:block}
  table.wltbl tr:first-child{display:none}
  table.wltbl tr.click{display:flex;flex-direction:column;position:relative;
    border:1px solid var(--line);border-radius:12px;margin:0 0 10px;padding:10px 52px 10px 12px;background:var(--card)}
  table.wltbl tr.click:hover{background:var(--hover)}
  table.wltbl td{display:block;border:none;padding:2px 0;white-space:normal}

  table.wltbl td:nth-child(5)::before{content:'เงินบำรุงสุทธิ: ';color:var(--mut);font-size:11.5px}
  table.wltbl td:nth-child(6){order:5;margin-top:6px}
  table.wltbl td:nth-child(6)::before{content:'สาเหตุ/ประเด็นชี้ปัญหา';display:block;font-weight:700;font-size:11.5px;color:var(--mut);margin-bottom:2px}
  table.wltbl td:nth-child(7){order:6;margin-top:6px}
  table.wltbl td:nth-child(7)::before{content:'คำแนะนำเฉพาะ รพ.';display:block;font-weight:700;font-size:11.5px;color:var(--mut);margin-bottom:2px}
  /* Gap-to-Target: ตาราง 6 คอลัมน์ → การ์ดต่อเกณฑ์ (ไม่ต้องปัดซ้าย-ขวา) */
  table.gaptbl{display:block}
  table.gaptbl tbody{display:block}
  table.gaptbl tr:first-child{display:none}
  table.gaptbl tr{display:block;position:relative;border:1px solid var(--line);border-radius:10px;
    margin:0 0 8px;padding:9px 40px 9px 11px;background:var(--card)}
  table.gaptbl tr.pass-row{opacity:1}
  table.gaptbl tr.pass-row td{opacity:1}
  table.gaptbl td{display:block;border:none;padding:1px 0;text-align:left!important;white-space:normal}

  table.gaptbl td:nth-child(2)::before{content:'ค่า: ';color:var(--mut);font-weight:400}

}

<body>

<header>
  <button id="menuBtn" onclick="toggleDrawer()" title="เปิดรายชื่อ รพ.">☰</button>
  <h1>🔎 สาเหตุวิกฤต</h1>
  <div class="sub">ไล่สาเหตุ Risk Score จากงบทดลอง — เขตสุขภาพที่ 1 · <span id="hPeriod">-</span> · <span id="hNHosp">-</span> รพ.</div>
  <nav style="margin-left:auto;display:flex;gap:14px;font-size:13px;flex-wrap:wrap;align-items:center">
    <a href="index.html" style="color:#cbd5e1;text-decoration:none">← Balance Sheet</a>
    <a href="#exec" style="color:#6ee7b7;text-decoration:none;font-weight:600">🧭 ผู้บริหาร</a>
    <a href="explorer.html" style="color:#fbbf24;text-decoration:none;font-weight:600">🔍 Explorer</a>
    <a href="https://pitaknan.github.io/Risk-Score-Rh1/" target="_blank" style="color:#cbd5e1;text-decoration:none">🎯 Risk Score</a>
    <button id="themeBtn" onclick="toggleTheme()" title="สลับโหมดมืด/สว่าง">🌙</button>
  </nav>
</header>

<div class="main">
  <!-- LEFT -->
  <div class="left">
    <div class="drawer-close"><button onclick="closeDrawer()">✕ ปิด</button></div>
    <div class="lfilt">
      <input id="qSearch" type="text" placeholder="ค้นหาชื่อ รพ. / จังหวัด..." oninput="renderList()">
      <div class="row">
        <select id="fLevel" onchange="renderList()"><option value="">ทุกระดับ</option></select>
        <select id="fProv" onchange="renderList()"><option value="">ทุกจังหวัด</option></select>
      </div>
      <div class="seg">
        <button id="sRisk" class="on" onclick="setSort('risk')">Risk สูงสุด</button>
        <button id="sDelta" onclick="setSort('delta')">แย่ลงเร็วสุด</button>
      </div>
    </div>
    <div class="llist" id="llist"></div>
  </div>

  <!-- RIGHT -->
  <div class="right" id="right">
    <div class="hint-empty">กำลังโหลด...</div>
  </div>
</div>
<div class="backdrop" id="backdrop" onclick="closeDrawer()"></div>

<script>
// ── มือถือ/แท็บเล็ต: drawer สำหรับรายชื่อ รพ. ────────────────
function toggleDrawer(){
  const open=!document.querySelector('.left').classList.contains('open');
  document.querySelector('.left').classList.toggle('open',open);
  document.getElementById('backdrop').classList.toggle('show',open);
}
function closeDrawer(){
  document.querySelector('.left').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}
// ── โหมดมืด/สว่าง ─────────────────────────────────────────
function isDarkNow(){const t=document.documentElement.getAttribute('data-theme');if(t)return t==='dark';return window.matchMedia('(prefers-color-scheme: dark)').matches}
function syncThemeBtn(){document.getElementById('themeBtn').textContent=isDarkNow()?'☀️':'🌙'}
function toggleTheme(){const next=isDarkNow()?'light':'dark';document.documentElement.setAttribute('data-theme',next);localStorage.setItem('rh1-theme',next);syncThemeBtn();if(CUR)renderDetail(CUR)}
syncThemeBtn();

// ── Config / State ──────────────────────────────────────────
const D='data/risk/';
let SUMMARY=null, CUR=null, HDATA=null;
let sortMode='risk';
let periodMode='mom';   // mom | yoy
let ratioMetric='cr';   // cr | qr | cash
let peerDim='grp';      // grp | level | prov
let ratioChart=null;
const H_CACHE={};

const TH_M=['ต.ค.','พ.ย.','ธ.ค.','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.'];
function tLab(t){return TH_M[t%100-1]+String(t).slice(2,4)}
function fmtM(v){if(v==null)return '—';const a=Math.abs(v);if(a>=1e9)return(v/1e9).toFixed(2)+'B';if(a>=1e6)return(v/1e6).toFixed(1)+'M';if(a>=1e3)return(v/1e3).toFixed(0)+'K';return Math.round(v).toLocaleString()}
function fmtR(v){return v==null?'—':v.toFixed(2)}
// ── ไอคอน ⓘ tooltip: ความหมาย/สูตร/ที่มาข้อมูล — hover (desktop) หรือแตะ (มือถือ ผ่าน tabindex+click toggle) ──
function tip(text){ return `<span class="tip" tabindex="0" onclick="event.stopPropagation();this.classList.toggle('show')">ⓘ<span class="tip-box">${text}</span></span>`; }
document.addEventListener('click', ()=>document.querySelectorAll('.tip.show').forEach(el=>el.classList.remove('show')));
function riskColor(r){
  if(r==null)return '#94a3b8';
  if(r<=1)return getCss('--green'); if(r<=3)return getCss('--gold'); if(r<=5)return getCss('--orange'); return getCss('--red');
}
function getCss(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}

// ── Init ──────────────────────────────────────────────────
async function init(){
  try{ SUMMARY = await fetch(D+'summary.json').then(r=>r.json()); }
  catch(e){ document.getElementById('llist').innerHTML='<div style="padding:16px;color:var(--mut)">โหลดข้อมูลไม่ได้ — ยังไม่ได้รัน export_risk_link.py หรือ path ผิด</div>'; return; }

  document.getElementById('hPeriod').textContent=SUMMARY.periodLabel+' '+SUMMARY.period;
  document.getElementById('hNHosp').textContent=SUMMARY.nHosp;

  const levels=[...new Set(SUMMARY.hospitals.map(h=>h.level).filter(Boolean))].sort();
  const provs=[...new Set(SUMMARY.hospitals.map(h=>h.prov).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'th'));
  const fL=document.getElementById('fLevel'), fP=document.getElementById('fProv');
  for(const l of levels){const o=document.createElement('option');o.value=l;o.textContent=l;fL.appendChild(o)}
  for(const p of provs){const o=document.createElement('option');o.value=p;o.textContent=p;fP.appendChild(o)}

  renderList();

  // deep link: #h/{hcode} — ไม่มี hash หรือ hash ไม่ตรง = หน้า Watchlist (ค่าเริ่มต้น)
  window.addEventListener('hashchange',applyHash);
  applyHash();
}

function applyHash(){
  const m=location.hash.match(/^#h\/(\w+)/);
  if(m && SUMMARY.hospitals.find(h=>h.hcode===m[1])) selectHosp(m[1]);
  else if(location.hash.startsWith('#exec')) { CUR=null; renderList(); closeDrawer(); renderExec(); }
  else { CUR=null; renderList(); renderWatchlist(); }
}

// ── List (L0) ───────────────────────────────────────────────
function setSort(s){sortMode=s;document.getElementById('sRisk').classList.toggle('on',s==='risk');document.getElementById('sDelta').classList.toggle('on',s==='delta');renderList()}

function renderList(){
  const q=document.getElementById('qSearch').value.trim().toLowerCase();
  const lv=document.getElementById('fLevel').value, pv=document.getElementById('fProv').value;
  let rows=SUMMARY.hospitals.filter(h=>
    (!lv||h.level===lv)&&(!pv||h.prov===pv)&&
    (!q||h.name.toLowerCase().includes(q)||(h.prov||'').toLowerCase().includes(q))
  );
  if(sortMode==='risk') rows=rows.slice().sort((a,b)=>(b.risk||0)-(a.risk||0));
  else rows=rows.slice().sort((a,b)=>((b.risk||0)-(b.riskPrev3||0))-((a.risk||0)-(a.riskPrev3||0)));

  document.getElementById('llist').innerHTML = rows.map((h,i)=>{
    const d=(h.risk||0)-(h.riskPrev3??h.risk??0);
    const arrow = d>0?`<span class="trend-arrow" style="color:var(--red)" title="แย่ลง ${d} จุด ใน 3 เดือน">▲</span>`
                : d<0?`<span class="trend-arrow" style="color:var(--green)" title="ดีขึ้น ${-d} จุด ใน 3 เดือน">▼</span>`
                : `<span class="trend-arrow" style="color:var(--mut)">–</span>`;
    return `<div class="lrow${CUR===h.hcode?' actv':''}" onclick="location.hash='h/${h.hcode}'">
      <span class="rk">${i+1}</span>
      <span class="badge" style="background:${riskColor(h.risk)}">${h.risk!=null?h.risk:'–'}</span>
      ${arrow}
      <span class="nm"><span class="n1">${h.name}</span><span class="n2">${h.prov||''} · ${h.grp||''}</span></span>
    </div>`;
  }).join('') || '<div style="padding:16px;color:var(--mut)">ไม่พบโรงพยาบาล</div>';
}

// ── Select hospital → load detail (L1-L4) ───────────────────
async function selectHosp(hcode){
  CUR=hcode;
  renderList();
  closeDrawer();
  document.getElementById('right').innerHTML='<div class="hint-empty">กำลังโหลด...</div>';
  try{
    if(!(hcode in H_CACHE)) H_CACHE[hcode]=await fetch(`${D}h/${hcode}.json`).then(r=>r.json());
    HDATA=H_CACHE[hcode];
  }catch(e){
    document.getElementById('right').innerHTML='<div class="hint-empty">โหลดรายละเอียดของ รพ.นี้ไม่ได้</div>';
    return;
  }
  ratioMetric='cr'; periodMode='mom';
  renderDetail(hcode);
}

// ── Watchlist: สาเหตุ + คำแนะนำ อัตโนมัติ (map จากกรอบ "4 เสาหลัก") ──────
function causeBullets(h){
  const b=[];
  if((h.triggers||[]).includes('cash')) b.push(`Cash ratio ต่ำ ${fmtR(h.cash)}`);
  if((h.triggers||[]).includes('qr')) b.push(`Quick ratio ต่ำ ${fmtR(h.qr)}`);
  if((h.triggers||[]).includes('cr')) b.push(`Current ratio ต่ำ ${fmtR(h.cr)}`);
  if(h.nwc<0) b.push(`NWC ติดลบ ${fmtM(h.nwc)}`);
  if(h.reserve<0) b.push(`เงินบำรุงคงเหลือสุทธิติดลบ ${fmtM(h.reserve)}`);
  if((h.triggers||[]).includes('ni')) b.push(`ขาดทุนสะสม ${fmtM(h.ni)}`);
  const tc=h.topCause||{};
  if(tc.exp && tc.exp.name && tc.exp.delta>0) b.push(`${tc.exp.name} เพิ่ม ${fmtM(tc.exp.delta)}`);
  if(tc.ca && tc.ca.name && tc.ca.delta<0) b.push(`${tc.ca.name} ลด ${fmtM(Math.abs(tc.ca.delta))}`);
  if(tc.cl && tc.cl.name && tc.cl.delta>0) b.push(`${tc.cl.name} เพิ่ม ${fmtM(tc.cl.delta)}`);
  return b.slice(0,4);
}
function recommendFor(h){
  const rec=[]; const tc=h.topCause||{};
  const isPersonnel = tc.exp && tc.exp.name && /เงินเดือน|ค่าจ้าง|ค่าตอบแทน/.test(tc.exp.name);
  const trig=h.triggers||[];
  if(trig.includes('cash')||trig.includes('ni'))
    rec.push('เร่งปิด gap รายได้: ตรวจ claim ค้าง/ถูกปฏิเสธ, coding/DRG, เร่งรัดลูกหนี้ค้างจ่าย');
  if(isPersonnel && (trig.includes('ni')||h.nwc<0))
    rec.push('Lean จัดกำลังคนตามภาระงานจริง คุมสัดส่วนค่าใช้จ่ายบุคลากรต่อรายได้ไม่เกิน 50-60%');
  if(trig.includes('qr'))
    rec.push('ทำ Lean Inventory / เข้าร่วมจัดซื้อร่วมระดับเขต ลด safety stock ยา-เวชภัณฑ์');
  if((trig.includes('cr')||h.nwc<0) && !isPersonnel)
    rec.push('คุมสภาพคล่องผ่านสัปดาห์ แยกงบลงทุนออกจากเงินหมุนเวียน รักษาวินัยแผนเงินบำรุง/Planfin');
  if(h.ebitda!=null && h.ebitda<0 && !rec.length)
    rec.push('ทำ EBITDA recovery plan: เพิ่มรายได้ที่เรียกเก็บได้จริง ลดต้นทุนที่ไม่กระทบบริการ');
  if(!rec.length) rec.push('ติดตามต่อเนื่อง ยังอยู่ในเกณฑ์ควบคุมได้');
  return rec.slice(0,2);
}

// ── Watchlist Overview v2: แผนจัดสรรรายแห่ง (Allocation Planner) ──
// เลือกวิธีรายแห่ง (อัตโนมัติ/💪/💰/⚖️) + คันโยกเร่งเก็บลูกหนี้/ชำระหนี้/สมดุลผสม
// ใช้ solveTargetFor()+buildSurvCtx() ชุดเดียวกับ Simulator รายโรงพยาบาล → ตัวเลขตรงกันเป๊ะ
let OV_CTX=null, OV_TGT=null, OV_OPEN={}, OV_PLAN={}, OV_TSV='';
function survOverviewHtml(rows){
  if(!rows.length) return '';
  return `<div class="panel" id="ovBox" style="margin-top:14px">
    <h3 style="margin:0 0 8px">🧮 ภาพรวม จำลองอัตราความอยู่รอด — แผนจัดสรรรายแห่ง <a class="ovlink" href="#exec" style="font-weight:600">🧭 มุมมองผู้บริหาร (โมเดล MOE) →</a></h3>
    <div class="note">ตั้งเป้าระดับวิกฤตร่วมกันสำหรับ รพ. วิกฤต 6-7 คะแนนทั้ง ${rows.length} แห่ง แล้ว<b>เลือกวิธีของแต่ละแห่ง</b> (กำไร/เงินก้อน/ผสม) พร้อมคันโยกเร่งเก็บลูกหนี้และชำระหนี้ — ระบบรวมเป็นแผนจัดสรรเงินระดับเขตให้อัตโนมัติ (บันทึกแผนไว้ในเครื่อง เปิดใหม่ไม่หาย)</div>
    <div id="ovBody"><div class="note" style="padding:10px 0">กำลังโหลดข้อมูล ${rows.length} แห่ง...</div></div>
  </div>`;
}
function svSepLabelFor(ctx){ return tLab(Math.floor(ctx.startT/100)*100+12); }
// ค่าแนะนำ "เร่งเก็บลูกหนี้": ส่วนเกินเป้า ACP ทางการรายกองทุน (UC/CSMBS ≤60 วัน, SSS ≤90 วัน — จาก note)
function arSuggest(ctx){
  if(!ctx.recv) return 0;
  let s=0;
  for(const r of ctx.recv){
    const m=(r.note||'').match(/(\d+)/); const tgt=m?+m[1]:60;
    if(r.acp>tgt && r.ar>0) s+=r.ar*(1-tgt/r.acp);
  }
  return Math.round(s/SV_STEP)*SV_STEP;
}
function ovDefaultPlan(ctx){ return {method:'auto', alpha:50, acp:arSuggest(ctx), acpMonth:2, debt:0}; }
function ovPlanOf(hc, ctx){ let p=OV_PLAN[hc]; if(!p){ p=ovDefaultPlan(ctx); OV_PLAN[hc]=p; } return p; }
function ovStoreKey(){ return 'rh1-ovplan-'+((SUMMARY&&SUMMARY.period)||''); }
function ovLoadPlan(){ try{ const s=JSON.parse(localStorage.getItem(ovStoreKey())||'null'); if(s){ OV_PLAN=s.plans||{}; OV_TGT=(s.tgt!=null?s.tgt:null); } }catch(e){} }
function ovSavePlan(){ try{ localStorage.setItem(ovStoreKey(), JSON.stringify({tgt:OV_TGT, plans:OV_PLAN})); }catch(e){} }
async function loadSurvOverview(rows){
  const need=rows.filter(h=>!(h.hcode in H_CACHE));
  if(need.length) await Promise.all(need.map(async h=>{
    try{ H_CACHE[h.hcode]=await fetch(`${D}h/${h.hcode}.json`).then(r=>r.json()); }
    catch(e){ H_CACHE[h.hcode]=null; }
  }));
  OV_CTX=rows.map(h=>{ const hd=H_CACHE[h.hcode]; return {h, ctx:hd?buildSurvCtx(hd,h):null}; });
  const el=document.getElementById('ovBody'); if(!el) return;  // ผู้ใช้อาจสลับหน้าไปแล้วระหว่างโหลด
  ovLoadPlan();
  const okList=OV_CTX.filter(o=>o.ctx), bad=OV_CTX.length-okList.length;
  const sepLab=okList.length?svSepLabelFor(okList[0].ctx):'ก.ย.';
  el.innerHTML=`
    <div class="tgt-title">🎯 ตั้งเป้าระดับวิกฤตร่วมกันภายใน <b>${sepLab}</b> (ใช้กับ ${okList.length} แห่ง) — กดเลขระดับที่ต้องการ</div>
    <div class="tgt-legend">เลข 0-6 = ต้องทำกำไร/เติมเงินก้อนเท่าไหร่ถึงจะลดลงถึงเป้าภายใน ${sepLab} · เลข <b>7</b> = เพดานขาดทุนก่อนตกไประดับ 7 (สำหรับแห่งที่ยังอยู่ระดับ 6)</div>
    <div class="lvlbtns" id="ovLvlBtns">${[0,1,2,3,4,5,6,7].map(L=>`<button type="button" class="lvlbtn" data-l="${L}" style="background:${riskColor(L)}" onclick="svOverviewTarget(${L})">${L}</button>`).join('')}</div>
    ${bad?`<div class="note" style="margin-top:6px">⚠️ ${bad} แห่งข้อมูลเดือนนี้ไม่พอสำหรับจำลอง (ไม่รวมในผลลัพธ์ด้านล่าง)</div>`:''}
    <div id="ovResult"></div>`;
  if(OV_TGT!=null) svOverviewTarget(OV_TGT);
}
function svOverviewTarget(L){
  if(!OV_CTX) return;
  OV_TGT=L;
  document.querySelectorAll('#ovLvlBtns .lvlbtn').forEach(b=>b.classList.toggle('on', +b.dataset.l===L));
  ovSavePlan();
  ovRender();
}
// เลือกตัวเลขตามวิธีที่ผู้ใช้ติ๊ก — 'auto' = วิธีที่ใช้เงินก้อนภายนอกน้อยสุดที่ยังถึงเป้า (💪→⚖️→💰)
function ovChoose(o){
  const p=ovPlanOf(o.h.hcode, o.ctx);
  const opts={alpha:p.alpha/100, acpFreed:p.acp, acpMonth:p.acpMonth, debtNetMo:p.debt};
  const r=solveTargetFor(o.ctx, OV_TGT, opts);
  const run=r.run;
  if(r.status!=='ok') return {p, opts, r, m:r.status, ni:run, inj:0, ok:true, sep:r.status==='atlevel'?null:evalPlanFor(o.ctx,opts,run,0)};
  let m=p.method;
  if(m==='auto') m = r.niReq!=null?'ni' : (r.injMid!=null?'mix' : (r.injOnly!=null?'inj':'ni'));
  let ni=run, inj=0, ok=true;
  if(m==='ni'){ if(r.niReq!=null){ni=r.niReq;} else ok=false; }
  else if(m==='inj'){ if(r.injOnly!=null){inj=r.injOnly;} else ok=false; }
  else { if(r.injMid!=null){ni=Math.max(r.niMid,run); inj=r.injMid;} else {ni=Math.max(r.niMid||run,run); ok=false;} }
  return {p, opts, r, m, auto:p.method==='auto', ni, inj, ok, sep:evalPlanFor(o.ctx,opts,ni,inj)};
}
const OV_MLAB={ni:'💪 กำไร', inj:'💰 เงินก้อน', mix:'⚖️ ผสม'};

    else if(c.m==='ceiling'){ injTxt='<span class="tgt-note">ไม่เกี่ยวข้อง (เพดานขาดทุน)</span>'; niTxt=`🛡️ ห้ามต่ำกว่า <b>${sgnM(c.r.floor)}</b>/ด. ${svChip(c.r.floor-c.r.run)}`; }

    const main=`<tr class="ovrow${c.ok?'':' ovbad'}">
      <td>${o.h.prov||''}</td>
      <td><b>${o.h.name}</b> <a class="ovlink" href="#h/${hc}">เปิดหน้าเต็ม →</a></td>

    if(!open) return main;
    // ── sub-row: คันโยกรายแห่ง ──
    const ctx=o.ctx;
    const arMax=Math.round(ctx.totalAR/SV_STEP)*SV_STEP, sug=arSuggest(ctx);
    const recvNote=(ctx.recv||[]).map(rr=>`${rr.name.replace('ลูกหนี้สิทธิ ','')} ${fmtM(rr.ar)} (ACP ${rr.acp!=null?rr.acp.toFixed(0):'?'} วัน, ${rr.note||''})`).join(' · ');
    const dLim=ctx.clbd?Math.round((ctx.clbd.totalPay||0)/SV_STEP)*SV_STEP:0;
    const dir=x=>x===ctx.cl?'ไม่เปลี่ยน':(x>ctx.cl?'ดีขึ้น':'แย่ลง');
    const effMix=(c.m==='mix');
    const sub=`<tr class="ovsub"><td colspan="8"><div class="ovsub-box">

          onchange="ovSetLever('${hc}','alpha',+this.value)">
        <span class="surv-base">0% = พึ่งกำไรล้วน (เงินก้อนน้อยสุด) · 100% = คงกำไรปัจจุบัน พึ่งเงินก้อนล้วน · 50% = สูตรกึ่งกลางมาตรฐาน</span></div>`:''}

        <select onchange="ovSetLever('${hc}','acpMonth',+this.value)">${[1,2,3,4,5,6].map(k=>`<option value="${k}" ${p.acpMonth===k?'selected':''}>${k} (${tLab(addMo(ctx.startT,k))})</option>`).join('')}</select></label>
        <input type="range" min="0" max="${arMax}" step="${SV_STEP}" value="${Math.min(p.acp,arMax)}"

function ovBuildTSV(items, L, sepLab){
  const M=v=>(v/1e6).toFixed(2);
  const head=['จังหวัด','โรงพยาบาล','ระดับปัจจุบัน','เป้า','วิธี','เงินก้อนจากเขต(ลบ.)','กำไรเป้าหมาย/เดือน(ลบ.)','กำไรเพิ่มจากปัจจุบัน(ลบ./เดือน)','เร่งเก็บลูกหนี้(ลบ.)','เงินลูกหนี้เข้าเดือนที่','ชำระหนี้สุทธิ/เดือน(ลบ.)','ผลจำลอง ณ '+sepLab].join('\t');
  const lines=items.map(({o,c})=>{
    const mm=c.m==='atlevel'?'อยู่ในระดับนี้พอดี'
      :c.m==='safe'?'ปลอดภัย (ไม่ตกแม้ขาดทุนหนักสุด)'
      :c.m==='ceiling'?`เพดานขาดทุน (ห้ามต่ำกว่า)`
      :c.m==='already'?'ถึงเป้าเอง'
      :((c.auto?'อัตโนมัติ→':'')+(OV_MLAB[c.m]||c.m)+(c.ok?'':' (ไม่ถึงเป้า)'));
    const niOut=c.m==='ceiling'?c.r.floor:(c.ni||0);
    const niDelta=c.m==='ceiling'?(c.r.floor-c.r.run):Math.max(0,(c.ni||0)-(c.r.run||0));
    return [o.h.prov||'',o.h.name,o.ctx.official,L,mm,M(c.inj||0),M(niOut),M(niDelta),M(c.p.acp||0),c.p.acp>0?c.p.acpMonth:'-',M(c.p.debt||0),c.sep!=null?c.sep:'-'].join('\t');
  });
  const act=items.filter(x=>!['atlevel','already','safe','ceiling'].includes(x.c.m)&&x.c.ok);
  const tot=['รวม','', '', '', '', M(act.reduce((s,x)=>s+x.c.inj,0)), '', M(act.reduce((s,x)=>s+Math.max(0,x.c.ni-x.c.r.run),0)), M(items.filter(x=>x.c.m!=='atlevel').reduce((s,x)=>s+(x.c.p.acp||0),0)), '', '', ''].join('\t');
  return [head,...lines,tot].join('\n');
}

// ══════════════════════════════════════════════════════════════════════
// ── Executive Tab: แนวทางสำหรับผู้บริหาร (hash #exec) ──────────────────
// โมเดล MOE: NI จำลอง/เดือน = Σรายรับกองทุน×(1+%) − MOE (คชจ.จำเป็น) − ค่าเสื่อม
// แทนการลาก NI เฉลี่ย YTD ตรงๆ — เพราะรายรับต้นปีมีเงินเหมาจ่าย/จ่ายล่วงหน้าเป็นก้อน
// + Option ปรับหนี้ค่ารักษาตามจ่าย รพช.↔รพศ./รพท. (จ่ายจริง/ยกหนี้ เกลี่ยสัดส่วนในจังหวัด)
// + Solver เงินสนับสนุนขั้นต่ำรายแห่งให้ถึงเป้าระดับวิกฤต ≤ เป้า และเงินสดไม่หมด
// ══════════════════════════════════════════════════════════════════════
let EX=null, EXST=null, EXOPEN={}, EXTJ=null, EXROWS=null, EX_TSV='';
const EX_SEGL={op:'OP',ip:'IP',pp:'P&P',oth:'อื่น/รวม'};
function exKey(p,seg){ return p+'|'+seg; }
function exStoreKey(){ return 'rh1-exec-'+(EX?EX.period:''); }
function exDefaultState(){
  // moe: ติ๊กรายกลุ่มนิยามกองเศรษฐฯ (default จ่ายครบ) · xmoe: คชจ.นอกนิยาม run-rate (default คงไว้ = NI ตรงบัญชีจริง)
  // adjAll: ค่ากลุ่มที่บังคับล่าสุด (สไลด์ต้องจำค่าไว้ ไม่รีเซ็ตเป็น 0 หลัง render) · open: สถานะยุบ/กางเมนู (default ยุบ)
  return {crisis:'67', types:{'รพศ.':true,'รพท.':true,'รพช.':true}, ext:0, tgt:6,
          moe:{}, xmoe:true, adj:{}, adjAll:0, ovr:{}, tj:{mode:'off',scope:'crisis'}, inj:{}, open:{rev:false}};
}
function exSave(){ try{ localStorage.setItem(exStoreKey(), JSON.stringify(EXST)); }catch(e){} }
function exLoad(){
  EXST=exDefaultState();
  try{ const s=JSON.parse(localStorage.getItem(exStoreKey())||'null'); if(s) EXST={...EXST,...s,types:{...EXST.types,...(s.types||{})},tj:{...EXST.tj,...(s.tj||{})}}; }catch(e){}
}
// % ปรับรายรับ (จำนวนเต็ม −100..+200): override ราย รพ. > ค่ากลุ่ม > 0
function exPct(hc,p,seg){
  const k=exKey(p,seg);
  const o=EXST.ovr[hc];
  if(o && o[k]!=null) return o[k];
  return EXST.adj[k]!=null?EXST.adj[k]:0;
}
// P24/P241/EADJ = non-cash bundle (ตรง exp−e33y ของสูตรทางการ) — หักใน NI อัตโนมัติผ่าน depMo
const EX_NONCASH={P24:1,P241:1,EADJ:1};
// MOE ทางการ: กลุ่มบัญชี 59 ตัวตามนิยามกองเศรษฐกิจสุขภาพ (EX.moeGroups จาก export_exec.py)
function exMoeOn(g){ return EXST.moe[g]!==false; }
function exXmoeOn(){ return EXST.xmoe!==false; }   // ค่าใช้จ่ายนอกนิยาม MOE (run-rate)
// รพ. ที่แสดงตามฟิลเตอร์
function exRows(){
  return EX.hosp.filter(h=>EXST.types[h.type] && (EXST.crisis==='all' || (h.risk||0)>=6));
}
// ── ตามจ่าย: เกลี่ยภาระฝั่งเจ้าหนี้ (รพศ./รพท.) ตามสัดส่วนลูกหนี้นอก CUP ในจังหวัดเดียวกัน ──
function exTjCalc(){
  if(EXST.tj.mode==='off') return {debtors:new Set(), shares:{}, byProv:{}, total:0, uncovered:0};
  const scope=EXST.tj.scope;
  const debtors=EX.hosp.filter(h=>h.type==='รพช.' && h.tj.payIn>0 && (scope==='all' || (h.risk||0)>=6));
  const byProv={};
  debtors.forEach(h=>{ byProv[h.prov]=(byProv[h.prov]||0)+h.tj.payIn; });
  const shares={}; let uncovered=0;
  for(const prov in byProv){
    const creds=EX.hosp.filter(h=>(h.type==='รพศ.'||h.type==='รพท.') && h.prov===prov && h.tj.arIn>0);
    const w=creds.reduce((s,h)=>s+h.tj.arIn,0);
    if(!w){ uncovered+=byProv[prov]; continue; }
    let left=byProv[prov];
    creds.forEach(h=>{ const s=Math.min(h.tj.arIn, byProv[prov]*h.tj.arIn/w); shares[h.hcode]=(shares[h.hcode]||0)+s; left-=s; });
    if(left>1) uncovered+=left;
  }
  return {debtors:new Set(debtors.map(h=>h.hcode)), shares, byProv,
          total:debtors.reduce((s,h)=>s+h.tj.payIn,0), uncovered};
}
// ── NI จำลอง/เดือน (บัญชี) = Σรายรับ×(1+%) − MOE − ค่าเสื่อม run-rate ──
function exRevMo(h){
  const mo=h.bs.mo; let s=0;
  for(const p of EX.revOrder){ const r=h.rev[p]; if(!r) continue;
    for(const g of ['op','ip','pp','oth']){ const v=r[g]||0; if(!v) continue;
      s += v/mo*(1+exPct(h.hcode,p,g)/100); } }
  return s;
}
function exMoeMo(h){
  const mo=h.bs.mo; let s=0;
  for(const g of EX.moeGroups){ if(!exMoeOn(g.id)) continue; s+=(h.moe[g.id]||0)/mo; }
  return s;
}
// ค่าใช้จ่ายเงินสดนอกนิยาม MOE = คชจ.รวม − MOE ทางการ − non-cash (เงินเดือน ขรก./ค่าตอบแทนอื่น/ตามจ่าย/ค่าใช้สอยอื่น ฯลฯ)
function exXmoeMo(h){
  const mo=h.bs.mo;
  let exp=0, nc=0;
  for(const p in h.exp){ exp+=h.exp[p]; if(EX_NONCASH[p]) nc+=h.exp[p]; }
  let moe=0; for(const g in h.moe) moe+=h.moe[g];
  return Math.max(0,(exp-moe-nc))/mo;
}
function exNiMo(h){ return exRevMo(h)-exMoeMo(h)-(exXmoeOn()?exXmoeMo(h):0)-h.bs.depMo; }
// ── จำลองเส้นทางถึง horizon (ก.ย. + ext เดือน) — anchor คะแนนทางการแบบเดียวกับ Simulator เดิม ──
function exSimPath(h, inj){
  const bs=h.bs;
  let st={cca:bs.ca+inj, ccl:bs.cl, cqn:bs.qn+inj, ccn:bs.cn+inj, ni:bs.ni, mo:bs.mo};
  if(EXST.tj.mode!=='off'){
    if(EXTJ.debtors.has(h.hcode)){
      const D=h.tj.payIn;
      if(EXST.tj.mode==='pay'){ st.cca-=D; st.cqn-=D; st.ccn-=D; st.ccl=Math.max(0,st.ccl-D); }
      else { st.ccl=Math.max(0,st.ccl-D); st.ni+=D; }   // ยกหนี้ = รายได้ (4301020105.256) เข้า NI ตามบัญชีจริง
    }
    const S=EXTJ.shares[h.hcode]||0;
    if(S>0){
      if(EXST.tj.mode==='pay'){ st.ccn+=S; }            // ได้เงินสด (ลูกหนี้→เงินสด CA/QN คงที่)
      else { st.cca-=S; st.cqn-=S; st.ni-=S; }          // ยกหนี้ = ตัดลูกหนี้ + คชจ.อุดหนุน (5107) เข้า NI
    }
  }
  const niM=exNiMo(h), depMo=bs.depMo;
  const base=scoreOf(bs.ca,bs.cl,bs.qn,bs.cn,bs.ni,bs.mo).risk;
  const anc=v=>Math.max(0,Math.min(7,(h.risk!=null?h.risk:0)+(v-base)));
  const months=(12-bs.mo)+(+EXST.ext||0);
  let r=anc(scoreOf(st.cca,Math.max(st.ccl,1),st.cqn,st.ccn,st.ni,st.mo).risk);
  let sepRisk=(bs.mo===12?r:null), endRisk=r, cashOut=st.ccn<=0?0:null;
  for(let k=1;k<=months;k++){
    if(st.mo>=12){st.mo=1; st.ni=0;} else st.mo++;
    st.ni+=niM;
    const c=niM+depMo;
    st.cca+=c; st.cqn+=c; st.ccn+=c;
    r=anc(scoreOf(st.cca,Math.max(st.ccl,1),st.cqn,st.ccn,st.ni,st.mo).risk);
    if(st.mo===12 && sepRisk==null) sepRisk=r;   // ก.ย. แรกเท่านั้น (horizon ขยายอาจผ่าน ก.ย. สองรอบ)
    if(st.ccn<=0 && cashOut==null) cashOut=k;
    endRisk=r;
  }
  return {sepRisk,endRisk,cashOut,niM,revMo:exRevMo(h),moeMo:exMoeMo(h),xmoeMo:exXmoeOn()?exXmoeMo(h):0};
}
// ── Solver: เงินก้อนขั้นต่ำ (เดือน 0) ให้ ระดับ ณ ก.ย.≤เป้า และปลาย horizon≤เป้า และเงินสดไม่หมด ──
function exSolve(h){
  const L=EXST.tgt;
  const pass=v=>{ const r=exSimPath(h,v); return (r.sepRisk==null||r.sepRisk<=L)&&r.endRisk<=L&&r.cashOut==null; };
  if(pass(0)) return 0;
  const HI=Math.max(2*h.bs.cl, 400e6);
  if(!pass(HI)) return null;
  let lo=0, hi=HI;
  while(hi-lo>SV_STEP){
    const mid=Math.round((lo+hi)/2/SV_STEP)*SV_STEP;
    if(mid<=lo||mid>=hi) break;
    if(pass(mid)) hi=mid; else lo=mid;
  }
  return hi;
}

    <div class="acctbl-wrap" style="max-height:260px;margin-top:6px">

function exBuildTSV(items, horLab){
  const M=v=>v==null?'':(v/1e6).toFixed(2);
  const head=['จังหวัด','โรงพยาบาล','ประเภท','ระดับปัจจุบัน','รายรับจำลอง/เดือน(ลบ.)','MOE กองเศรษฐฯ/เดือน(ลบ.)','คชจ.นอกนิยาม/เดือน(ลบ.)','NIจำลอง/เดือน(ลบ.)','เงินสดหมดเดือนที่','ระดับก่อนช่วย','เงินสนับสนุน(ลบ.)','ระดับหลังช่วย ณ '+horLab].join('\t');
  const lines=items.map(({h,need,inj,r0,r1})=>[h.prov||'',h.name,h.type,h.risk!=null?h.risk:'',M(r0.revMo),M(r0.moeMo),M(r0.xmoeMo),M(r0.niM),r0.cashOut!=null?r0.cashOut:'-',r0.sepRisk!=null?r0.sepRisk:'-',need==null?'ไม่พอ':M(inj),r1.sepRisk!=null?r1.sepRisk:'-'].join('\t'));
  const tot=['รวม','','','','','','','','','',M(items.reduce((s,x)=>s+(x.inj||0),0)),''].join('\t');
  return [head,...lines,tot].join('\n');
}
function exCopyTSV(){
  const done=ok=>{ const el=document.getElementById('exCopyMsg'); if(el) el.textContent=ok?'คัดลอกแล้ว ✓':'คัดลอกไม่ได้'; };
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(EX_TSV).then(()=>done(true),()=>done(false));
  else done(false);
}

              <li>พัฒนาระบบข้อมูลเชื่อม TPS-Planfin-Unit cost-HDC เพื่อแก้ปัญหาก่อนเกิดวิกฤต</li></ul></td></tr>
      </table>
      </div>
    </div>
  </details>`;
}

function narrative(s, h){
  const trig=s.triggers||[];
  const TRIG_TH={cr:'Current Ratio',qr:'Quick Ratio',cash:'Cash Ratio',nwc:'เงินทุนหมุนเวียนสุทธิติดลบ',ni:'ขาดทุนสะสม',survival:'ระยะเวลาอยู่รอดสั้น'};
  const d=(s.risk||0)-(s.riskPrev3??s.risk??0);
  const trend = d>0?`แย่ลงจาก ${s.riskPrev3} เป็น ${s.risk} ใน 3 เดือน`:d<0?`ดีขึ้นจาก ${s.riskPrev3} เป็น ${s.risk} ใน 3 เดือน`:`คงที่ที่ ${s.risk} คะแนน มา 3 เดือน`;
  let cause='';
  const acc=(h.topAccounts[periodMode]||h.topAccounts.mom||{}).accounts||[];
  if(acc.length){
    const top=acc[0];
    cause=` สาเหตุหลักที่ขยับแรงสุด: ${top.name} (${top.cls==='CA'?'สินทรัพย์':'หนี้สิน'}) เปลี่ยน ${top.delta>0?'+':''}${fmtM(top.delta)} บาท`;
  }
  const cls = (s.risk||0)>=6?'bad':(s.risk||0)>=3?'mid':'good';
  const trigTxt = trig.length? `จุดที่พลาดเกณฑ์: ${trig.map(t=>TRIG_TH[t]||t).join(', ')}.` : 'ผ่านทุกเกณฑ์ในงวดนี้';
  return {cls, text:`${h.name} ระดับความเสี่ยง ${s.risk??'-'}/7 (${trend}) — ${trigTxt}${cause}`};
}

// ── Gap-to-Target Solver ────────────────────────────────────
// จำลองคะแนน Risk จากค่าดิบงบดุล+P&L ตามสูตรเดียวกับ pipeline (export_risk_link.py)
function scoreOf(ca, cl, qn, cn, ni, mo){
  if(!cl) return null;
  const cr=ca/cl, qr=qn/cl, cash=cn/cl, nwc=ca-cl;
  const li=(cr<1.5?1:0)+(qr<1.0?1:0)+(cash<0.8?1:0);
  const st=(nwc<0?1:0)+(ni<0?1:0);
  const m=mo>0?mo:12;
  const np=nwc>=0, ip=ni>=0;
  let su;
  if(np&&ip) su=0;
  else if(!np&&!ip) su=2;
  else if(np&&!ip){ const a=Math.abs(ni)/m; const s=a?nwc/a:1e9; su=s<3?2:s<6?1:0; }
  else { const a=ni/m; const r=a?(-nwc)/a:1e9; su=r<3?0:r<6?1:2; }
  return {cr,qr,cash,nwc,li,st,su,risk:li+st+su};
}
// ลำดับปิดช่องว่าง flow-first → คืน milestone + คะแนนที่จำลองได้
function buildLadder(t, mo){
  let ca=t.ca, cl=t.cl, qn=t.qn, cn=t.cn, ni=t.ni;
  const steps=[]; let flow=0, stock=0;
  if(ni<0){ flow+=(-ni); ni=0;
    steps.push({label:'หยุดเลือด — ทำ NI สะสมให้ ≥ 0', type:'FLOW', flow, stock, sc:scoreOf(ca,cl,qn,cn,ni,mo)}); }
  if(ca-cl<0){ const d=cl-ca; stock+=d; ca+=d; cn+=d; qn+=d;
    steps.push({label:'พ้นกับดักอยู่รอด — ล้าง NWC ให้เป็นบวก', type:'STOCK', flow, stock, sc:scoreOf(ca,cl,qn,cn,ni,mo)}); }
  const s2=scoreOf(ca,cl,qn,cn,ni,mo);
  if(s2 && s2.li>0){
    const need=Math.max(1.5*cl-ca, 0.8*cl-cn, cl-qn, 0);
    if(need>0){ stock+=need; ca+=need; cn+=need; qn+=need; }
    steps.push({label:'เข้าเกณฑ์สภาพคล่องครบ (CR/QR/Cash)', type:'STOCK', flow, stock, sc:scoreOf(ca,cl,qn,cn,ni,mo)});
  }
  return steps;
}
function monthlyNI(tr){
  const out=[];
  for(let i=0;i<tr.length;i++){
    const mm=tr[i].t%100;
    if(tr[i].ni==null){out.push(null);continue}
    if(mm===1){out.push(tr[i].ni);continue}
    const p=tr[i-1];
    out.push(p&&p.t===tr[i].t-1&&p.ni!=null?tr[i].ni-p.ni:null);
  }
  return out;
}
function renderGapSolver(h, s){
  const box=document.getElementById('gapBox'); if(!box) return;
  const t=h.trend[h.trend.length-1];
  if(!t || t.cl==null || !t.cl){ box.innerHTML='<div class="note">งวดนี้ไม่มีค่าดิบงบดุล (ตัวส่วนเป็น 0 หรือ shard เวอร์ชันเก่า)</div>'; return; }
  const mo=t.t%100;
  // ยึดคะแนนทางการที่ badge/chips แสดง (s.*) เป็นสถานะปัจจุบัน — ใช้ scoreOf(GL) เป็น "ฐาน" คำนวณ delta ของการจำลองเท่านั้น
  // (กันกรณี boundary เช่น QR≈1.0 ที่ค่า reported กับ GL ต่างกันเล็กน้อยจนคะแนนต่างกัน 1 → เครื่องมือต้องไม่ขัดกับ badge)
  const base=scoreOf(t.ca,t.cl,t.qn,t.cn,t.ni,mo);
  const trig=new Set(s.triggers||[]);
  const sRisk=s.risk||0;
  const anc=v=>Math.max(0,Math.min(7, sRisk + (v - base.risk)));  // map คะแนนจำลอง → ฐานทางการ
  const monthsLeft=Math.max(1,12-mo), sepLab=tLab(Math.floor(t.t/100)*100+12);  // เส้นตาย = ก.ย. ปีงบนี้ (ตรงกับ Survival)
  const CR_T=1.5,QR_T=1.0,CASH_T=0.8;
  const rows=[
    {name:'Current Ratio',val:fmtR(s.cr),th:'≥ 1.5',fail:trig.has('cr'),type:'STOCK',
     opt:`เพิ่มสินทรัพย์หมุนเวียน <b>+${fmtM(CR_T*t.cl-t.ca)}</b> หรือ ลดหนี้หมุนเวียน <b>−${fmtM(t.cl-t.ca/CR_T)}</b>`,
     head:`เกิน ${fmtR((s.cr||0)-CR_T)}`,tt:'**สูตร**: CR = สินทรัพย์หมุนเวียน (1001X) ÷ หนี้สินหมุนเวียน (1001Y)\n**ข้อมูลจาก**: งบทดลองหมวด 1/2 ยอดคงเหลือปลายงวด'},
    {name:'Quick Ratio',val:fmtR(s.qr),th:'≥ 1.0',fail:trig.has('qr'),type:'STOCK',
     opt:`เพิ่มสินทรัพย์เร็ว <b>+${fmtM(QR_T*t.cl-t.qn)}</b> หรือ ลดหนี้หมุนเวียน <b>−${fmtM(t.cl-t.qn/QR_T)}</b>`,
     head:`เกิน ${fmtR((s.qr||0)-QR_T)}`,tt:'**สูตร**: QR = สินทรัพย์เร็ว (1002X, ไม่รวมสินค้าคงเหลือ) ÷ หนี้สินหมุนเวียน (1001Y)\n**ข้อมูลจาก**: งบทดลองหมวด 1/2'},
    {name:'Cash Ratio',val:fmtR(s.cash),th:'≥ 0.8',fail:trig.has('cash'),type:'STOCK',
     opt:`เพิ่มเงินสด+เงินฝาก <b>+${fmtM(CASH_T*t.cl-t.cn)}</b> หรือ ลดหนี้หมุนเวียน <b>−${fmtM(t.cl-t.cn/CASH_T)}</b>`,
     head:`เกิน ${fmtR((s.cash||0)-CASH_T)}`,tt:'**สูตร**: Cash = เงินสด+เงินฝาก (1003X) ÷ หนี้สินหมุนเวียน (1001Y)\n**ข้อมูลจาก**: งบทดลองหมวด 1/2'},
    {name:'NWC เงินทุนหมุนเวียนสุทธิ',val:fmtM(s.nwc),th:'≥ 0',fail:trig.has('nwc'),type:'STOCK',
     opt:`ปิดช่องว่าง <b>+${fmtM(Math.max(0,-s.nwc))}</b> (เพิ่มสินทรัพย์ฯ หรือลดหนี้ฯ)`,
     head:`บวกอยู่ ${fmtM(s.nwc)}`,tt:'**สูตร**: NWC = สินทรัพย์หมุนเวียน (1001X) − หนี้สินหมุนเวียน (1001Y)\n**ข้อมูลจาก**: งบทดลองหมวด 1/2 — ติดลบ = เข้าเกณฑ์ ST ด้วย'},
    {name:'NI กำไร/ขาดทุนสะสม',val:fmtM(s.ni),th:'≥ 0',fail:trig.has('ni'),type:'FLOW',
     opt:`กำไรสะสมต้องเพิ่มรวม <b>+${fmtM(Math.max(0,-s.ni))}</b> ภายใน ${sepLab} <span class="note">= <b>+${fmtM(Math.max(0,-s.ni)/monthsLeft)}/เดือน</b> อีก ${monthsLeft} เดือน (ตรงกับสไลด์ NI ใน Survival)</span>`,
     head:`กำไรอยู่ ${fmtM(s.ni)}`,tt:'**สูตร**: NI = รายได้รวม (3006Y) − ค่าใช้จ่ายรวม (3010X) สะสมตั้งแต่ต้นปีงบ\n**ข้อมูลจาก**: งบทดลองหมวด 4/5 — ตัวเดียวที่เป็น FLOW แก้ได้จากกำไรรายเดือน'},
    {name:'SU คะแนนอยู่รอด',val:s.su,th:'= 0',fail:(s.su||0)>0,type:'STOCK',
     opt:`ต้องมี <b>NWC ≥ 0 และ NI ≥ 0 พร้อมกัน</b> (SU จะลดทันทีเมื่อพ้น 2 เงื่อนไขนี้)`,
     head:`ปลอดภัย`,tt:'**สูตร**: SU 4-quadrant — NWC≥0&NI≥0→0(ปลอดภัย) · ทั้งคู่ติดลบ→2(แย่สุด) · ผสมกัน→ดูจำนวนเดือนที่จะหมด/ฟื้น\n**ข้อมูลจาก**: คำนวณจาก NWC และ NI ด้านบน'},
  ];
  const tbl=`<table class="gaptbl">
    <tr><th class="l">เกณฑ์</th><th>ค่าปัจจุบัน</th><th>เกณฑ์ผ่าน</th><th class="l">ต้องทำเท่าไหร่ถึงผ่าน</th><th>ชนิด</th><th>สถานะ</th></tr>
    ${rows.map(r=>`<tr class="${r.fail?'':'pass-row'}">
      <td class="l">${r.name} ${tip(r.tt)}</td>
      <td class="${r.fail?'gp-fail':'gp-pass'}">${r.val}</td>
      <td>${r.th}</td>
      <td class="opt">${r.fail?r.opt:'<span class="gp-pass">✓ '+r.head+'</span>'}</td>
      <td>${r.fail?`<span class="lvchip ${r.type==='FLOW'?'flow':'stock'}">${r.type}</span>`:'—'}</td>
      <td class="${r.fail?'gp-fail':'gp-pass'}">${r.fail?'✗':'✓'}</td>
    </tr>`).join('')}
  </table>`;

  // ── headline + ladder ──
  const steps=buildLadder(t, mo);
  let hl, ladderHtml='', noteHtml='';
  if(sRisk<=0){
    hl=`<div class="gap-hl done">✓ ${h.name} ผ่านทุกเกณฑ์ในงวดนี้ (Risk 0) — ตารางด้านล่างแสดง "ระยะห่างเหนือเกณฑ์" ของแต่ละตัว เพื่อเฝ้าระวังไม่ให้หลุดกลับ</div>`;
  }else{
    const first=steps[0];
    if(first && first.type==='FLOW'){
      const monthsLeft=Math.max(1,12-mo);
      const req=(-s.ni)/monthsLeft;
      hl=`<div class="gap-hl flow">เกณฑ์แรกที่ควรโจมตี = <b>NI (กำไร)</b> ซึ่งอยู่ในมือ รพ. — ห่างเป้าแค่ <b>${fmtM(-s.ni)}</b> ≈ +${fmtM(req)}/เดือน อีก ${monthsLeft} เดือน แล้วคะแนนจะลดจาก ${sRisk} → ${anc(first.sc.risk)} ทันที (ST ลด 1)</div>`;
    }else if(first){
      hl=`<div class="gap-hl stock">งวดนี้เกณฑ์ที่เหลือเป็น <b>STOCK</b> (ต้องใช้เงินก้อน/ปรับหนี้) — ก้อนแรก ${fmtM(first.stock)} จะลดคะแนน ${sRisk} → ${anc(first.sc.risk)}</div>`;
    }
    // ladder rungs: เริ่มจากคะแนนทางการ (badge) แล้วไล่ตาม milestone (คะแนน = ฐานทางการ + delta จำลอง)
    const startBadge=`<div class="rung">
      <div class="rbadge" style="background:${riskColor(sRisk)}">${sRisk}</div>
      <div class="rmain"><div class="rl">คะแนนปัจจุบัน (LI ${s.li} + ST ${s.st} + SU ${s.su})</div>
      <div class="rs">พลาด ${(s.li||0)+(s.st||0)+((s.su||0)>0?1:0)} กลุ่มเกณฑ์</div></div>
      <div class="rcost"></div></div>`;
    const rungs=steps.map((st_,i)=>{
      const prevDisp=i===0?sRisk:anc(steps[i-1].sc.risk);
      const disp=anc(st_.sc.risk);
      const drop=prevDisp-disp;
      const costHtml=`${st_.flow>0?`<span class="cf">กำไร +${fmtM(st_.flow)}</span>`:''}${st_.flow>0&&st_.stock>0?'<br>':''}${st_.stock>0?`<span class="cs">เงินก้อน +${fmtM(st_.stock)}</span>`:''}<span class="cl">สะสมรวม</span>`;
      return `<div class="rung">
        <div class="rbadge" style="background:${riskColor(disp)}">${disp}</div>
        <div class="rmain"><div class="rl">${st_.label}</div>
          <div class="rs">${st_.type==='FLOW'?'FLOW · ทำเองได้':'STOCK · ต้องการทรัพยากร'} → ลด ${drop} คะแนน${drop>=2?' · <b>ลดหลายคะแนนพร้อมกันเพราะปลดล็อก SU</b>':''}</div></div>
        <div class="rcost">${costHtml}</div></div>`;
    }).join('');
    ladderHtml=`<div class="wf-title" style="margin-top:14px">บันไดลดคะแนน Risk (จำลอง)</div><div class="ladder">${startBadge}${rungs}</div>`;
  }

  // ── NI capability note (เฉพาะเมื่อ NI ยังติดลบ) ──
  if(s.ni<0){
    const mn=monthlyNI(h.trend).slice(-6);
    const vals=mn.filter(v=>v!=null);
    const mx=Math.max(1,...vals.map(v=>Math.abs(v)));
    const spark=`<span class="spark">${mn.map(v=>{
      if(v==null)return '<i style="height:2px;background:var(--line)"></i>';
      const hgt=Math.round(Math.abs(v)/mx*18)+2;
      return `<i title="${fmtM(v)}" style="height:${hgt}px;background:${v>=0?'var(--green)':'var(--red)'}"></i>`;
    }).join('')}</span>`;
    const last3=monthlyNI(h.trend).slice(-3).map(v=>v==null?'—':(v>0?'+':'')+fmtM(v));
    noteHtml=`<div class="gap-note">💡 <b>NI เป็นคันโยก FLOW เพียงตัวเดียว</b> — กำไรรายเดือน 6 งวดล่าสุด ${spark} (เขียว=กำไร แดง=ขาดทุน) · 3 เดือนล่าสุด: ${last3.join(' / ')} ล้านบาท<br>
    เมื่อ NI สะสมพลิกบวก คะแนน ST จะลด 1 แต่ <b>SU มักยังค้างที่ 2</b> เพราะเวลาที่กำไรจะดัน NWC กลับบวกยังนานเกิน 6 เดือน — ต้องแก้ NWC (STOCK) ควบคู่ SU จึงจะปลดล็อก</div>`;
  }

  box.innerHTML=hl+tbl+ladderHtml+noteHtml;
}

// ── NI Bridge: สะพานกำไร 3 ชั้นทางการ (กองเศรษฐกิจสุขภาพ) ────────
function renderNITiers(h, s){
  const box=document.getElementById('niTierBox'); if(!box) return;
  const t=h.trend[h.trend.length-1];
  if(!t || t.rev==null || t.e33y==null){ box.innerHTML='<div class="note">งวดนี้ไม่มีค่าดิบรายได้/ค่าใช้จ่ายทางการ (shard เก่า)</div>'; return; }
  const niDep=t.rev-t.exp;        // 3007X = NI มีค่าเสื่อม (Risk ST/SU)
  const niNoDep=t.rev-t.e33y;     // 3006X = NI ไม่มีค่าเสื่อม
  const ebitda=t.e33x-t.e33y;     // 333  = EBITDA
  const dep=t.exp-t.e33y;         // ค่าเสื่อม (บวกกลับ)
  const invRev=t.rev-t.e33x;      // รายได้งบลงทุน (ตัดออก)
  const cls=v=>v>=0?'pos':'neg';
  const tiers=`<div class="ni-bridge">
    <div class="ni-tier ${cls(niDep)}"><div class="lbl">NI มีค่าเสื่อม ${tip('**สูตร**: 3007X = รายได้รวม (3006Y) − ค่าใช้จ่ายรวม (3010X)\n**ใช้ที่ไหน**: ตัวที่ป้อนเข้าเกณฑ์ Risk Score ฝั่ง ST/SU โดยตรง (เข้มสุด)')}<br><span>3007X · Risk ST/SU</span></div><div class="val">${fmtM(niDep)}</div></div>
    <div class="ni-op">+ ค่าเสื่อม<br><b>${fmtM(dep)}</b></div>
    <div class="ni-tier ${cls(niNoDep)}"><div class="lbl">NI ไม่มีค่าเสื่อม ${tip('**สูตร**: 3006X = รายได้รวม (3006Y) − ค่าใช้จ่ายไม่รวมค่าเสื่อม (3330Y)\n**ใช้ที่ไหน**: บวกค่าเสื่อม (ไม่ใช่เงินสด) กลับเข้าไป — ไม่ใช่เกณฑ์ Risk Score')}<br><span>3006X</span></div><div class="val">${fmtM(niNoDep)}</div></div>
    <div class="ni-op">− รายได้งบลงทุน<br><b>${fmtM(invRev)}</b></div>
    <div class="ni-tier ${cls(ebitda)}"><div class="lbl">EBITDA ${tip('**สูตร**: 333 = รายได้ไม่รวมงบลงทุน (3330X) − ค่าใช้จ่ายไม่รวมค่าเสื่อม (3330Y)\n**ใช้ที่ไหน**: ตัดทั้งค่าเสื่อมและรายได้งบลงทุนออก — วัดการดำเนินงานล้วนๆ')}<br><span>333</span></div><div class="val">${fmtM(ebitda)}</div></div>
  </div>`;
  let vtxt, vcls;
  if(niDep>=0){
    vcls='good'; vtxt=`<b>NI เป็นบวก ${fmtM(niDep)}</b> — ผ่านเกณฑ์ NI ของ ST อยู่แล้ว`;
    if(ebitda<0) vtxt+=` แต่ EBITDA ติดลบ ${fmtM(ebitda)} (พึ่งรายได้งบลงทุน ${fmtM(invRev)}) — ควรจับตาความยั่งยืน`;
  }else if(niNoDep>=0){
    if(ebitda>=0){ vcls='mid'; vtxt=`<b>ขาดทุน NI ${fmtM(niDep)} เกิดจากค่าเสื่อมราคา (ไม่ใช่เงินสด) ${fmtM(dep)} เป็นหลัก</b> — ทั้ง NI ไม่มีค่าเสื่อม (+${fmtM(niNoDep)}) และ EBITDA (${fmtM(ebitda)}) เป็นบวก การดำเนินงานยังสร้างเงินสดได้ · เกณฑ์ ST ยึดชั้นบนสุด (มีค่าเสื่อม) จึงจับติดลบ`; }
    else { vcls='mid'; vtxt=`<b>NI ${fmtM(niDep)} ติดลบเพราะค่าเสื่อม ${fmtM(dep)}</b> — NI ไม่มีค่าเสื่อมเป็นบวก (+${fmtM(niNoDep)}) แต่ EBITDA กลับติดลบ ${fmtM(ebitda)} เพราะกำไรก้อนนี้พึ่ง<b>รายได้งบลงทุน ${fmtM(invRev)}</b> ที่ไม่ประจำ — การดำเนินงานหลักเกือบเท่าทุน/ขาดทุนเล็กน้อย`; }
  }else{
    vcls='bad'; vtxt=`<b>ขาดทุนทุกชั้น</b> — แม้บวกกลับค่าเสื่อม (NI ไม่มีค่าเสื่อม ${fmtM(niNoDep)}) และตัดงบลงทุนเป็น EBITDA (${fmtM(ebitda)}) ก็ยังติดลบ — เป็นปัญหาการดำเนินงานจริง ไม่ใช่แค่ค่าเสื่อม/งบลงทุน`;
  }
  const hint = niDep<0 ? `<div class="note" style="margin-top:6px">📎 ถ้าเกณฑ์ ST ใช้ EBITDA แทน NI มีค่าเสื่อม รพ.นี้จะ${ebitda>=0?'<b style="color:var(--green)">ผ่าน</b>':'<b style="color:var(--red)">ยังไม่ผ่าน</b>'} — แต่เกณฑ์ทางการยึด NI มีค่าเสื่อม จึงยังนับเป็นความเสี่ยง</div>` : '';
  box.innerHTML=tiers+`<div class="ni-verdict ${vcls}">${vtxt}</div>`+hint;
}

// ── D: Survival Simulator — จำลองเส้นทางอยู่รอด (อิงสูตร SU ทางการ) ──
const SHOW_NET_CASH=false;  // ซ่อนส่วนเปรียบเทียบ "เงินบำรุงสุทธิหลังหักหนี้" ไว้ก่อน — ปรับเป็น true เพื่อเปิดกลับ
let SURV=null;
// สเกลแกน NI (±ล้าน/เดือน) และเงินก้อน (ล้าน) ตามระดับหน่วยบริการ — ค่าเป็นล้านบาท
function survLimits(h){
  const m=(h.grp||'').match(/\.(A|S|M1|M2|F1|F2|F3)(?=\s|$)/)||(h.grp||'').match(/(A|S|M1|M2|F1|F2|F3)/);
  const cls=m?m[1]:null;
  const T={A:[500,100],S:[300,80],M1:[150,60],M2:[100,40],F1:[60,30],F2:[40,25],F3:[25,15]};
  const [ni,inj]=T[cls]||[100,40];
  return {niLim:ni*1e6, injMax:inj*1e6, cls};
}
function buildSurvCtx(h, s){
  const t=h.trend[h.trend.length-1];
  if(!t || !t.cl || t.e33y==null) return null;
  const mo=t.t%100;
  const depMo=Math.max(0,(t.exp-t.e33y)/mo);   // ค่าเสื่อม/เดือน (run-rate ปัจจุบัน)
  const niRun=Math.round(t.ni/mo/50000)*50000; // NI/เดือน (ค่าเฉลี่ย YTD) ปัดหลักห้าหมื่น
  // anchor เดือน 0 ที่คะแนนทางการ (badge) — base = scoreOf(GL) ใช้คำนวณ delta จำลอง (กัน boundary mismatch)
  const base=scoreOf(t.ca,t.cl,t.qn,t.cn,t.ni,mo).risk;
  // หมวดรายได้/ค่าใช้จ่ายจริงของงวดนี้ (YTD) → อัตราเฉลี่ยต่อเดือน ใช้เป็นค่าตั้งต้นของป็อปอัปประมาณการรายหมวด
  // ใช้รหัส P ของ Planfin (map จากบัญชีจริง — export_planfin.py) ถ้ามี, ไม่งั้น fallback เป็นหมวดบัญชี (waterfall)
  let planRev=null, planExp=null, planSrc='gl';
  if(h.planfin && h.planfin.rev){
    const pm=(h.planfin.t%100)||mo;
    planSrc='planfin';
    planRev=h.planfin.rev.map(r=>({name:`${r.p} · ${r.name}`,mo:r.value/pm}));
    planExp=h.planfin.exp.map(r=>({name:`${r.p} · ${r.name}`,mo:r.value/pm}));
  } else {
    const wf=h.waterfall&&(h.waterfall.mom||h.waterfall.yoy);
    planRev=wf&&wf.rev?wf.rev.map(r=>({name:r.name,mo:r.value/mo})):null;
    planExp=wf&&wf.exp?wf.exp.map(r=>({name:r.name,mo:r.value/mo})):null;
  }
  // สเกลแกนปรับตามระดับหน่วยบริการ (A ใหญ่สุด → F3 เล็กสุด) เพื่อไม่ให้สเกลกว้างจนมองผลการเปลี่ยนแปลงไม่ออก
  const lim=survLimits(h);
  const NI_LIM=lim.niLim, INJ_MAX=lim.injMax;
  // หนี้สินหมุนเวียนรายหมวด (จ่ายชำระ/ก่อใหม่ ต่อเดือน) + ลูกหนี้ค้างรับ (เร่งเก็บ → เงินก้อน)
  const clbd=h.clBreakdown||null, recv=h.recv||null;
  const totalAR=recv?recv.reduce((s,r)=>s+(r.ar||0),0):0;
  // สเกลสไลด์ "จ่ายหนี้สุทธิ/เดือน": ±ความสามารถจ่ายรวม (Σ payMo) หรือ fallback ตามระดับ
  const DEBT_LIM=Math.max(clbd?Math.round((clbd.totalPay||0)/50000)*50000:0, INJ_MAX);
  return {ca:t.ca,cl:t.cl,qn:t.qn,cn:t.cn,ni:t.ni,mo,depMo,startT:t.t,official:(s.risk||0),base,planRev,planExp,planSrc,niLim:NI_LIM,injMax:INJ_MAX,cls:lim.cls,niRun,tgt:null,
        clbd,recv,totalAR,debtLim:DEBT_LIM,debtNetMo:0,acpFreed:0,acpMonth:1};
}

  const acpCtrl = (SURV.recv&&SURV.totalAR>0) ? `

        <button type="button" class="planfin-btn" onclick="openAcpPlan()">✎ ตั้งเป้าจำนวนเงิน+เดือน รายกองทุน</button></label>
        <input type="range" id="svAcp" min="0" max="${Math.round(SURV.totalAR/50000)*50000}" step="50000" value="0">
        <span class="surv-base">ลูกหนี้ค้างรับรวม <b>${fmtM(SURV.totalAR)}</b> · เก็บได้เร็วขึ้น = เงินสด+Cash Ratio ดีขึ้น (CA/QN/NWC เท่าเดิม) — เข้าเดือนที่ ${SURV.acpMonth} เป็นค่าเริ่มต้น ปรับได้ในป็อปอัป · <a href="#" onclick="svReset('acp');return false">ล้างเป็น 0</a></span></div>` : '';
  box.innerHTML=`
    <div class="tgt-box">
      <div class="tgt-title">🎯 ตั้งเป้าระดับวิกฤตภายใน <b>${sepLab}</b> (สิ้นปีงบ${moLeft>0?` · เหลือ ${moLeft} เดือน`:' · งวดนี้คือ ก.ย. แล้ว'}) — กดเลขระดับที่ต้องการ</div>
      <div class="lvlbtns">${[0,1,2,3,4,5,6,7].map(L=>`<button type="button" class="lvlbtn${L===curL?' cur':''}" data-l="${L}" style="background:${riskColor(L)}" onclick="svTarget(${L})">${L}</button>`).join('')}</div>
      <div class="tgt-legend">เลข<b>ต่ำกว่า</b>ปัจจุบัน = ต้องทำกำไร/เติมเงินก้อนเท่าไหร่ถึงจะลดลงไปถึงภายใน ${sepLab} · เลข<b>สูงกว่า</b> = เพดานขาดทุนเดือนละเท่าไหร่ก่อนจะตกลงไปถึง (รวม รพ.ระดับ 0 ที่อยากรู้ระยะปลอดภัย)</div>

        <input type="range" id="svNi" min="-${SURV.niLim}" max="${SURV.niLim}" step="50000" value="${clampNi(SURV.niRun)}">

  document.getElementById('svNi').oninput=projSurv;

  const aEl=document.getElementById('svAcp'); if(aEl) aEl.oninput=()=>{SURV.acpFreed=+aEl.value;projSurv();};
