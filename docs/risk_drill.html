let survChart=null;
// ── sim core: ใช้ร่วมทั้งกราฟจำลองและ Target Solver — พารามิเตอร์ (niM, inj, debtNetMo, acpFreed) ──
// inj = เงินก้อนภายนอก (เพิ่ม CA/QN/CN) · acpFreed = เร่งเก็บลูกหนี้ (เพิ่มเฉพาะเงินสด CN, CA คงที่)
// debtNetMo = เร่งชำระหนี้สุทธิ/เดือน (เงินสดและ CL ลดลงเท่ากัน — NWC คงที่)
// acpFreed ไม่ได้ฝังในสถานะเริ่มต้นอีกต่อไป — ฉีดเป็นก้อนเดียวตอนถึงเดือนที่ตั้งเป้า (ผ่าน simStep's acpAt)
function simState(inj){
  return {cca:SURV.ca+inj, ccn:SURV.cn+inj, cqn:SURV.qn+inj, ccl:SURV.cl, ni:SURV.ni, mo:SURV.mo};
}
// ทิศทางผลของการจ่าย/ยืดหนี้ต่อ CR/QR/Cash — พิสูจน์ทางคณิตศาสตร์: ลด(หรือเพิ่ม) เงินสด+CL เท่ากัน
// ⇒ ทิศทาง Δratio = sign(ตัวเศษ − CL) เมื่อเร่งจ่าย (กลับเครื่องหมายเมื่อยืดจ่าย) — ไม่ใช่ "CR ดีขึ้นเสมอ" ตามที่เคยเข้าใจผิด
// (รพ.วิกฤตส่วนใหญ่ CA/QN/CN < CL อยู่แล้ว ⇒ เร่งจ่ายหนี้กลับทำให้ CR/QR/Cash แย่ลงทั้งหมด แม้หนี้จะลดจริง)
function debtDirNote(accelerating){
  const dir=(x,cl)=>{ const up = accelerating ? x>cl : x<cl; return x===cl?'ไม่เปลี่ยน':(up?'ดีขึ้น':'แย่ลง'); };
  return `CR จะ<b>${dir(SURV.ca,SURV.cl)}</b> · QR จะ<b>${dir(SURV.qn,SURV.cl)}</b> · Cash Ratio จะ<b>${dir(SURV.cn,SURV.cl)}</b> (NWC/ST/SU ไม่เปลี่ยนเสมอ)`;
}
function simStep(st, niM, debtNetMo, acpAt){
  if(st.mo>=12){st.mo=1; st.ni=0;} else st.mo++;   // fiscal reset ที่ ต.ค.
  st.ni+=niM;
  const pay = debtNetMo>=0 ? Math.min(debtNetMo, st.ccl) : debtNetMo;  // เร่งจ่ายเกินยอดหนี้คงเหลือไม่ได้
  const cashMo = niM + SURV.depMo - pay;
  st.cca+=cashMo; st.ccn+=cashMo; st.cqn+=cashMo;
  st.ccl=Math.max(0, st.ccl - pay);
  if(acpAt) st.ccn += acpAt;   // เงินสดเข้าเป็นก้อนเดียวตอนถึงเดือนที่ตั้งเป้าเก็บลูกหนี้ (ไม่ใช่ทุกเดือน)
  return st;
}
// CL อาจถูกเร่งจ่ายจนเหลือ 0 → กันตัวส่วน 0 (ไม่มีหนี้ = ทุก ratio ผ่าน ไม่ใช่ข้อมูลหาย) ด้วย epsilon 1 บาท
function simScore(st){ return scoreOf(st.cca, Math.max(st.ccl,1), st.cqn, st.ccn, st.ni, st.mo); }
function projSurv(){
  if(!SURV) return;
  const niM=+document.getElementById('svNi').value;
  const inj=+document.getElementById('svInj').value;
  const debtNetMo=SURV.debtNetMo||0, acpFreed=SURV.acpFreed||0;
  const acpMonth=acpFreed>0?(SURV.acpMonth||1):0;   // ไม่มีเงินก้อน = ไม่มีเดือนเป้าหมาย
  document.getElementById('svNiLab').textContent=(niM>0?'+':'')+fmtM(niM);
  document.getElementById('svInjLab').textContent=fmtM(inj);
  const dLab=document.getElementById('svDebtLab'); if(dLab) dLab.textContent=(debtNetMo>0?'+':'')+fmtM(debtNetMo);
  const aLab=document.getElementById('svAcpLab'); if(aLab) aLab.textContent=acpFreed>0?`${fmtM(acpFreed)} · เข้าเดือนที่ ${acpMonth} (${tLab(addMo(SURV.startT,acpMonth))})`:fmtM(0);
  const anc=v=>Math.max(0,Math.min(7, SURV.official + (v - SURV.base)));  // จำลอง → ฐานทางการ
  const startRisk=SURV.official;   // เดือน 0 = คะแนนทางการ
  let st=simState(inj);
  if(acpMonth===0 && acpFreed>0) st.ccn+=acpFreed;   // เผื่อกรณีตั้งเป้าเป็น "เดือนนี้เลย"
  const r0=anc(simScore(st).risk);
  const path=[{k:0,risk:r0,cash:st.ccn,cl:st.ccl}];
  const crossDown={}, crossUp={}; let cashOut=st.ccn<=0?0:null;
  const HORIZON=24, cashMoApprox=niM+SURV.depMo-debtNetMo;
  for(let k=1;k<=HORIZON;k++){
    simStep(st, niM, debtNetMo, k===acpMonth?acpFreed:0);
    const rk=anc(simScore(st).risk);
    path.push({k,risk:rk,cash:st.ccn,cl:st.ccl});
    for(let L=startRisk-1;L>=0;L--) if(crossDown[L]==null && rk<=L) crossDown[L]=k;  // ถึงระดับดีขึ้น
    for(let L=startRisk+1;L<=7;L++) if(crossUp[L]==null && rk>=L) crossUp[L]=k;       // ตกไประดับแย่ลง
    if(st.ccn<=0 && cashOut==null) cashOut=k;
  }
  const pills=[];
  const at=k=>tLab(addMo(SURV.startT,k));
  if(startRisk<=0) pills.push(`<div class="surv-pill down"><span class="rb" style="background:${riskColor(0)}">0</span>ผ่านทุกเกณฑ์อยู่แล้ว (ระดับ 0)</div>`);
  for(let L=startRisk+1;L<=7;L++) if(crossUp[L]!=null)   // แย่ลง (ใกล้ตัวก่อน)
    pills.push(`<div class="surv-pill up"><span class="rb" style="background:${riskColor(L)}">${L}</span>แย่ลงสู่ระดับ ${L} ในอีก <b>${crossUp[L]}</b> เดือน (${at(crossUp[L])})</div>`);
  for(let L=startRisk-1;L>=0;L--) if(crossDown[L]!=null) // ดีขึ้น (ใกล้ตัวก่อน)
    pills.push(`<div class="surv-pill down"><span class="rb" style="background:${riskColor(L)}">${L}</span>ดีขึ้นสู่ระดับ ${L} ในอีก <b>${crossDown[L]}</b> เดือน (${at(crossDown[L])})</div>`);
  if(!pills.length) pills.push(`<div class="surv-pill">คะแนนคงที่ที่ ${startRisk} ตลอด ${HORIZON} เดือนที่จำลอง</div>`);
  if(acpFreed>0) pills.push(`<div class="surv-pill down">💰 คาดเก็บลูกหนี้ได้ <b>${fmtM(acpFreed)}</b> เป็นเงินสดในเดือนที่ ${acpMonth} (${at(acpMonth)})</div>`);
  if(cashOut===0) pills.push(`<div class="surv-pill out">🔴 เงินสด+เงินฝากติดลบอยู่แล้วตอนนี้</div>`);
  else if(cashOut!=null) pills.push(`<div class="surv-pill out">⚠️ เงินสด+เงินฝากหมดในอีก ${cashOut} เดือน (${at(cashOut)})${debtNetMo>0?' — จากเร่งชำระหนี้':''}${acpFreed>0&&cashOut<acpMonth?' (ก่อนเงินลูกหนี้จะเข้า)':''}</div>`);
  else if(cashMoApprox<0) pills.push(`<div class="surv-pill out">⚠️ เงินสด+เงินฝากลดลงเรื่อยๆ (${fmtM(cashMoApprox)}/เดือน)</div>`);
  document.getElementById('svSum').innerHTML=pills.join('');
  svTgtLive(niM, inj);
  drawSurvChart(path, crossDown, cashOut, startRisk);
}

// ── D++: Target Solver — เลือกระดับเป้าหมาย 0–7 → แก้สมการย้อนกลับหา NI/เงินก้อน ──
// เส้นตาย = งวด ก.ย. (เดือนงบที่ 12) ของปีงบปัจจุบัน ก่อน NI สะสมรีเซ็ตรอบ ต.ค.
const SV_STEP=50000;
function svSepLabel(){ return tLab(Math.floor(SURV.startT/100)*100+12); }
function sgnM(v){ return (v>0?'+':'')+fmtM(v); }
function svChip(v){ return `<span class="tgt-delta ${v>=0?'pos':'neg'}">(${sgnM(v)}/เดือน จากปัจจุบัน)</span>`; }
// จำลองด้วยสมมติฐานเดียวกับ projSurv แต่หยุดที่ ก.ย. — คืนคะแนน ณ ก.ย. + คะแนนแย่สุดระหว่างทาง
function svEvalSep(niM, inj){
  const anc=v=>Math.max(0,Math.min(7, SURV.official+(v-SURV.base)));
  const debtNetMo=SURV.debtNetMo||0, acpFreed=SURV.acpFreed||0;
  const acpMonth=acpFreed>0?(SURV.acpMonth||1):0;
  let st=simState(inj);
  if(acpMonth===0 && acpFreed>0) st.ccn+=acpFreed;
  let r=anc(simScore(st).risk), worst=r, k=0;
  while(st.mo<12){ k++; simStep(st, niM, debtNetMo, k===acpMonth?acpFreed:0); r=anc(simScore(st).risk); if(r>worst) worst=r; }
  return {sep:r, worst};
}
// binary search บนฟังก์ชัน monotone: lo ไม่ผ่าน, hi ผ่าน → ค่าต่ำสุด (step 50k) ที่ผ่าน
function svBin(passFn, lo, hi){
  while(hi-lo>SV_STEP){
    const mid=Math.round((lo+hi)/2/SV_STEP)*SV_STEP;
    if(mid<=lo||mid>=hi) break;
    if(passFn(mid)) hi=mid; else lo=mid;
  }
  return hi;
}
// NI/เดือนต่ำสุดที่ทำให้คะแนน ณ ก.ย. ≤ เป้า (เงินก้อนคงที่) — null = ไม่ทันแม้กำไรสูงมาก
function svSolveNI(L, inj){
  const HI=SURV.niLim*20, LO=-SURV.niLim*20;
  const pass=v=>svEvalSep(v,inj).sep<=L;
  if(!pass(HI)) return null;
  if(pass(LO)) return LO;
  return svBin(pass, LO, HI);
}
// เงินก้อนต่ำสุด ณ ตอนนี้ (NI/เดือนคงที่) — null = เติมเท่าไหร่ก็ไม่ถึง (เกณฑ์ NI สะสมแก้ด้วยเงินก้อนไม่ได้)
function svSolveInj(L, niM){
  const HI=1.6*SURV.cl+SURV.injMax*2;
  const pass=v=>svEvalSep(niM,v).sep<=L;
  if(!pass(HI)) return null;
  if(pass(0)) return 0;
  return svBin(pass, 0, HI);
}
// ฝั่งขาลง: NI/เดือนต่ำสุดที่ "ยังไม่ตก" ถึงระดับ L ภายใน ก.ย. — null = ขาดทุนหนักแค่ไหนก็ยังไม่ตกทัน
function svSolveDown(L){
  const HI=SURV.niLim*20, LO=-SURV.niLim*20;
  const pass=v=>svEvalSep(v,0).worst<L;
  if(pass(LO)) return null;
  if(!pass(HI)) return HI;
  return svBin(pass, LO, HI);
}
// ── ภาพรวม Watchlist: หา 3 แนวทางของ รพ.เดียว ตามเป้า L ใช้ตรรกะเดียวกับ renderTgtCard ──
// สลับ SURV ชั่วคราวเพื่อใช้ svSolveNI/svSolveInj/svEvalSep ซ้ำได้ตรงๆ (JS single-thread จึงปลอดภัย)
// opts (ถ้ามี): คันโยกแผนรายแห่ง — acpFreed/acpMonth (เร่งเก็บลูกหนี้→เงินสดเข้าเดือนที่ตั้ง),
// debtNetMo (+เร่งจ่าย/−ยืดจ่ายหนี้ต่อเดือน), alpha (สมดุลผสม 0=กำไรล้วน..1=เงินก้อนล้วน; 0.5=สูตร midpoint เดิม)
function ovLeverCtx(ctx, opts){
  if(!opts) return ctx;
  return {...ctx, acpFreed:opts.acpFreed||0, acpMonth:opts.acpMonth!=null?opts.acpMonth:1, debtNetMo:opts.debtNetMo||0};
}
function solveTargetFor(ctx, L, opts){
  const prev=SURV; SURV=ovLeverCtx(ctx, opts);
  try{
    const run=ctx.niRun, cur=ctx.official;
    if(L===cur) return {status:'atlevel', run};
    if(L>cur){ const floor=svSolveDown(L); return {status:floor==null?'safe':'ceiling', run, floor}; }  // เป้า=7 (สูงกว่าปัจจุบัน) = เพดานขาดทุนก่อนตกไป 7 ไม่ใช่แผนปรับปรุง
    if(svEvalSep(run,0).sep<=L) return {status:'already', run};
    const niReq=svSolveNI(L,0);
    const injOnly=svSolveInj(L,run);
    const niHigh=niReq!=null?niReq:run+ctx.niLim;
    const alpha=(opts&&opts.alpha!=null)?opts.alpha:0.5;   // 0.5 = midpoint เดิมเป๊ะ
    const niMid=Math.round((run+(1-alpha)*(niHigh-run))/SV_STEP)*SV_STEP;
    const injMid=niMid>run?svSolveInj(L,niMid):(alpha>=1?injOnly:null);
    return {status:'ok', run, niReq, injOnly, niMid, injMid};
  } finally { SURV=prev; }
}
// คะแนน ณ ก.ย. ของ "แผนที่เลือกจริง" (ni/inj + คันโยก) — ใช้ยืนยันรายแถวว่าแผนถึงเป้า
function evalPlanFor(ctx, opts, niM, inj){
  const prev=SURV; SURV=ovLeverCtx(ctx, opts);
  try{ return svEvalSep(niM, inj).sep; } finally { SURV=prev; }
}
function svTarget(L){
  if(!SURV) return;
  SURV.tgt=(SURV.tgt===L?null:L);
  document.querySelectorAll('.lvlbtn').forEach(b=>b.classList.toggle('on', SURV.tgt===+b.dataset.l));
  renderTgtCard();
  projSurv();
}
function svApply(niM, inj){
  const ni=Math.max(-SURV.niLim,Math.min(SURV.niLim,Math.round(niM/SV_STEP)*SV_STEP));
  const ij=Math.max(0,Math.min(SURV.injMax,Math.round(inj/SV_STEP)*SV_STEP));
  document.getElementById('svNi').value=ni;
  document.getElementById('svInj').value=ij;
  projSurv();
  const c=document.getElementById('survChart');
  if(c) c.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function renderTgtCard(){
  const el=document.getElementById('tgtCard'); if(!el) return;
  const L=SURV.tgt;
  if(L==null){ el.innerHTML=''; return; }
  const cur=SURV.official, sep=svSepLabel(), left=12-SURV.mo, run=SURV.niRun;
  const rb=`<span class="tgt-rb" style="background:${riskColor(L)}">${L}</span>`;
  if(L===cur){
    el.innerHTML=`<div class="tgt-card"><span class="tgt-note">ระดับ ${L} คือระดับปัจจุบัน — กดเลข<b>ต่ำกว่า</b>เพื่อดูเส้นทางลดวิกฤต หรือเลข<b>สูงกว่า</b>เพื่อดูเพดานขาดทุนก่อนตกระดับ</span></div>`;
    return;
  }
  // ── ฝั่งขาลง (เป้าสูงกว่าปัจจุบัน) = เพดานขาดทุน ──
  if(L>cur){
    const floor=svSolveDown(L);
    let body;
    if(floor==null){
      body=`<div class="tgt-row">🛡️ ภายใน ${sep} นี้ <b>ยังไม่ตกถึงระดับ ${L}</b> แม้ขาดทุนหนักสุดในสเกลที่จำลอง (−${fmtM(SURV.niLim*20)}/เดือน) — เกณฑ์ฝั่งโครงสร้าง (CR/QR/Cash/NWC) ใช้เวลากัดกร่อนนานกว่าเวลาที่เหลือ${left===0?' (งวดนี้คือ ก.ย. แล้ว)':''}</div>`;
    } else if(floor>run){
      body=`<div class="tgt-row">⚠️ อัตราปัจจุบัน <b>${sgnM(run)}</b>/เดือน <span class="tgt-warn">จะพาไปแตะระดับ ${L} ภายใน ${sep}</span> — ต้องทำให้ได้อย่างน้อย <b>${sgnM(floor)}</b>/เดือน ${svChip(floor-run)} เพื่อไม่ตก
        <button type="button" class="tgt-apply" onclick="svApply(${floor},0)">▶ วางค่ากันตกลงกราฟ</button></div>`;
    } else {
      body=`<div class="tgt-row">🛡️ เพดานขาดทุน: ถ้า NI ต่ำกว่า <b>${sgnM(floor)}</b>/เดือน ${svChip(floor-run)} จะตกไประดับ ${L} ภายใน ${sep} · ตอนนี้เฉลี่ย <b>${sgnM(run)}</b>/เดือน ยังมีระยะห่าง <b>${fmtM(run-floor)}</b>/เดือน
        <button type="button" class="tgt-apply" onclick="svApply(${floor-SV_STEP},0)">▶ ดูภาพถ้าหลุดเพดาน</button></div>`;
    }
    el.innerHTML=`<div class="tgt-card"><h4>${rb} เพดานก่อนตกไประดับ ${L} ภายใน ${sep}</h4>${body}
      <div class="tgt-row tgt-note" style="border-top:1px dashed var(--line)">สมมติฐานเดียวกับกราฟจำลองด้านล่าง · เส้นตาย = งวด ก.ย. (เดือนงบที่ 12) ก่อน NI สะสมรีเซ็ตรอบปีงบใหม่</div></div>`;
    return;
  }
  // ── ฝั่งขาขึ้น (เป้าต่ำกว่าปัจจุบัน) = ต้องทำเท่าไหร่ ──
  const alreadyOk=svEvalSep(run,0).sep<=L;
  const niReq=svSolveNI(L,0);
  const injOnly=svSolveInj(L,run);
  const rows=[];
  if(alreadyOk){
    const floor=svSolveNI(L,0);
    rows.push(`<div class="tgt-row">✅ อัตรากำไรเฉลี่ยปัจจุบัน <b>${sgnM(run)}</b>/เดือน <b style="color:var(--green)">ถึงระดับ ${L} ภายใน ${sep} อยู่แล้ว</b>${floor!=null&&floor>-SURV.niLim*20?` · แต่ห้ามต่ำกว่า <b>${sgnM(floor)}</b>/เดือน ${svChip(floor-run)}`:''}</div>`);
  } else {
    // 1) กำไรอย่างเดียว — โชว์ตัวเลขจริงเสมอ แม้เกินสเกล/เว่อร์ ให้เห็นภาพว่าห่างแค่ไหน
    if(niReq==null){
      rows.push(`<div class="tgt-row">💪 กำไรอย่างเดียว: <span class="tgt-warn">ไม่ทันภายใน ${sep}</span>${left===0?' (งวดนี้คือ ก.ย. แล้ว — NI รายเดือนไม่มีผลทัน)':' — เกณฑ์ฝั่งเงินก้อน/โครงสร้างลึกเกินกว่ากำไรสะสมในเวลาที่เหลือ'} → ใช้เงินก้อนตามแถวถัดไป</div>`);
    } else {
      rows.push(`<div class="tgt-row">💪 กำไรอย่างเดียว: ต้องทำ ≥ <b>${sgnM(niReq)}</b>/เดือน ${svChip(niReq-run)}${Math.abs(niReq)>SURV.niLim?' <span class="tgt-note">· เกินสเกลสไลด์บาร์ (แสดงตัวเลขจริง)</span>':''}
        <button type="button" class="tgt-apply" onclick="svApply(${niReq},0)">▶ วางลงกราฟ</button></div>`);
    }
    // 2) เงินก้อนอย่างเดียว (คงกำไรเฉลี่ยปัจจุบัน)
    if(injOnly==null){
      rows.push(`<div class="tgt-row">💰 เติมเงินก้อนอย่างเดียว (คงกำไรเฉลี่ย ${sgnM(run)}/เดือน): <span class="tgt-warn">เติมเท่าไหร่ก็ไม่ถึง</span> — เกณฑ์กำไร/ขาดทุนสะสม (NI) แก้ด้วยเงินก้อนไม่ได้ ต้องเพิ่มกำไรร่วมด้วย</div>`);
    } else {
      rows.push(`<div class="tgt-row">💰 เติมเงินก้อนอย่างเดียว (คงกำไรเฉลี่ย ${sgnM(run)}/เดือน): เติม ≥ <b>${fmtM(injOnly)}</b> ตอนนี้${injOnly>SURV.injMax?' <span class="tgt-note">· เกินสเกลสไลด์บาร์ (แสดงตัวเลขจริง)</span>':''}
        <button type="button" class="tgt-apply" onclick="svApply(${run},${injOnly})">▶ วางลงกราฟ</button></div>`);
    }
    // 3) ทางสายกลาง — กำไรครึ่งทาง + เงินก้อนเท่าที่ยังขาด
    const niHigh=niReq!=null?niReq:run+SURV.niLim;
    const niMid=Math.round((run+niHigh)/2/SV_STEP)*SV_STEP;
    if(niMid>run){
      const injMid=svSolveInj(L,niMid);
      if(injMid!=null&&injMid>0){
        rows.push(`<div class="tgt-row">⚖️ แนวทางผสม: กำไร <b>${sgnM(niMid)}</b>/เดือน ${svChip(niMid-run)} <b>+</b> เติมเงินก้อน <b>${fmtM(injMid)}</b> ตอนนี้
          <button type="button" class="tgt-apply" onclick="svApply(${niMid},${injMid})">▶ วางลงกราฟ</button></div>`);
      }
    }
  }
  el.innerHTML=`<div class="tgt-card"><h4>${rb} เป้าหมาย: ลดจากระดับ ${cur} → ${L} ภายใน ${sep}${left>0?` (เหลือ ${left} เดือน)`:''}</h4>
    ${rows.join('')}
    <div class="tgt-live" id="tgtLive"></div>
    <div class="tgt-row tgt-note" style="border-top:1px dashed var(--line)">สมมติฐานเดียวกับกราฟจำลองด้านล่าง (กระแสเงินสด = NI + ค่าเสื่อม, หนี้คงที่) · เส้นตาย = งวด ก.ย. (เดือนงบที่ 12) ก่อน NI สะสมรีเซ็ตรอบปีงบใหม่</div></div>`;
  svTgtLive(+document.getElementById('svNi').value, +document.getElementById('svInj').value);
}
// แถบสด: ขยับสไลด์ NI แล้วบอกทันทีว่าต้องเติมเงินก้อนอีกเท่าไหร่ถึงจะถึงเป้าที่เลือก
function svTgtLive(niM, inj){
  const el=document.getElementById('tgtLive'); if(!el||!SURV) return;
  const L=SURV.tgt;
  if(L==null||L>=SURV.official){ el.style.display='none'; return; }
  el.style.display='';
  const sep=svSepLabel();
  const niTxt=`🎚️ NI ตามสไลด์บาร์ <b>${sgnM(niM)}</b>/เดือน`;
  const need=svSolveInj(L,niM);
  if(need==null) el.innerHTML=`${niTxt} → <span class="tgt-warn">เติมเงินก้อนเท่าไหร่ก็ไม่ถึงระดับ ${L} ภายใน ${sep}</span> — เลื่อนกำไรขึ้นก่อน`;
  else if(need===0&&inj===0) el.innerHTML=`${niTxt} → <b style="color:var(--green)">ถึงระดับ ${L} ภายใน ${sep} โดยไม่ต้องเติมเงินก้อน ✓</b>`;
  else if(need<=inj) el.innerHTML=`${niTxt} + เงินก้อนที่ตั้งไว้ <b>${fmtM(inj)}</b> → <b style="color:var(--green)">ถึงระดับ ${L} ภายใน ${sep} ✓</b>${need<inj?` <span class="tgt-note">(ขั้นต่ำจริงๆ แค่ ${fmtM(need)})</span>`:''}`;
  else el.innerHTML=`${niTxt} → ต้องเติมเงินก้อน ≥ <b>${fmtM(need)}</b> ตอนนี้ <span class="tgt-note">(ตั้งไว้ ${fmtM(inj)} · ขาดอีก ${fmtM(need-inj)})</span>`;
}
function addMo(t, k){ let y=Math.floor(t/100), m=t%100+k; y+=Math.floor((m-1)/12); m=((m-1)%12)+1; return y*100+m; }

// ── D+: ป็อปอัปประมาณการ NI รายหมวด (แนว Planfin) ────────────────
// ใส่ประมาณการต่อเดือนของแต่ละหมวดรายได้/ค่าใช้จ่าย → NI = รวมรายได้ − รวมค่าใช้จ่าย
// ค่าตั้งต้น = อัตราเฉลี่ยจริงต่อเดือน (YTD ÷ เดือนที่ผ่านมา) แล้วส่งค่า NI ไปวางบนแกนจำลองอัตโนมัติ
// สีไล่โทนตามหมวด (rev=โทนฟ้า, exp=โทนส้ม-แดง) กระจาย hue ด้วย i*47 กันสีซ้ำติดกัน
function segColor(i, isExp){ const hue=isExp?(5+(i*47)%40):(200+(i*47)%70), light=42+(i%4)*7; return `hsl(${hue} 62% ${light}%)`; }
function nipStackHtml(list, isExp){
  const total=list.reduce((s,c)=>s+c.mo,0);
  return list.map((c,i)=>{
    const pct=total>0?Math.max(0,c.mo/total*100):0;
    if(pct<=0) return '';
    return `<div class="nip-seg" style="width:${pct}%;background:${segColor(i,isExp)}" title="${c.name} ${pct.toFixed(1)}%"></div>`;
  }).join('');
}
function niPlanRows(list, kind){
  const total=list.reduce((s,c)=>s+c.mo,0);
  return list.map((c,i)=>{
    const curM=c.mo/1e6;
    const maxM=Math.max(Math.abs(curM)*2, 1);            // สเกลสไลด์ต่อหมวด (อย่างน้อย ±1 ล้าน)
    const minM=Math.min(0, curM*2);
    const step=Math.max(maxM/100, 0.01);
    const slv=Math.min(Math.max(curM,minM),maxM);
    const pct=total>0?Math.max(0,c.mo/total*100):0;
    return `<div class="nip-row">
      <label title="${c.name}">${c.name}</label>
      <input type="range" class="nip-sl" min="${minM.toFixed(2)}" max="${maxM.toFixed(2)}" step="${step.toFixed(3)}" value="${slv.toFixed(2)}" data-kind="${kind}" data-i="${i}" oninput="niPlanSlide(this)">
      <input type="number" class="nip-num" step="0.01" inputmode="decimal" value="${curM.toFixed(2)}" data-kind="${kind}" data-i="${i}" oninput="niPlanType(this)">
      <span class="u">ล.</span>
      <span class="nip-pct" id="nipPct-${kind}${i}">${pct.toFixed(0)}%</span>
      <span class="nip-mbar"><span class="nip-mbar-f" id="nipMbar-${kind}${i}" style="width:${Math.min(100,pct)}%;background:${segColor(i,kind==='e')}"></span></span></div>`;
  }).join('');
}
// เลื่อนสไลด์ → อัปเดตช่องตัวเลข · พิมพ์ตัวเลข → อัปเดตสไลด์ (คู่กันในแถวเดียว)
function niPlanSlide(sl){ sl.parentElement.querySelector('.nip-num').value=(+sl.value).toFixed(2); niPlanRecalc(); }
function niPlanType(num){
  const sl=num.parentElement.querySelector('.nip-sl');
  let v=parseFloat(num.value); if(isNaN(v)) v=0;
  sl.value=Math.min(Math.max(v,+sl.min),+sl.max);
  niPlanRecalc();
}
function openNIPlan(){
  if(!SURV || !SURV.planRev){ alert('งวดนี้ไม่มีข้อมูลรายหมวดสำหรับประมาณการ'); return; }

  if(!el){ el=document.createElement('div'); el.id='niPlanOverlay'; el.className='nip-overlay'; document.body.appendChild(el); }
  el.innerHTML=`<div class="nip-modal" onclick="event.stopPropagation()">
    <div class="nip-head">
      <h3>ประมาณการกำไร/ขาดทุนต่อเดือน (NI) รายหมวดตามรหัส P (Planfin)</h3>
      <div class="note">${SURV.planSrc==='planfin'?'หมวดตาม<b>รหัส P ของ Planfin</b> (map จากบัญชี GL จริงของ รพ. นี้ — ผลรวมตรงกับงบทดลองที่ใช้คิด Risk Score)':'หมวดจากบัญชีจริง (waterfall)'} · ปรับ<b>ต่อเดือน (ล้านบาท)</b> ได้ด้วยสไลด์บาร์หรือพิมพ์ตัวเลข · ค่าตั้งต้น = อัตราเฉลี่ยจริง/เดือน (YTD ÷ ${SURV.mo} เดือน) · <b>NI = รวมรายได้ − รวมค่าใช้จ่าย</b> ส่งไปวางบนแกนกราฟจำลองอัตโนมัติ</div>
    </div>
    <div class="nip-body">
      <div class="nip-col"><h4>รายได้ (REV)<span class="nip-100">รวม 100%</span></h4>
        <div class="nip-stack" id="nipStackR">${nipStackHtml(SURV.planRev,false)}</div>
        ${niPlanRows(SURV.planRev,'r')}</div>
      <div class="nip-col"><h4>ค่าใช้จ่าย (EXP)<span class="nip-100">รวม 100%</span></h4>
        <div class="nip-stack" id="nipStackE">${nipStackHtml(SURV.planExp,true)}</div>
        ${niPlanRows(SURV.planExp,'e')}</div>
    </div>
    <div class="nip-foot">
      <div class="nip-totline">
        <span>รวมรายได้ <b id="nipRev"></b>/ด.</span>
        <span>รวมค่าใช้จ่าย <b id="nipExp"></b>/ด.</span>
        <span class="nip-ni" id="nipNi"></span>
      </div>
      <div class="nip-btns">
        <button type="button" onclick="niPlanReset()">↺ รีเซ็ตเป็นค่าปัจจุบัน</button>
        <button type="button" onclick="closeNIPlan()">ปิด</button>
        <button type="button" class="primary" onclick="niPlanApply()">✓ ใช้ค่านี้กับกราฟ</button>
      </div>
    </div>
  </div>`;
  el.onclick=closeNIPlan;
  el.style.display='flex';
  niPlanRecalc();
}
function niPlanSums(){
  let rev=0,exp=0;
  document.querySelectorAll('#niPlanOverlay input[type=number]').forEach(inp=>{
    const v=parseFloat(inp.value)||0;
    if(inp.dataset.kind==='r') rev+=v; else exp+=v;
  });
  return {rev,exp,ni:rev-exp};   // หน่วย: ล้านบาท/เดือน
}
function niPlanRecalc(){
  const s=niPlanSums();
  document.getElementById('nipRev').textContent=s.rev.toFixed(2)+' ล.';
  document.getElementById('nipExp').textContent=s.exp.toFixed(2)+' ล.';
  const niEl=document.getElementById('nipNi');
  niEl.textContent=`NI = ${s.ni>0?'+':''}${s.ni.toFixed(2)} ล./เดือน`;
  niEl.style.color=s.ni>0?'var(--green)':s.ni<0?'var(--red)':'var(--mut)';
  updateNipShare('r', SURV.planRev, s.rev);
  updateNipShare('e', SURV.planExp, s.exp);
}
// อัปเดต % สัดส่วน + แถบ 100% stacked ตามค่าที่ผู้ใช้ปรับล่าสุด (ไม่ใช่ค่าตั้งต้นคงที่)
function updateNipShare(kind, list, totalM){
  const isExp=kind==='e';
  let segHtml='';
  list.forEach((c,i)=>{
    const num=document.querySelector(`#niPlanOverlay .nip-num[data-kind="${kind}"][data-i="${i}"]`);
    const v=num?parseFloat(num.value)||0:0;
    const pct=totalM>0?Math.max(0,v/totalM*100):0;
    const pctEl=document.getElementById(`nipPct-${kind}${i}`);
    if(pctEl) pctEl.textContent=pct.toFixed(0)+'%';
    const barEl=document.getElementById(`nipMbar-${kind}${i}`);
    if(barEl) barEl.style.width=Math.min(100,pct)+'%';
    if(pct>0) segHtml+=`<div class="nip-seg" style="width:${pct}%;background:${segColor(i,isExp)}" title="${c.name} ${pct.toFixed(1)}%"></div>`;
  });
  const stackEl=document.getElementById(isExp?'nipStackE':'nipStackR');
  if(stackEl) stackEl.innerHTML=segHtml;
}
function niPlanReset(){
  document.querySelectorAll('#niPlanOverlay .nip-num').forEach(num=>{
    const list=num.dataset.kind==='r'?SURV.planRev:SURV.planExp;
    const curM=list[+num.dataset.i].mo/1e6;
    num.value=curM.toFixed(2);
    const sl=num.parentElement.querySelector('.nip-sl');
    if(sl) sl.value=Math.min(Math.max(curM,+sl.min),+sl.max).toFixed(2);
  });
  niPlanRecalc();
}
function niPlanApply(){
  const s=niPlanSums();
  let ni=Math.round(s.ni*1e6/100000)*100000;         // ล้านบาท → บาท ปัดขั้นละแสน (ตรง step ของแกน)
  const lim=(SURV&&SURV.niLim)||1000000000;
  ni=Math.max(-lim,Math.min(lim,ni));
  const sl=document.getElementById('svNi');
  if(sl){ sl.value=ni; projSurv(); }
  closeNIPlan();
}
function closeNIPlan(){ const el=document.getElementById('niPlanOverlay'); if(el) el.style.display='none'; }

// ── D+2: แผนชำระหนี้สินหมุนเวียนรายหมวด (ต่อเดือน) → เร่งชำระสุทธิ (จ่าย − ก่อใหม่) ──
function debtRowsHtml(){
  return SURV.clbd.rows.map((r,i)=>{
    const payM=r.payMo/1e6, balM=r.value/1e6;
    const maxM=Math.max(payM*2, balM, 1), step=Math.max(maxM/100,0.01);
    return `<div class="dp-row">
      <div class="dp-lab"><span class="nm" title="${r.name}">${r.name}</span><span class="ctx">คงเหลือ ${fmtM(r.value)} · ก่อหนี้ใหม่ ~${fmtM(r.incMo)}/เดือน</span></div>
      <input type="range" class="dp-sl" min="0" max="${maxM.toFixed(2)}" step="${step.toFixed(3)}" value="${payM.toFixed(2)}" data-i="${i}" oninput="debtSlide(this)">
      <input type="number" class="dp-num" step="0.01" inputmode="decimal" value="${payM.toFixed(2)}" data-i="${i}" oninput="debtType(this)">
      <span class="u">ล./ด.</span></div>`;
  }).join('');
}
function debtSlide(sl){ sl.parentElement.querySelector('.dp-num').value=(+sl.value).toFixed(2); debtRecalc(); }
function debtType(num){ const sl=num.parentElement.querySelector('.dp-sl'); let v=parseFloat(num.value); if(isNaN(v))v=0; sl.value=Math.min(Math.max(v,+sl.min),+sl.max); debtRecalc(); }
function debtSums(){
  let pay=0; document.querySelectorAll('#debtPlanOverlay .dp-num').forEach(n=>pay+=(parseFloat(n.value)||0));
  const inc=SURV.clbd.totalInc/1e6; return {pay, inc, net:pay-inc};   // ล้านบาท/เดือน
}
function debtRecalc(){
  const s=debtSums(), el=document.getElementById('dpNet'), netB=s.net*1e6;
  const col=s.net>0?'var(--red)':s.net<0?'var(--green)':'var(--mut)';
  const eff=s.net>0?`เงินสด↓ ${fmtM(netB)}/เดือน · หนี้สินหมุนเวียน↓ ${fmtM(netB)}/เดือน · ${debtDirNote(true)}`
    :s.net<0?`ยืดจ่าย: เงินสด↑ ${fmtM(-netB)}/เดือน · หนี้↑ ${fmtM(-netB)}/เดือน · ${debtDirNote(false)}`
    :`จ่ายเท่ากับที่ก่อหนี้ใหม่ — เงินสด/หนี้คงที่ (อยู่ใน NI แล้ว ไม่นับซ้ำ)`;
  el.innerHTML=`จ่ายชำระรวม <b>${s.pay.toFixed(2)} ล.</b> · ก่อหนี้ใหม่รวม <b>${s.inc.toFixed(2)} ล.</b> → <b style="color:${col}">เร่งชำระสุทธิ ${s.net>0?'+':''}${s.net.toFixed(2)} ล./เดือน</b><br><span class="note">${eff}</span>`;
}
function openDebtPlan(){
  if(!SURV||!SURV.clbd){ alert('งวดนี้ไม่มีข้อมูลหนี้สินหมุนเวียนรายหมวด'); return; }
  let el=document.getElementById('debtPlanOverlay');
  if(!el){ el=document.createElement('div'); el.id='debtPlanOverlay'; el.className='nip-overlay'; document.body.appendChild(el); }
  el.innerHTML=`<div class="nip-modal" onclick="event.stopPropagation()">
    <div class="nip-head"><h3>แผนชำระหนี้สินหมุนเวียนรายหมวด (ต่อเดือน)</h3>
      <div class="note">ตั้งว่าจะ<b>จ่ายชำระ</b>แต่ละหมวดเดือนละเท่าไหร่ (ล้านบาท · ค่าตั้งต้น = เฉลี่ยจริงจาก ${SURV.clbd.months} เดือนล่าสุด) · ส่วนที่<b>จ่ายเกินกว่าที่ก่อหนี้ใหม่</b> คือเงินสดที่ไหลออกเพิ่มและทำให้ยอดหนี้ลดลง — ส่วนที่จ่ายเท่ากับก่อใหม่ถือว่าอยู่ใน NI แล้ว ไม่นับซ้ำ</div></div>
    <div class="nip-body" style="grid-template-columns:1fr">${debtRowsHtml()}</div>
    <div class="nip-foot"><div id="dpNet" class="dp-net"></div>
      <div class="nip-btns"><button type="button" onclick="debtReset()">↺ คืนค่าเฉลี่ยจริง</button>
        <button type="button" onclick="closeDebtPlan()">ปิด</button>
        <button type="button" class="primary" onclick="debtApply()">✓ ใช้ค่านี้กับกราฟ</button></div></div>
  </div>`;
  el.onclick=closeDebtPlan; el.style.display='flex'; debtRecalc();
}
function debtReset(){
  document.querySelectorAll('#debtPlanOverlay .dp-num').forEach(num=>{
    const payM=SURV.clbd.rows[+num.dataset.i].payMo/1e6;
    num.value=payM.toFixed(2); const sl=num.parentElement.querySelector('.dp-sl');
    if(sl) sl.value=Math.min(Math.max(payM,+sl.min),+sl.max).toFixed(2);
  });
  debtRecalc();
}
function debtApply(){
  let net=Math.round(debtSums().net*1e6/50000)*50000;
  net=Math.max(-SURV.debtLim,Math.min(SURV.debtLim,net));
  SURV.debtNetMo=net;
  const sl=document.getElementById('svDebt'); if(sl) sl.value=net;
  projSurv(); closeDebtPlan();
}
function closeDebtPlan(){ const el=document.getElementById('debtPlanOverlay'); if(el) el.style.display='none'; }

// ── D+3: ตั้งเป้า "จำนวนเงิน" ที่จะเก็บลูกหนี้ได้รายกองทุน + "เดือนที่" จะได้รับเป็นเงินสด ──
// (เปลี่ยนจากตั้งเป้า ACP วัน → ตั้งเป้าจำนวนเงินตรงๆ ตามที่ขอ — ACP ที่จะเหลือโชว์เป็นข้อมูลอ้างอิงเท่านั้น)
function acpMonthOptions(sel){
  const HORIZON=24, cur=SURV.acpMonth||1;
  let opts='';
  for(let k=1;k<=HORIZON;k++) opts+=`<option value="${k}"${k===cur?' selected':''}>เดือนที่ ${k} (${tLab(addMo(SURV.startT,k))})</option>`;
  return opts;
}
function acpRowsHtml(){
  return SURV.recv.map((r,i)=>{
    const maxM=Math.max(r.ar/1e6, 0.01), step=Math.max(maxM/100, 0.01);
    const acpTxt = r.acp!=null ? ` · ACP ปัจจุบัน ${fmtR(r.acp)} วัน${r.note?' · '+r.note:''}` : '';
    return `<div class="dp-row">
      <div class="dp-lab"><span class="nm" title="${r.name}">${r.name}</span><span class="ctx">ลูกหนี้คงเหลือ ${fmtM(r.ar)}${acpTxt}</span></div>
      <input type="range" class="acp-sl" min="0" max="${maxM.toFixed(2)}" step="${step.toFixed(3)}" value="0" data-i="${i}" data-ar="${r.ar}" data-acp="${r.acp!=null?r.acp:''}" oninput="acpSlide(this)">
      <input type="number" class="acp-num" step="0.01" inputmode="decimal" value="0" data-i="${i}" data-ar="${r.ar}" data-acp="${r.acp!=null?r.acp:''}" oninput="acpType(this)">
      <span class="u">ล.</span>
      <span id="acpDay-${i}" style="min-width:112px;text-align:right;font-size:11px;color:var(--mut);flex-shrink:0"></span></div>`;
  }).join('');
}
function acpSlide(sl){ sl.parentElement.querySelector('.acp-num').value=(+sl.value).toFixed(2); acpRecalc(); }
function acpType(num){
  const sl=num.parentElement.querySelector('.acp-sl');
  let v=parseFloat(num.value); if(isNaN(v)) v=0;
  sl.value=Math.min(Math.max(v,+sl.min),+sl.max);
  acpRecalc();
}
function acpTotal(){
  let tot=0;
  document.querySelectorAll('#acpPlanOverlay .acp-num').forEach(num=>{
    const v=(parseFloat(num.value)||0)*1e6; tot+=v;
    const ar=+num.dataset.ar, acp=num.dataset.acp?parseFloat(num.dataset.acp):null;
    const el=document.getElementById('acpDay-'+num.dataset.i);
    if(el) el.textContent = (acp!=null&&ar>0) ? `→ ACP ≈ ${fmtR(Math.max(0,acp*(1-v/ar)))} วัน` : '';
  });
  return tot;
}
function acpRecalc(){
  const tot=acpTotal(), el=document.getElementById('acpTot');
  const monthSel=document.getElementById('acpMonthSel');
  const month = monthSel ? +monthSel.value : (SURV.acpMonth||1);
  el.innerHTML=`เก็บได้รวม <b style="color:var(--green)">${fmtM(tot)}</b> — เข้าเป็นเงินสดครั้งเดียวในเดือนที่ <b>${month}</b> (${tLab(addMo(SURV.startT,month))}) <span class="note">— เพิ่มเงินสด+เงินฝากและ Cash Ratio (สินทรัพย์หมุนเวียนรวม/QN/NWC เท่าเดิม เพราะแค่เปลี่ยนลูกหนี้เป็นเงินสด)</span>`;
}
function openAcpPlan(){
  if(!SURV||!SURV.recv||!SURV.recv.length){ alert('งวดนี้ไม่มีข้อมูลลูกหนี้ค้างรับ'); return; }
  let el=document.getElementById('acpPlanOverlay');
  if(!el){ el=document.createElement('div'); el.id='acpPlanOverlay'; el.className='nip-overlay'; document.body.appendChild(el); }
  el.innerHTML=`<div class="nip-modal" onclick="event.stopPropagation()">
    <div class="nip-head"><h3>เร่งเก็บลูกหนี้ค้างรับ — ตั้งเป้าจำนวนเงิน + เดือนที่จะได้รับ</h3>
      <div class="note">ใส่<b>จำนวนเงินที่คาดว่าจะเก็บได้เร็วขึ้น</b>ต่อกองทุน (ล้านบาท) แล้วเลือก<b>เดือนที่คาดว่าจะได้รับเป็นเงินสด</b> — เป็นเงินก้อน<b>ครั้งเดียว</b>ที่เปลี่ยนลูกหนี้เป็นเงินสด ณ เดือนนั้น (ก่อนหน้านั้นยังไม่มีผล) ช่วยสภาพคล่อง/ระยะอยู่รอด แต่สินทรัพย์หมุนเวียนรวม/NWC ไม่เปลี่ยน</div>
      <div class="fld" style="margin-top:8px"><label style="font-size:12.5px;color:var(--mut)">จะได้รับเงินภายในเดือนที่</label>
        <select id="acpMonthSel" onchange="acpRecalc()" style="font-family:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink)">${acpMonthOptions()}</select></div>
    </div>
    <div class="nip-body" style="grid-template-columns:1fr">${acpRowsHtml()}</div>
    <div class="nip-foot"><div id="acpTot" class="dp-net"></div>
      <div class="nip-btns"><button type="button" onclick="acpReset()">↺ ล้างเป็น 0</button>
        <button type="button" onclick="closeAcpPlan()">ปิด</button>
        <button type="button" class="primary" onclick="acpApply()">✓ ใช้ค่านี้กับกราฟ</button></div></div>
  </div>`;
  el.onclick=closeAcpPlan; el.style.display='flex'; acpRecalc();
}
function acpReset(){
  document.querySelectorAll('#acpPlanOverlay .acp-num').forEach(num=>{
    num.value='0.00'; const sl=num.parentElement.querySelector('.acp-sl'); if(sl) sl.value=0;
  });
  acpRecalc();
}
function acpApply(){
  let amt=Math.round(acpTotal()/50000)*50000;
  amt=Math.max(0,Math.min(Math.round(SURV.totalAR/50000)*50000, amt));
  const monthSel=document.getElementById('acpMonthSel');
  const month = monthSel ? +monthSel.value : 1;
  SURV.acpFreed=amt; SURV.acpMonth=amt>0?month:(SURV.acpMonth||1);
  const sl=document.getElementById('svAcp'); if(sl) sl.value=amt;
  projSurv(); closeAcpPlan();
}
function closeAcpPlan(){ const el=document.getElementById('acpPlanOverlay'); if(el) el.style.display='none'; }

// คืนแกนเป็นค่าตั้งต้น: NI = ค่าเฉลี่ยจริงต่อเดือน · เงินก้อน = 0
function svReset(which){
  if(!SURV) return;
  if(which==='ni'){ const el=document.getElementById('svNi'); if(el) el.value=Math.max(-SURV.niLim,Math.min(SURV.niLim,SURV.niRun)); }
  else if(which==='debt'){ const el=document.getElementById('svDebt'); if(el) el.value=0; SURV.debtNetMo=0; }
  else if(which==='acp'){ const el=document.getElementById('svAcp'); if(el) el.value=0; SURV.acpFreed=0; }
  else { const el=document.getElementById('svInj'); if(el) el.value=0; }
  projSurv();
}

// ── C: Payables Stress — เจ้าหนี้การค้ารายหมวด + เดือนค้างจ่าย ──
function renderPayables(h){
  const box=document.getElementById('payablesBox'); if(!box) return;
  const p=h.payables;
  if(!p || (!(p.supplier||[]).length && !(p.claims||[]).length)){ box.innerHTML='<div class="note">งวดนี้ไม่มีข้อมูลเจ้าหนี้การค้า</div>'; return; }
  const moChip=r=>{
    if(r.monthsOut==null) return '<span class="mo-chip na">—</span>';
    const v=r.monthsOut, cls=v>12?'hi':v>6?'warn':'ok';
    return `<span class="mo-chip ${cls}">${v}${r.capped?'+':''} เดือน</span>`;
  };
  const supTbl=`<table class="acctbl">
    <tr><th>หมวดเจ้าหนี้การค้า</th><th>คงเหลือ</th><th>อัตราใช้/เดือน</th><th style="text-align:center">ค้างจ่าย≈</th></tr>
    ${p.supplier.map(r=>`<tr>
      <td>${r.name}${r.usageAcct?`<div class="note" style="font-size:10.5px">คู่กับ: ${r.usageAcct}</div>`:''}</td>
      <td>${fmtM(r.value)}</td>
      <td>${r.monthlyRate!=null?fmtM(r.monthlyRate):'<span class="note">—</span>'}</td>
      <td style="text-align:center">${moChip(r)}</td>
    </tr>`).join('')}
  </table>`;
  let claimsTbl='';
  if((p.claims||[]).length){
    claimsTbl=`<div class="pay-sub">เจ้าหนี้ตามจ่าย/เคลม (ชำระระหว่างหน่วยบริการ — ไม่มีรอบการใช้ จึงไม่คำนวณเดือนค้างจ่าย)</div>
    <div class="acctbl-wrap" style="max-height:none"><table class="acctbl">
      <tr><th>รายการ</th><th>คงเหลือ</th><th>Δ เทียบเดือนก่อน</th></tr>
      ${p.claims.map(r=>`<tr><td>${r.name}</td><td>${fmtM(r.value)}</td>
        <td style="color:${deltaColor(r.delta,'CL')};font-weight:700">${r.delta>0?'+':''}${fmtM(r.delta)}</td></tr>`).join('')}
    </table></div>`;
  }
  const t=h.trend[h.trend.length-1];
  const clTotal=t?t.cl:null;
  const recon=`<div class="pay-recon">รวมเจ้าหนี้การค้า <b>${fmtM(p.totalTrade)}</b> (ซื้อเชื่อการค้า ${fmtM(p.totalSupplier)} + ตามจ่าย/เคลม ${fmtM(p.totalClaims)})${clTotal?` · คิดเป็น ${(p.totalTrade/clTotal*100).toFixed(0)}% ของหนี้สินหมุนเวียนทั้งหมด ${fmtM(clTotal)}`:''}<br>
  🔗 เทียบ APP ทางการ (RatioID 260 · ยา/เวชภัณฑ์): <b>${t&&t.app!=null?fmtR(t.app)+' วัน ≈ '+(t.app/30.4).toFixed(1)+' เดือน':'—'}</b> — สูตรทางการใช้ยอดซื้อรายเดือน (ตัวเดียว) จึงแกว่งกว่าค่าเฉลี่ยรายหมวดด้านบนที่ใช้อัตราใช้เฉลี่ยทั้งปีงบ</div>`;
  box.innerHTML=`<div class="acctbl-wrap" style="max-height:none">${supTbl}</div>${claimsTbl}${recon}`;
}

// ── 7 Plus Efficiency Score ─────────────────────────────────
function renderEfficiency(h, s){
  const box=document.getElementById('effBox');
  const t=h.trend[h.trend.length-1];
  if(!t){box.innerHTML='<div class="note">ไม่มีข้อมูล</div>';return}
  const peerGrp=(h.peer.grp||[]).slice(-1)[0]||{};
  const cashLow = s && s.cash!=null && s.cash<0.8;
  const rows=[
    {label:'Operating Margin %', val:t.opMargin, unit:'%', thLabel:`≥ ค่ากลางกลุ่ม (${fmtR(peerGrp.opMargin_med)}%)`,
     pass: t.opMargin!=null && peerGrp.opMargin_med!=null && t.opMargin>=peerGrp.opMargin_med,
     tt:'**สูตร**: EBITDA (3330X−3330Y) ÷ รายได้ค่ารักษา (RatioID 320) × 100\n**ข้อมูลจาก**: งบทดลองหมวด 3/4'},
    {label:'Return on Asset (ROA) %', val:t.roa, unit:'%', thLabel:`≥ ค่ากลางกลุ่ม (${fmtR(peerGrp.roa_med)}%)`,
     pass: t.roa!=null && peerGrp.roa_med!=null && t.roa>=peerGrp.roa_med,
     tt:'**สูตร**: NI (3006Y−3010X) ÷ สินทรัพย์รวม (RatioID 321) × 100\n**ข้อมูลจาก**: งบทดลองหมวด 1/4/5'},
    {label:'Average Payment Period (ยา/เวชภัณฑ์)', val:t.app, unit:'วัน',
     thLabel: cashLow?'≤ 180 วัน (สภาพคล่องต่ำ)':'≤ 90 วัน',
     pass: t.app!=null && t.app<=(cashLow?180:90),
     tt:'**สูตร**: เจ้าหนี้การค้าเฉลี่ยต้น-ปลายงวด (2600X) ÷ ยอดซื้อยา/เวชภัณฑ์ (2600Y ด้าน Cr) × จำนวนวันในเดือน\n**ข้อมูลจาก**: งบทดลอง RatioID 260'},
    {label:'Average Collection Period — UC', val:t.acpUc, unit:'วัน', thLabel:'≤ 60 วัน', pass: t.acpUc!=null && t.acpUc<=60,
     tt:'**สูตร**: ลูกหนี้ UC เฉลี่ยต้น-ปลายงวด (2610X) ÷ รายได้ UC (2610Y) × จำนวนวันในเดือน\n**ข้อมูลจาก**: งบทดลอง RatioID 261'},
    {label:'Average Collection Period — CSMBS (กรมบัญชีกลาง)', val:t.acpCs, unit:'วัน', thLabel:'≤ 60 วัน', pass: t.acpCs!=null && t.acpCs<=60,
     tt:'**สูตร**: ลูกหนี้ CSMBS เฉลี่ยต้น-ปลายงวด (2620X) ÷ รายได้ CSMBS สุทธิ (2620Y) × จำนวนวันในเดือน\n**ข้อมูลจาก**: งบทดลอง RatioID 262 — ชื่อทางการตาม ratio_items คือ CSMBS (Civil Servant Medical Benefit Scheme)'},
    {label:'Average Collection Period — SSS (ประกันสังคม)', val:t.acpSs, unit:'วัน', thLabel:'≤ 90 วัน', pass: t.acpSs!=null && t.acpSs<=90,
     tt:'**สูตร**: ลูกหนี้ SSS เฉลี่ยต้น-ปลายงวด (2630X) ÷ รายได้สิทธิ SSS สุทธิ (2630Y) × จำนวนวันในเดือน\n**ข้อมูลจาก**: งบทดลอง RatioID 263 — ชื่อทางการตาม ratio_items คือ SSS (Social Security Scheme)'},
    {label:'Inventory Management (ยา/เวชภัณฑ์)', val:t.invDays, unit:'วัน', thLabel:'≤ 60 วัน', pass: t.invDays!=null && t.invDays<=60,
     tt:'**สูตร**: สินค้าคงเหลือเฉลี่ยต้น-ปลายงวด (2640X) ÷ ยอดใช้ยา/เวชภัณฑ์ (2640Y) × จำนวนวันในเดือน\n**ข้อมูลจาก**: งบทดลอง RatioID 264'},
  ];
  box.innerHTML=`<table class="eff-tbl">
    <tr><th>ตัวชี้วัด</th><th>ค่าปัจจุบัน</th><th>เกณฑ์เป้าหมาย</th><th>ผล</th></tr>
    ${rows.map(r=>`<tr>
      <td>${r.label} ${tip(r.tt)}</td>
      <td>${r.val==null?'—':fmtR(r.val)+' '+r.unit}</td>
      <td class="note">${r.thLabel}</td>
      <td class="${r.val==null?'':(r.pass?'eff-pass':'eff-fail')}">${r.val==null?'—':(r.pass?'✓ ผ่าน':'✗ ไม่ผ่าน')}</td>
    </tr>`).join('')}
  </table>`;
}

function setRatioMetric(m){ratioMetric=m;renderDetail(CUR)}
function setPeerDim(d){peerDim=d;renderDetail(CUR)}
function setPeriodMode(m){
  periodMode=m;
  document.getElementById('pdMom').classList.toggle('on',m==='mom');
  document.getElementById('pdYoy').classList.toggle('on',m==='yoy');
  renderNIBridge(HDATA);renderWaterfallPL(HDATA);renderTopAccPL(HDATA);
  renderDecomp(HDATA);renderWaterfall(HDATA);renderTopAcc(HDATA);
}

// ── L2: ratio trend + peer band ──────────────────────────────
function renderRatioChart(h){
  const ctx=document.getElementById('ratioChart');
  const labels=h.trend.map(r=>tLab(r.t));
  const own=h.trend.map(r=>r[ratioMetric]);
  const peerSeries=h.peer[peerDim]||[];
  const peerByT={}; for(const p of peerSeries) peerByT[p.t]=p;
  const p25=h.trend.map(r=>{const p=peerByT[r.t];return p?p[ratioMetric+'_p25']:null});
  const p75=h.trend.map(r=>{const p=peerByT[r.t];return p?p[ratioMetric+'_p75']:null});
  const med=h.trend.map(r=>{const p=peerByT[r.t];return p?p[ratioMetric+'_med']:null});
  const ink=getCss('--ink'), blue=getCss('--blue'), mut=getCss('--mut'), line=getCss('--line');

  if(ratioChart) ratioChart.destroy();
  ratioChart=new Chart(ctx,{
    type:'line',
    data:{labels, datasets:[
      {label:'P75 กลุ่ม',data:p75,borderWidth:0,pointRadius:0,fill:false,order:3},
      {label:'ช่วง P25–P75',data:p25,borderWidth:0,pointRadius:0,fill:'-1',backgroundColor:mut+'33',order:3},
      {label:'Median กลุ่ม',data:med,borderColor:mut,borderDash:[4,4],borderWidth:1.5,pointRadius:0,fill:false,order:2},
      {label:h.name,data:own,borderColor:blue,backgroundColor:blue,borderWidth:2.5,pointRadius:2,fill:false,order:1},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{font:{family:'Sarabun',size:11},color:ink},filter:it=>it.text!=='P75 กลุ่ม'}},
      scales:{
        x:{ticks:{font:{family:'Sarabun',size:10},color:mut,maxRotation:45},grid:{color:line}},
        y:{ticks:{font:{size:10},color:mut},grid:{color:line}},
      }
    }
  });
}

// ── L2b: decomposition ────────────────────────────────────────
function renderDecomp(h){
  const box=document.getElementById('decompBox');
  const d=(h.decomp[periodMode])||null;
  if(!d){box.innerHTML='<div class="note">ไม่มีข้อมูลงวดเปรียบเทียบ</div>';return}
  const items=[['cr','Current Ratio','สินทรัพย์หมุนเวียน (1001X) ÷ หนี้สินหมุนเวียน (1001Y)'],['qr','Quick Ratio','สินทรัพย์เร็ว (1002X) ÷ หนี้สินหมุนเวียน (1001Y)'],['cash','Cash Ratio','เงินสด+เงินฝาก (1003X) ÷ หนี้สินหมุนเวียน (1001Y)']];
  box.innerHTML=`<div class="note" style="margin-bottom:8px">เทียบกับงวด ${tLab(d.baseT)} ${d.baseT}</div>
  <div class="decomp-row">${items.map(([k,label,formula])=>{
    const v=d[k];
    const tt=`**สูตร**: ${formula}\n**การแยก**: fromNumerator=(x1−x0)÷y0 (ผลจากตัวเศษ) · fromDenominator=x0×(1÷y1−1÷y0) (ผลจากตัวส่วน)`;
    if(!v)return `<div class="dcard"><div class="lbl">${label} ${tip(tt)}</div><div class="note">ไม่มีข้อมูล</div></div>`;
    const sign=x=>x>0?'+':'';
    const col=x=>x>0?'var(--green)':x<0?'var(--red)':'var(--mut)';
    return `<div class="dcard">
      <div class="lbl">${label} ${tip(tt)}</div>
      <div class="tot" style="color:${col(v.total)}">${sign(v.total)}${v.total.toFixed(3)}</div>
      <div class="brk">
        <span>จากสินทรัพย์: <b style="color:${col(v.fromNumerator)}">${sign(v.fromNumerator)}${v.fromNumerator.toFixed(3)}</b></span>
        <span>จากหนี้สิน: <b style="color:${col(v.fromDenominator)}">${sign(v.fromDenominator)}${v.fromDenominator.toFixed(3)}</b></span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── L3: waterfall by subgroup ──────────────────────────────────
const GOOD_UP_CLS=new Set(['CA','REV']); // เพิ่มขึ้น=ดี(เขียว) — CL/EXP เพิ่มขึ้น=แย่(แดง)
function deltaColor(delta, cls){
  if(delta===0) return 'var(--mut)';
  const pos = GOOD_UP_CLS.has(cls) ? delta>0 : delta<0;
  return pos?'var(--green)':'var(--red)';
}
function wfRows(rows, cls){
  const maxAbs=Math.max(1,...rows.map(r=>Math.abs(r.delta)));
  return rows.slice(0,12).map(r=>{
    const col=deltaColor(r.delta, cls);
    const w=Math.min(50,Math.abs(r.delta)/maxAbs*50);
    return `<div class="wf-row">
      <div class="top"><span class="nm" title="${r.name}">${r.name}</span><span class="dl" style="color:${col}">${r.delta>0?'+':''}${fmtM(r.delta)}</span></div>
      <div class="wf-bar"><i style="width:${w}%;background:${col};${r.delta<0?'right:50%':'left:50%'}"></i></div>
    </div>`;
  }).join('') || '<div class="note">ไม่มีการเปลี่ยนแปลงมีนัยสำคัญ</div>';
}
function renderWaterfall(h){
  const box=document.getElementById('wfBox');
  const wf=h.waterfall[periodMode];
  if(!wf){box.innerHTML='<div class="note">ไม่มีข้อมูลงวดเปรียบเทียบ</div>';return}
  box.innerHTML=`<div class="wf-cols">
    <div><div class="wf-title">สินทรัพย์หมุนเวียน (CA)</div>${wfRows(wf.ca,'CA')}</div>
    <div><div class="wf-title">หนี้สินหมุนเวียน (CL)</div>${wfRows(wf.cl,'CL')}</div>
  </div>`;
}

// ── L4: top accounts ─────────────────────────────────────────
function renderAcctTable(tblId, accounts){
  const tbl=document.getElementById(tblId);
  if(!accounts || !accounts.length){tbl.innerHTML='<tr><td style="padding:10px;color:var(--mut)">ไม่มีข้อมูล</td></tr>';return}
  tbl.innerHTML=`<tr><th>รหัส</th><th>ชื่อบัญชี</th><th>ประเภท</th><th>มูลค่าปัจจุบัน</th><th>Δ เปลี่ยนแปลง</th></tr>` +
    accounts.map(a=>`<tr>
      <td style="font-family:monospace;font-size:11.5px">${a.acc}</td>
      <td>${a.name}</td>
      <td><span class="clstag ${a.cls}">${a.cls}</span></td>
      <td>${fmtM(a.value)}</td>
      <td style="color:${deltaColor(a.delta,a.cls)};font-weight:700">${a.delta>0?'+':''}${fmtM(a.delta)}</td>
    </tr>`).join('');
}
function renderTopAcc(h){
  const t=h.topAccounts[periodMode];
  renderAcctTable('acctbl', t?t.accounts:null);
}

// ── L2c/L3b/L4b: รายได้-ค่าใช้จ่าย (P&L) ─────────────────────────
function renderNIBridge(h){
  const box=document.getElementById('niBridgeBox');
  const v=(h.decomp[periodMode]||{}).ni;
  if(!v){box.innerHTML='<div class="note">ไม่มีข้อมูลงวดเปรียบเทียบ</div>';return}
  const baseT=h.decomp[periodMode].baseT;
  const sign=x=>x>0?'+':'';
  const rawExpDelta=-v.fromExpense; // = ค่าใช้จ่ายงวดนี้ − งวดฐาน (บวก=ค่าใช้จ่ายเพิ่ม)
  box.innerHTML=`<div class="note" style="margin-bottom:8px">เทียบกับงวด ${tLab(baseT)} ${baseT}</div>
  <div class="nibridge-row">
    <div class="dcard"><div class="lbl">รายได้เปลี่ยน ${tip('**สูตร**: รายได้รวม (3006Y) งวดนี้ − งวดฐาน\n**ข้อมูลจาก**: งบทดลองหมวด 4 สะสมตั้งแต่ต้นปีงบ')}</div><div class="tot" style="color:${deltaColor(v.fromRevenue,'REV')}">${sign(v.fromRevenue)}${fmtM(v.fromRevenue)}</div></div>
    <div class="dcard"><div class="lbl">ค่าใช้จ่ายเปลี่ยน ${tip('**สูตร**: ค่าใช้จ่ายรวม (3010X) งวดนี้ − งวดฐาน (บวก = ค่าใช้จ่ายเพิ่มขึ้น)\n**ข้อมูลจาก**: งบทดลองหมวด 5 สะสมตั้งแต่ต้นปีงบ')}</div><div class="tot" style="color:${deltaColor(rawExpDelta,'EXP')}">${sign(rawExpDelta)}${fmtM(rawExpDelta)}</div></div>
    <div class="dcard"><div class="lbl">ผลสุทธิ (NI เปลี่ยน) ${tip('**สูตร**: ΔNI = Δรายได้ − Δค่าใช้จ่าย\n**ข้อมูลจาก**: คำนวณจาก 2 การ์ดด้านซ้าย — NI นี้ป้อนเข้าเกณฑ์ Risk Score ฝั่ง ST/SU โดยตรง')}</div><div class="tot" style="color:${v.total>0?'var(--green)':v.total<0?'var(--red)':'var(--mut)'}">${sign(v.total)}${fmtM(v.total)}</div></div>
  </div>`;
}
function renderWaterfallPL(h){
  const box=document.getElementById('wfPLBox');
  const wf=h.waterfall[periodMode];
  if(!wf){box.innerHTML='<div class="note">ไม่มีข้อมูลงวดเปรียบเทียบ</div>';return}
  box.innerHTML=`
    <div><div class="wf-title">รายได้ (REV)</div>${wfRows(wf.rev,'REV')}</div>
    <div><div class="wf-title">ค่าใช้จ่าย (EXP)</div>${wfRows(wf.exp,'EXP')}</div>`;
}
function renderTopAccPL(h){
  const t=h.topAccountsPL[periodMode];
  renderAcctTable('acctblPL', t?t.accounts:null);
}

init();
</script>
