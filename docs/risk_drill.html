<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สาเหตุวิกฤต — เขตสุขภาพที่ 1</title>
<script>(function(){const t=localStorage.getItem('rh1-theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--mut:#64748b;--line:#e2e8f0;--blue:#3b82f6;--gold:#d97706;--orange:#ea580c;--red:#dc2626;--green:#16a34a;
  --hd1:#0f172a;--hd2:#1e293b;--th-bg:#f8fafc;--row-strip:#f1f5f9;--hover:#eff6ff;
  --good-bg:#f0fdf4;--good-bd:#bbf7d0;--good-ink:#166534;
  --bad-bg:#fef2f2;--bad-bd:#fecaca;--bad-ink:#991b1b;
  --mid-bg:#eff6ff;--mid-bd:#bfdbfe;--mid-ink:#1e40af;
  --shadow:rgba(0,0,0,.04)}
@media (prefers-color-scheme: dark){
  :root{--bg:#0f1115;--card:#181b21;--ink:#e6e9ef;--mut:#96a0b2;--line:#2a2f3a;--blue:#5b9dff;--gold:#e0a840;--orange:#fb923c;--red:#f0685f;--green:#4ade80;
    --hd1:#0a0c10;--hd2:#151922;--th-bg:#1d2129;--row-strip:#1b1e25;--hover:#1c2635;
    --good-bg:#112016;--good-bd:#1f4a2c;--good-ink:#5fd989;
    --bad-bg:#2a1414;--bad-bd:#5a2222;--bad-ink:#f2a0a0;
    --mid-bg:#131c2a;--mid-bd:#26426b;--mid-ink:#8fb8f0;
    --shadow:rgba(0,0,0,.3)}
}
:root[data-theme="dark"]{--bg:#0f1115;--card:#181b21;--ink:#e6e9ef;--mut:#96a0b2;--line:#2a2f3a;--blue:#5b9dff;--gold:#e0a840;--orange:#fb923c;--red:#f0685f;--green:#4ade80;
  --hd1:#0a0c10;--hd2:#151922;--th-bg:#1d2129;--row-strip:#1b1e25;--hover:#1c2635;
  --good-bg:#112016;--good-bd:#1f4a2c;--good-ink:#5fd989;
  --bad-bg:#2a1414;--bad-bd:#5a2222;--bad-ink:#f2a0a0;
  --mid-bg:#131c2a;--mid-bd:#26426b;--mid-ink:#8fb8f0;
  --shadow:rgba(0,0,0,.3)}
:root[data-theme="light"]{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--mut:#64748b;--line:#e2e8f0;--blue:#3b82f6;--gold:#d97706;--orange:#ea580c;--red:#dc2626;--green:#16a34a;
  --hd1:#0f172a;--hd2:#1e293b;--th-bg:#f8fafc;--row-strip:#f1f5f9;--hover:#eff6ff;
  --good-bg:#f0fdf4;--good-bd:#bbf7d0;--good-ink:#166534;
  --bad-bg:#fef2f2;--bad-bd:#fecaca;--bad-ink:#991b1b;
  --mid-bg:#eff6ff;--mid-bd:#bfdbfe;--mid-ink:#1e40af;
  --shadow:rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .15s,color .15s}
header{background:linear-gradient(135deg,var(--hd1) 0%,var(--hd2) 50%,var(--hd1) 100%);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
header h1{font-size:16px;font-weight:700}
header .sub{font-size:11.5px;color:#cbd5e1}
#themeBtn{background:none;border:1px solid #ffffff33;color:#fff;border-radius:99px;width:30px;height:30px;font-size:14px;cursor:pointer;flex-shrink:0}
#themeBtn:hover{background:#ffffff22}
#menuBtn{display:none;background:none;border:1px solid #ffffff33;color:#fff;border-radius:8px;width:32px;height:32px;font-size:16px;cursor:pointer;flex-shrink:0}
#menuBtn:hover{background:#ffffff22}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40}
.backdrop.show{display:block}
.drawer-close{display:none}
.main{display:flex;flex:1;overflow:hidden}
/* LEFT: hospital list */
.left{width:340px;min-width:260px;display:flex;flex-direction:column;border-right:1px solid var(--line);background:var(--card);flex-shrink:0}
.lfilt{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:6px}
.lfilt select,.lfilt input{font-family:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);width:100%}
.lfilt .row{display:flex;gap:6px}
.lfilt .row>*{flex:1}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{font-family:inherit;font-size:11.5px;font-weight:600;padding:5px 8px;border:none;background:var(--card);color:var(--mut);cursor:pointer;flex:1}
.seg button.on{background:var(--ink);color:var(--bg)}
.llist{flex:1;overflow-y:auto}
.lrow{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--row-strip);cursor:pointer}
.lrow:hover{background:var(--hover)}
.lrow.actv{background:var(--mid-bg)}
.lrow .rk{width:20px;font-size:11px;color:var(--mut);flex-shrink:0}
.lrow .nm{flex:1;min-width:0}
.lrow .nm .n1{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lrow .nm .n2{font-size:10.5px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:22px;border-radius:7px;font-size:12px;font-weight:700;color:#fff;padding:0 5px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:2px}
.trend-arrow{font-size:11px;flex-shrink:0;width:16px;text-align:center}
/* RIGHT: detail */
.right{flex:1;overflow-y:auto;min-width:0}
.hint-empty{padding:60px 20px;text-align:center;color:var(--mut);font-size:14px}
.dwrap{max-width:980px;margin:0 auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.dhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.dhead h2{font-size:18px;font-weight:700;flex:1;min-width:200px}
.dhead .meta{font-size:12px;color:var(--mut)}
#headline{padding:10px 14px;border-radius:10px;font-size:14px;font-weight:600;line-height:1.55}
#headline.good{background:var(--good-bg);border:1px solid var(--good-bd);color:var(--good-ink)}
#headline.bad{background:var(--bad-bg);border:1px solid var(--bad-bd);color:var(--bad-ink)}
#headline.mid{background:var(--mid-bg);border:1px solid var(--mid-bd);color:var(--mid-ink)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 11px;border-radius:99px;font-weight:600;border:1px solid var(--line);color:var(--mut);background:var(--card)}
.chip.on{background:var(--bad-bg);border-color:var(--bad-bd);color:var(--bad-ink)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.panel h3{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.panel h3::before{content:'';width:4px;height:16px;border-radius:99px;background:linear-gradient(180deg,#f59e0b,#d97706)}
.panel h3 .sp{flex:1}
.metric-tabs{display:flex;gap:4px}
.mtab{font-family:inherit;font-size:11.5px;font-weight:600;padding:4px 10px;border:1px solid var(--line);border-radius:99px;background:var(--card);color:var(--mut);cursor:pointer}
.mtab.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.peer-tabs{display:flex;gap:4px}
.chartbox{position:relative;height:260px}
.decomp-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dcard{border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.dcard .lbl{font-size:12px;color:var(--mut);font-weight:600}
.dcard .tot{font-size:19px;font-weight:700;margin:4px 0}
.dcard .brk{font-size:11.5px;color:var(--mut);display:flex;flex-direction:column;gap:2px}
.dcard .brk b{font-variant-numeric:tabular-nums}
@media(max-width:640px){.decomp-row{grid-template-columns:1fr}}
.wf-toggle{display:flex;justify-content:flex-end;margin-bottom:8px}
.wf-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:720px){.wf-cols{grid-template-columns:1fr}}
.wf-title{font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.wf-row{padding:6px 0;border-bottom:1px solid var(--row-strip)}
.wf-row .top{display:flex;justify-content:space-between;gap:8px;font-size:12.5px}
.wf-row .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.wf-row .dl{font-weight:700;white-space:nowrap}
.wf-bar{height:5px;border-radius:3px;background:var(--row-strip);overflow:hidden;margin-top:3px;position:relative}
.wf-bar>i{display:block;height:100%;border-radius:3px;position:absolute;top:0}
table.acctbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.acctbl th{background:var(--th-bg);color:var(--mut);font-weight:600;text-align:right;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
table.acctbl th:nth-child(1),table.acctbl th:nth-child(2){text-align:left}
table.acctbl td{padding:5px 8px;border-bottom:1px solid var(--row-strip);text-align:right;white-space:nowrap}
table.acctbl td:nth-child(1),table.acctbl td:nth-child(2){text-align:left;white-space:normal}
.clstag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px}
.clstag.CA,.clstag.REV{background:var(--good-bg);color:var(--good-ink)}
.clstag.CL,.clstag.EXP{background:var(--bad-bg);color:var(--bad-ink)}
.note{font-size:11.5px;color:var(--mut)}
.src-note{font-size:11px;color:var(--mut);background:var(--th-bg);border:1px solid var(--line);border-radius:8px;padding:6px 10px;line-height:1.5;margin-bottom:10px}
.acctbl-wrap{max-height:340px;overflow-y:auto}
.nibridge-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
@media(max-width:640px){.nibridge-row{grid-template-columns:1fr}}
table.wltbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.wltbl th{background:var(--th-bg);color:var(--mut);font-weight:600;padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
table.wltbl td{padding:8px;border-bottom:1px solid var(--row-strip);vertical-align:top}
table.wltbl tr.click{cursor:pointer}
table.wltbl tr.click:hover{background:var(--hover)}
table.wltbl .bullets{margin:0;padding-left:14px}
table.wltbl .bullets li{margin-bottom:2px}
.backlink{font-size:12.5px;color:var(--blue);cursor:pointer;text-decoration:none}
.backlink:hover{text-decoration:underline}
details.refpanel{border:1px solid var(--line);border-radius:12px;background:var(--card)}
details.refpanel summary{padding:12px 16px;font-weight:700;font-size:13.5px;cursor:pointer;list-style:none}
details.refpanel summary::-webkit-details-marker{display:none}
details.refpanel summary::before{content:'▶ ';font-size:11px}
details.refpanel[open] summary::before{content:'▼ '}
.refbody{padding:0 16px 16px}
.pillar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(max-width:720px){.pillar-grid{grid-template-columns:1fr}}
.pillar-card{border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.pillar-card h4{font-size:12.5px;margin-bottom:6px}
.pillar-card ul{padding-left:16px;font-size:12px;color:var(--mut);line-height:1.6}
table.systbl{width:100%;border-collapse:collapse;font-size:12px}
table.systbl th{background:var(--th-bg);padding:6px 8px;border:1px solid var(--line);text-align:left}
table.systbl td{padding:8px;border:1px solid var(--line);vertical-align:top;line-height:1.6}
table.systbl td ul{padding-left:16px;margin:0}
.eff-tbl{width:100%;border-collapse:collapse;font-size:13px}
.eff-tbl th{background:var(--th-bg);color:var(--mut);padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)}
.eff-tbl td{padding:7px 8px;border-bottom:1px solid var(--row-strip)}
.eff-pass{color:var(--green);font-weight:700}
.eff-fail{color:var(--red);font-weight:700}
/* ── Gap-to-Target Solver ─────────────────────────────── */
table.gaptbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.gaptbl th{background:var(--th-bg);color:var(--mut);font-weight:600;text-align:right;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
table.gaptbl th:first-child,table.gaptbl td:first-child{text-align:left}
table.gaptbl th.l,table.gaptbl td.l{text-align:left}
table.gaptbl td{padding:6px 8px;border-bottom:1px solid var(--row-strip);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
table.gaptbl td.opt{text-align:left;white-space:normal;font-size:11.5px;color:var(--mut);line-height:1.5}
table.gaptbl tr.pass-row td{opacity:.72}
.lvchip{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;white-space:nowrap}
.lvchip.flow{background:var(--good-bg);color:var(--good-ink)}
.lvchip.stock{background:var(--mid-bg);color:var(--mid-ink)}
.gp-pass{color:var(--green);font-weight:700}
.gp-fail{color:var(--red);font-weight:700}
.ladder{display:flex;flex-direction:column;margin-top:4px}
.ladder .rung{display:grid;grid-template-columns:44px 1fr auto;gap:12px;align-items:center;padding:9px 2px;border-bottom:1px solid var(--row-strip)}
.ladder .rung:last-child{border-bottom:none}
.rung .rbadge{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0}
.rung .rmain .rl{font-size:13px;font-weight:600}
.rung .rmain .rs{font-size:11.5px;color:var(--mut);line-height:1.45}
.rung .rcost{text-align:right;font-size:11.5px;font-variant-numeric:tabular-nums;white-space:nowrap}
.rung .rcost .cf{color:var(--good-ink);font-weight:700}
.rung .rcost .cs{color:var(--mid-ink);font-weight:700}
.rung .rcost .cl{font-size:10px;color:var(--mut);display:block}
.gap-note{font-size:11.5px;color:var(--mut);background:var(--th-bg);border:1px solid var(--line);border-radius:8px;padding:8px 11px;line-height:1.55;margin-top:8px}
.gap-note b{color:var(--ink)}
.spark{display:inline-flex;align-items:flex-end;gap:2px;height:20px;vertical-align:-5px}
.spark i{width:5px;border-radius:1px;display:block;min-height:1px}
.gap-hl{padding:9px 13px;border-radius:9px;font-size:13px;font-weight:600;line-height:1.5;margin-bottom:10px}
.gap-hl.flow{background:var(--good-bg);border:1px solid var(--good-bd);color:var(--good-ink)}
.gap-hl.stock{background:var(--mid-bg);border:1px solid var(--mid-bd);color:var(--mid-ink)}
.gap-hl.done{background:var(--good-bg);border:1px solid var(--good-bd);color:var(--good-ink)}
/* ── NI Bridge (สะพานกำไร 3 ชั้น) ─────────────────────── */
.ni-bridge{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:stretch;gap:8px;margin:2px 0 4px}
.ni-tier{border:1px solid var(--line);border-radius:10px;padding:10px 12px;text-align:center}
.ni-tier .lbl{font-size:11.5px;font-weight:600;line-height:1.35}
.ni-tier .lbl span{font-size:10px;color:var(--mut);font-weight:400}
.ni-tier .val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:4px}
.ni-tier.pos{background:var(--good-bg);border-color:var(--good-bd)}
.ni-tier.pos .val{color:var(--good-ink)}
.ni-tier.neg{background:var(--bad-bg);border-color:var(--bad-bd)}
.ni-tier.neg .val{color:var(--bad-ink)}
.ni-op{display:flex;flex-direction:column;justify-content:center;text-align:center;font-size:11px;color:var(--mut);white-space:nowrap;padding:0 2px;font-weight:600}
.ni-op b{color:var(--ink);font-variant-numeric:tabular-nums}
.ni-verdict{padding:10px 13px;border-radius:9px;font-size:13px;line-height:1.55;margin-top:10px}
.ni-verdict.good{background:var(--good-bg);border:1px solid var(--good-bd);color:var(--good-ink)}
.ni-verdict.mid{background:var(--mid-bg);border:1px solid var(--mid-bd);color:var(--mid-ink)}
.ni-verdict.bad{background:var(--bad-bg);border:1px solid var(--bad-bd);color:var(--bad-ink)}
@media(max-width:640px){.ni-bridge{grid-template-columns:1fr}.ni-op{flex-direction:row;gap:6px;padding:2px 0}}
/* ── Payables Stress (เจ้าหนี้การค้ารายหมวด) ───────────── */
.mo-chip{display:inline-block;font-size:11px;font-weight:700;padding:1px 8px;border-radius:6px;font-variant-numeric:tabular-nums;white-space:nowrap}
.mo-chip.hi{background:var(--bad-bg);color:var(--bad-ink)}
.mo-chip.warn{background:var(--th-bg);color:var(--gold)}
.mo-chip.ok{background:var(--good-bg);color:var(--good-ink)}
.mo-chip.na{color:var(--mut)}
.pay-recon{font-size:11.5px;color:var(--mut);margin-top:8px;line-height:1.5}
.pay-sub{font-size:12px;font-weight:700;color:var(--mut);margin:14px 0 4px;text-transform:none}
.panel{overflow-x:auto}
.acctbl-wrap{overflow-x:auto}
@media(max-width:768px){
  #menuBtn{display:inline-flex;align-items:center;justify-content:center}
  header h1{font-size:14.5px}
  header .sub{font-size:10.5px}
  .left{position:fixed;top:0;left:0;bottom:0;width:86vw;max-width:360px;z-index:50;
    transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px var(--shadow)}
  .left.open{transform:translateX(0)}
  .drawer-close{display:flex;justify-content:flex-end;padding:8px 12px 0}
  .drawer-close button{font-family:inherit;font-size:12.5px;font-weight:600;padding:6px 12px;
    border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink)}
  .dwrap{padding:14px 12px}
  .dhead h2{font-size:16px}
  .decomp-row,.nibridge-row,.pillar-grid{grid-template-columns:1fr}
  /* Watchlist: ตาราง 7 คอลัมน์ → การ์ดต่อ รพ. (ไม่ต้องปัดซ้าย-ขวา) */
  table.wltbl{display:block}
  table.wltbl tbody{display:block}
  table.wltbl tr:first-child{display:none}
  table.wltbl tr.click{display:flex;flex-direction:column;position:relative;
    border:1px solid var(--line);border-radius:12px;margin:0 0 10px;padding:10px 52px 10px 12px;background:var(--card)}
  table.wltbl tr.click:hover{background:var(--hover)}
  table.wltbl td{display:block;border:none;padding:2px 0;white-space:normal}
  table.wltbl td:nth-child(1){order:2;font-size:11.5px;color:var(--mut)}
  table.wltbl td:nth-child(1)::before{content:'จ.'}
  table.wltbl td:nth-child(2){order:1;font-size:14px}
  table.wltbl td:nth-child(3){position:absolute;top:10px;right:12px;padding:0}
  table.wltbl td:nth-child(4){order:3;font-size:12.5px}
  table.wltbl td:nth-child(4)::before{content:'Cash ratio: ';color:var(--mut);font-size:11.5px}
  table.wltbl td:nth-child(5){order:4;font-size:12.5px}
  table.wltbl td:nth-child(5)::before{content:'เงินบำรุงสุทธิ: ';color:var(--mut);font-size:11.5px}
  table.wltbl td:nth-child(6){order:5;margin-top:6px}
  table.wltbl td:nth-child(6)::before{content:'สาเหตุ/ประเด็นชี้ปัญหา';display:block;font-weight:700;font-size:11.5px;color:var(--mut);margin-bottom:2px}
  table.wltbl td:nth-child(7){order:6;margin-top:6px}
  table.wltbl td:nth-child(7)::before{content:'คำแนะนำเฉพาะ รพ.';display:block;font-weight:700;font-size:11.5px;color:var(--mut);margin-bottom:2px}
  /* Gap-to-Target: ตาราง 6 คอลัมน์ → การ์ดต่อเกณฑ์ (ไม่ต้องปัดซ้าย-ขวา) */
  table.gaptbl{display:block}
  table.gaptbl tbody{display:block}
  table.gaptbl tr:first-child{display:none}
  table.gaptbl tr{display:block;position:relative;border:1px solid var(--line);border-radius:10px;
    margin:0 0 8px;padding:9px 40px 9px 11px;background:var(--card)}
  table.gaptbl tr.pass-row{opacity:1}
  table.gaptbl tr.pass-row td{opacity:1}
  table.gaptbl td{display:block;border:none;padding:1px 0;text-align:left!important;white-space:normal}

  table.gaptbl td:nth-child(2){font-size:12.5px;display:inline-block;margin-right:12px}
  table.gaptbl td:nth-child(2)::before{content:'ค่า: ';color:var(--mut);font-weight:400}
  table.gaptbl td:nth-child(3){font-size:12px;display:inline-block;color:var(--mut)}
  table.gaptbl td:nth-child(3)::before{content:'เกณฑ์ '}

  table.gaptbl td:nth-child(5){margin-top:4px}

}
</style>
</head>
<body>

<header>
  <button id="menuBtn" onclick="toggleDrawer()" title="เปิดรายชื่อ รพ.">☰</button>
  <h1>🔎 สาเหตุวิกฤต</h1>
  <div class="sub">ไล่สาเหตุ Risk Score จากงบทดลอง — เขตสุขภาพที่ 1 · <span id="hPeriod">-</span> · <span id="hNHosp">-</span> รพ.</div>
  <nav style="margin-left:auto;display:flex;gap:14px;font-size:13px;flex-wrap:wrap;align-items:center">
    <a href="index.html" style="color:#cbd5e1;text-decoration:none">← Balance Sheet</a>
    <a href="explorer.html" style="color:#fbbf24;text-decoration:none;font-weight:600">🔍 Explorer</a>
    <a href="https://pitaknan.github.io/Risk-Score-Rh1/" target="_blank" style="color:#cbd5e1;text-decoration:none">🎯 Risk Score</a>
    <button id="themeBtn" onclick="toggleTheme()" title="สลับโหมดมืด/สว่าง">🌙</button>
  </nav>
</header>

<div class="main">
  <!-- LEFT -->
  <div class="left">
    <div class="drawer-close"><button onclick="closeDrawer()">✕ ปิด</button></div>
    <div class="lfilt">
      <input id="qSearch" type="text" placeholder="ค้นหาชื่อ รพ. / จังหวัด..." oninput="renderList()">
      <div class="row">
        <select id="fLevel" onchange="renderList()"><option value="">ทุกระดับ</option></select>
        <select id="fProv" onchange="renderList()"><option value="">ทุกจังหวัด</option></select>
      </div>
      <div class="seg">
        <button id="sRisk" class="on" onclick="setSort('risk')">Risk สูงสุด</button>
        <button id="sDelta" onclick="setSort('delta')">แย่ลงเร็วสุด</button>
      </div>
    </div>
    <div class="llist" id="llist"></div>
  </div>

  <!-- RIGHT -->
  <div class="right" id="right">
    <div class="hint-empty">กำลังโหลด...</div>
  </div>
</div>
<div class="backdrop" id="backdrop" onclick="closeDrawer()"></div>

<script>
// ── มือถือ/แท็บเล็ต: drawer สำหรับรายชื่อ รพ. ────────────────
function toggleDrawer(){
  const open=!document.querySelector('.left').classList.contains('open');
  document.querySelector('.left').classList.toggle('open',open);
  document.getElementById('backdrop').classList.toggle('show',open);
}
function closeDrawer(){
  document.querySelector('.left').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}
// ── โหมดมืด/สว่าง ─────────────────────────────────────────
function isDarkNow(){const t=document.documentElement.getAttribute('data-theme');if(t)return t==='dark';return window.matchMedia('(prefers-color-scheme: dark)').matches}
function syncThemeBtn(){document.getElementById('themeBtn').textContent=isDarkNow()?'☀️':'🌙'}
function toggleTheme(){const next=isDarkNow()?'light':'dark';document.documentElement.setAttribute('data-theme',next);localStorage.setItem('rh1-theme',next);syncThemeBtn();if(CUR)renderDetail(CUR)}
syncThemeBtn();

// ── Config / State ──────────────────────────────────────────
const D='data/risk/';
let SUMMARY=null, CUR=null, HDATA=null;
let sortMode='risk';
let periodMode='mom';   // mom | yoy
let ratioMetric='cr';   // cr | qr | cash
let peerDim='grp';      // grp | level | prov
let ratioChart=null;
const H_CACHE={};

const TH_M=['ต.ค.','พ.ย.','ธ.ค.','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.'];
function tLab(t){return TH_M[t%100-1]+String(t).slice(2,4)}
function fmtM(v){if(v==null)return '—';const a=Math.abs(v);if(a>=1e9)return(v/1e9).toFixed(2)+'B';if(a>=1e6)return(v/1e6).toFixed(1)+'M';if(a>=1e3)return(v/1e3).toFixed(0)+'K';return Math.round(v).toLocaleString()}
function fmtR(v){return v==null?'—':v.toFixed(2)}
function riskColor(r){
  if(r==null)return '#94a3b8';
  if(r<=1)return getCss('--green'); if(r<=3)return getCss('--gold'); if(r<=5)return getCss('--orange'); return getCss('--red');
}
function getCss(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}

// ── Init ──────────────────────────────────────────────────
async function init(){
  try{ SUMMARY = await fetch(D+'summary.json').then(r=>r.json()); }
  catch(e){ document.getElementById('llist').innerHTML='<div style="padding:16px;color:var(--mut)">โหลดข้อมูลไม่ได้ — ยังไม่ได้รัน export_risk_link.py หรือ path ผิด</div>'; return; }

  document.getElementById('hPeriod').textContent=SUMMARY.periodLabel+' '+SUMMARY.period;
  document.getElementById('hNHosp').textContent=SUMMARY.nHosp;

  const levels=[...new Set(SUMMARY.hospitals.map(h=>h.level).filter(Boolean))].sort();
  const provs=[...new Set(SUMMARY.hospitals.map(h=>h.prov).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'th'));
  const fL=document.getElementById('fLevel'), fP=document.getElementById('fProv');
  for(const l of levels){const o=document.createElement('option');o.value=l;o.textContent=l;fL.appendChild(o)}
  for(const p of provs){const o=document.createElement('option');o.value=p;o.textContent=p;fP.appendChild(o)}

  renderList();

  // deep link: #h/{hcode} — ไม่มี hash หรือ hash ไม่ตรง = หน้า Watchlist (ค่าเริ่มต้น)
  window.addEventListener('hashchange',applyHash);
  applyHash();
}

function applyHash(){
  const m=location.hash.match(/^#h\/(\w+)/);
  if(m && SUMMARY.hospitals.find(h=>h.hcode===m[1])) selectHosp(m[1]);
  else { CUR=null; renderList(); renderWatchlist(); }
}

// ── List (L0) ───────────────────────────────────────────────
function setSort(s){sortMode=s;document.getElementById('sRisk').classList.toggle('on',s==='risk');document.getElementById('sDelta').classList.toggle('on',s==='delta');renderList()}

function renderList(){
  const q=document.getElementById('qSearch').value.trim().toLowerCase();
  const lv=document.getElementById('fLevel').value, pv=document.getElementById('fProv').value;
  let rows=SUMMARY.hospitals.filter(h=>
    (!lv||h.level===lv)&&(!pv||h.prov===pv)&&
    (!q||h.name.toLowerCase().includes(q)||(h.prov||'').toLowerCase().includes(q))
  );
  if(sortMode==='risk') rows=rows.slice().sort((a,b)=>(b.risk||0)-(a.risk||0));
  else rows=rows.slice().sort((a,b)=>((b.risk||0)-(b.riskPrev3||0))-((a.risk||0)-(a.riskPrev3||0)));

  document.getElementById('llist').innerHTML = rows.map((h,i)=>{
    const d=(h.risk||0)-(h.riskPrev3??h.risk??0);
    const arrow = d>0?`<span class="trend-arrow" style="color:var(--red)" title="แย่ลง ${d} จุด ใน 3 เดือน">▲</span>`
                : d<0?`<span class="trend-arrow" style="color:var(--green)" title="ดีขึ้น ${-d} จุด ใน 3 เดือน">▼</span>`
                : `<span class="trend-arrow" style="color:var(--mut)">–</span>`;
    return `<div class="lrow${CUR===h.hcode?' actv':''}" onclick="location.hash='h/${h.hcode}'">
      <span class="rk">${i+1}</span>
      <span class="badge" style="background:${riskColor(h.risk)}">${h.risk!=null?h.risk:'–'}</span>
      ${arrow}
      <span class="nm"><span class="n1">${h.name}</span><span class="n2">${h.prov||''} · ${h.grp||''}</span></span>
    </div>`;
  }).join('') || '<div style="padding:16px;color:var(--mut)">ไม่พบโรงพยาบาล</div>';
}

// ── Select hospital → load detail (L1-L4) ───────────────────
async function selectHosp(hcode){
  CUR=hcode;
  renderList();
  closeDrawer();
  document.getElementById('right').innerHTML='<div class="hint-empty">กำลังโหลด...</div>';
  try{
    if(!(hcode in H_CACHE)) H_CACHE[hcode]=await fetch(`${D}h/${hcode}.json`).then(r=>r.json());
    HDATA=H_CACHE[hcode];
  }catch(e){
    document.getElementById('right').innerHTML='<div class="hint-empty">โหลดรายละเอียดของ รพ.นี้ไม่ได้</div>';
    return;
  }
  ratioMetric='cr'; periodMode='mom';
  renderDetail(hcode);
}

function summaryOf(hcode){ return SUMMARY.hospitals.find(h=>h.hcode===hcode) }

// ── Watchlist: สาเหตุ + คำแนะนำ อัตโนมัติ (map จากกรอบ "4 เสาหลัก") ──────
function causeBullets(h){
  const b=[];
  if((h.triggers||[]).includes('cash')) b.push(`Cash ratio ต่ำ ${fmtR(h.cash)}`);
  if((h.triggers||[]).includes('qr')) b.push(`Quick ratio ต่ำ ${fmtR(h.qr)}`);
  if((h.triggers||[]).includes('cr')) b.push(`Current ratio ต่ำ ${fmtR(h.cr)}`);
  if(h.nwc<0) b.push(`NWC ติดลบ ${fmtM(h.nwc)}`);
  if(h.reserve<0) b.push(`เงินบำรุงคงเหลือสุทธิติดลบ ${fmtM(h.reserve)}`);
  if((h.triggers||[]).includes('ni')) b.push(`ขาดทุนสะสม ${fmtM(h.ni)}`);
  const tc=h.topCause||{};
  if(tc.exp && tc.exp.name && tc.exp.delta>0) b.push(`${tc.exp.name} เพิ่ม ${fmtM(tc.exp.delta)}`);
  if(tc.ca && tc.ca.name && tc.ca.delta<0) b.push(`${tc.ca.name} ลด ${fmtM(Math.abs(tc.ca.delta))}`);
  if(tc.cl && tc.cl.name && tc.cl.delta>0) b.push(`${tc.cl.name} เพิ่ม ${fmtM(tc.cl.delta)}`);
  return b.slice(0,4);
}
function recommendFor(h){
  const rec=[]; const tc=h.topCause||{};
  const isPersonnel = tc.exp && tc.exp.name && /เงินเดือน|ค่าจ้าง|ค่าตอบแทน/.test(tc.exp.name);
  const trig=h.triggers||[];
  if(trig.includes('cash')||trig.includes('ni'))
    rec.push('เร่งปิด gap รายได้: ตรวจ claim ค้าง/ถูกปฏิเสธ, coding/DRG, เร่งรัดลูกหนี้ค้างจ่าย');
  if(isPersonnel && (trig.includes('ni')||h.nwc<0))
    rec.push('Lean จัดกำลังคนตามภาระงานจริง คุมสัดส่วนค่าใช้จ่ายบุคลากรต่อรายได้ไม่เกิน 50-60%');
  if(trig.includes('qr'))
    rec.push('ทำ Lean Inventory / เข้าร่วมจัดซื้อร่วมระดับเขต ลด safety stock ยา-เวชภัณฑ์');
  if((trig.includes('cr')||h.nwc<0) && !isPersonnel)
    rec.push('คุมสภาพคล่องผ่านสัปดาห์ แยกงบลงทุนออกจากเงินหมุนเวียน รักษาวินัยแผนเงินบำรุง/Planfin');
  if(h.ebitda!=null && h.ebitda<0 && !rec.length)
    rec.push('ทำ EBITDA recovery plan: เพิ่มรายได้ที่เรียกเก็บได้จริง ลดต้นทุนที่ไม่กระทบบริการ');
  if(!rec.length) rec.push('ติดตามต่อเนื่อง ยังอยู่ในเกณฑ์ควบคุมได้');
  return rec.slice(0,2);
}

function renderWatchlist(){
  const rows=SUMMARY.hospitals.filter(h=>(h.risk||0)>=6).sort((a,b)=>(b.risk||0)-(a.risk||0));
  document.getElementById('right').innerHTML=`
  <div class="dwrap" style="max-width:1200px">
    <div class="dhead">
      <h2>🚨 Watchlist — โรงพยาบาลวิกฤต 6-7 คะแนน</h2>
      <span class="meta">งวด ${SUMMARY.periodLabel} ${SUMMARY.period} · ${rows.length} แห่ง จาก ${SUMMARY.nHosp}</span>
    </div>
    <div class="note">คลิกแถวเพื่อดูรายละเอียดสาเหตุเต็มรูปแบบ (เทรนด์/waterfall/บัญชี GL) ของ รพ.นั้น</div>
    <div class="panel">
      <div class="acctbl-wrap" style="max-height:none">
        <table class="wltbl">
          <tr><th>จังหวัด</th><th>โรงพยาบาล</th><th>Risk</th><th>Cash<br>ratio</th><th>เงินบำรุง<br>สุทธิ</th><th>สาเหตุ/ประเด็นชี้ปัญหา</th><th>คำแนะนำเฉพาะ รพ.</th></tr>
          ${rows.map(h=>`<tr class="click" onclick="location.hash='h/${h.hcode}'">
            <td>${h.prov||''}</td>
            <td><b>${h.name}</b><div class="note">${h.typeSer||''}${h.bed?' · '+h.bed+' เตียง':''}${h.grp?' · '+h.grp:''}</div></td>
            <td><span class="badge" style="background:${riskColor(h.risk)}">${h.risk}</span></td>
            <td>${fmtR(h.cash)}</td>
            <td style="color:${h.reserve<0?'var(--red)':'var(--ink)'}">${fmtM(h.reserve)}</td>
            <td><ul class="bullets">${causeBullets(h).map(b=>`<li>${b}</li>`).join('')}</ul></td>
            <td><ul class="bullets">${recommendFor(h).map(r=>`<li>${r}</li>`).join('')}</ul></td>
          </tr>`).join('')}
        </table>
      </div>
      ${!rows.length?'<div class="note" style="padding:10px">ไม่มี รพ. ที่ Risk Score ≥ 6 ในงวดนี้ 🎉</div>':''}
    </div>
    ${refPanelHtml()}
  </div>`;
}

// ── Reference Panel: กรอบ 4 เสาหลัก + ข้อเสนอเชิงระบบ 3 ระดับ ───────────
// เนื้อหาจาก "เขตฯ - การที่จะนำพาให้โรงพยาบาล ไม่ติด 7.docx" — ยุทธศาสตร์ร่วมทั้งองค์กร
function refPanelHtml(){
  return `<details class="refpanel">
    <summary>📖 กรอบยุทธศาสตร์ 4 เสาหลัก + ข้อเสนอเชิงระบบ (ไม่ให้ติดวิกฤต 7)</summary>
    <div class="refbody">
      <p class="note" style="margin-bottom:10px">เป้าหมาย: ดัน CR≥1.5, QR≥1, CashR≥0.8 และล็อก NWC กับ NI ให้เป็นบวกพร้อมกัน (เข้าเกณฑ์ 0 คะแนนความเสี่ยงทันที)</p>
      <div class="pillar-grid">
        <div class="pillar-card"><h4>1. รายได้และงานประกัน — "คีย์ครบ เคลมไว ตรวจสอบเข้ม"</h4>
          <ul><li>ตั้งทีม Audit หน้างานเชิงรุก (Pre-audit เวชระเบียนก่อนส่งเคลม)</li>
          <li>เพิ่มคุณภาพสรุปชาร์ต IPD ให้ Coder บันทึกรหัสถูกต้อง → เพิ่ม CMI/AdjRW</li>
          <li>ระบบลูกหนี้เรียลไทม์ + Reconciliation กับ Statement กองทุน</li></ul></div>
        <div class="pillar-card"><h4>2. เจ้าหนี้และต้นทุนบุคลากร — "Lean จัดกำลังตามภาระงานจริง"</h4>
          <ul><li>ใช้ Workload Data จัดเวร OT แบบ Dynamic แทน Fixed</li>
          <li>คุมค่าใช้จ่ายบุคลากรไม่เกิน 50-60% ของรายได้หลัก</li></ul></div>
        <div class="pillar-card"><h4>3. บริหารคลังและพัสดุ — "คลัง Lean ด้วยการซื้อร่วม"</h4>
          <ul><li>จัดซื้อร่วมระดับจังหวัด/เขต + ขยาย Credit Term 90-120 วัน</li>
          <li>Lean Inventory ลด Safety Stock + VMI สำหรับยาเคลื่อนไหวช้า</li></ul></div>
        <div class="pillar-card"><h4>4. วินัยการเงินและการลงทุน — "ห้ามเอาเงินหมุนไปสร้างตึก"</h4>
          <ul><li>แยกกระเป๋างบลงทุนออกจากเงินหมุนเวียนเด็ดขาด (CR จะหักงบลงทุนออกอัตโนมัติ)</li>
          <li>ของใหญ่พึ่งงบประมาณ/เงินบริจาค ไม่ดึงเงินบำรุงรายวัน</li></ul></div>
      </div>
      <h4 style="font-size:13px;margin-bottom:8px">ข้อเสนอเชิงระบบ 3 ระดับ × ระยะเวลา</h4>
      <div style="overflow-x:auto">
      <table class="systbl">
        <tr><th style="width:12%">ระดับ</th><th style="width:44%">ระยะ 1-3 เดือน</th><th style="width:44%">ระยะ 1 ปี</th></tr>
        <tr><td><b>โรงพยาบาล</b></td>
          <td><ul><li>ตั้ง War room การเงินรายสัปดาห์ ทำ 13-week cashflow แยกเจ้าหนี้/ลูกหนี้/เงินสด</li>
              <li>เคลียร์ claim ค้างและ claim ถูกปฏิเสธ แยก UC-CS-SS-EMS พร้อมเจ้าของงานและ target รายสัปดาห์</li>
              <li>ตั้งเพดานรายจ่าย 90 วัน: ยา วัสดุเวชภัณฑ์ จ้างเหมาบริการ OT/ค่าตอบแทน</li>
              <li>ทบทวน Planfin รายเดือน: variance >5% ต้องมี action และผู้รับผิดชอบ</li></ul></td>
          <td><ul><li>ทำ Service line P&L/Unit cost รายบริการ ปรับโครงสร้างต้นทุนตามภาระบริการจริง</li>
              <li>ระบบ inventory management เป้า stock 30-45 วัน + จัดซื้อร่วม</li>
              <li>พัฒนาคุณภาพ coding/DRG/CMI ตั้งแต่หน้างานถึงการเคลม</li>
              <li>ปรับ productivity เทียบบุคลากร-บริการตามระดับบริการและเครือข่ายส่งต่อ</li></ul></td></tr>
        <tr><td><b>จังหวัด</b></td>
          <td><ul><li>จัดทีมจังหวัดลงตรวจบัญชีลูกหนี้/เจ้าหนี้ รายการค่าใช้จ่ายสูงผิดปกติใน รพ. Risk 7 ก่อน</li>
              <li>ทำ liquidity support แบบมีเงื่อนไขสำหรับ รพ. NWC ติดลบ/EBITDA ติดลบ พร้อมแผนคืนเงิน</li>
              <li>ประชุม CFO จังหวัดทุก 2 สัปดาห์ ติดตาม Cash ratio, NWC, EBITDA, claim backlog</li></ul></td>
          <td><ul><li>ทำแผนเครือข่ายบริการจังหวัด ลดบริการซ้ำซ้อน เพิ่มการรับกลับ/ส่งต่อที่คุ้มค่า</li>
              <li>ตั้ง benchmark ต้นทุนตามกลุ่ม รพ. และแผนลดส่วนเกินรายหมวด</li>
              <li>พัฒนา shared coding/claim audit team ระดับจังหวัด</li>
              <li>ตั้ง provincial early-warning dashboard ก่อนเข้า Risk 6-7</li></ul></td></tr>
        <tr><td><b>เขตสุขภาพ</b></td>

function narrative(s, h){
  const trig=s.triggers||[];
  const TRIG_TH={cr:'Current Ratio',qr:'Quick Ratio',cash:'Cash Ratio',nwc:'เงินทุนหมุนเวียนสุทธิติดลบ',ni:'ขาดทุนสะสม',survival:'ระยะเวลาอยู่รอดสั้น'};
  const d=(s.risk||0)-(s.riskPrev3??s.risk??0);
  const trend = d>0?`แย่ลงจาก ${s.riskPrev3} เป็น ${s.risk} ใน 3 เดือน`:d<0?`ดีขึ้นจาก ${s.riskPrev3} เป็น ${s.risk} ใน 3 เดือน`:`คงที่ที่ ${s.risk} คะแนน มา 3 เดือน`;
  let cause='';
  const acc=(h.topAccounts[periodMode]||h.topAccounts.mom||{}).accounts||[];
  if(acc.length){
    const top=acc[0];
    cause=` สาเหตุหลักที่ขยับแรงสุด: ${top.name} (${top.cls==='CA'?'สินทรัพย์':'หนี้สิน'}) เปลี่ยน ${top.delta>0?'+':''}${fmtM(top.delta)} บาท`;
  }
  const cls = (s.risk||0)>=6?'bad':(s.risk||0)>=3?'mid':'good';
  const trigTxt = trig.length? `จุดที่พลาดเกณฑ์: ${trig.map(t=>TRIG_TH[t]||t).join(', ')}.` : 'ผ่านทุกเกณฑ์ในงวดนี้';
  return {cls, text:`${h.name} ระดับความเสี่ยง ${s.risk??'-'}/7 (${trend}) — ${trigTxt}${cause}`};
}

// ── Gap-to-Target Solver ────────────────────────────────────
// จำลองคะแนน Risk จากค่าดิบงบดุล+P&L ตามสูตรเดียวกับ pipeline (export_risk_link.py)
function scoreOf(ca, cl, qn, cn, ni, mo){
  if(!cl) return null;
  const cr=ca/cl, qr=qn/cl, cash=cn/cl, nwc=ca-cl;
  const li=(cr<1.5?1:0)+(qr<1.0?1:0)+(cash<0.8?1:0);
  const st=(nwc<0?1:0)+(ni<0?1:0);
  const m=mo>0?mo:12;
  const np=nwc>=0, ip=ni>=0;
  let su;
  if(np&&ip) su=0;
  else if(!np&&!ip) su=2;
  else if(np&&!ip){ const a=Math.abs(ni)/m; const s=a?nwc/a:1e9; su=s<3?2:s<6?1:0; }
  else { const a=ni/m; const r=a?(-nwc)/a:1e9; su=r<3?0:r<6?1:2; }
  return {cr,qr,cash,nwc,li,st,su,risk:li+st+su};
}
// ลำดับปิดช่องว่าง flow-first → คืน milestone + คะแนนที่จำลองได้
function buildLadder(t, mo){
  let ca=t.ca, cl=t.cl, qn=t.qn, cn=t.cn, ni=t.ni;
  const steps=[]; let flow=0, stock=0;
  if(ni<0){ flow+=(-ni); ni=0;
    steps.push({label:'หยุดเลือด — ทำ NI สะสมให้ ≥ 0', type:'FLOW', flow, stock, sc:scoreOf(ca,cl,qn,cn,ni,mo)}); }
  if(ca-cl<0){ const d=cl-ca; stock+=d; ca+=d; cn+=d; qn+=d;
    steps.push({label:'พ้นกับดักอยู่รอด — ล้าง NWC ให้เป็นบวก', type:'STOCK', flow, stock, sc:scoreOf(ca,cl,qn,cn,ni,mo)}); }
  const s2=scoreOf(ca,cl,qn,cn,ni,mo);
  if(s2 && s2.li>0){
    const need=Math.max(1.5*cl-ca, 0.8*cl-cn, cl-qn, 0);
    if(need>0){ stock+=need; ca+=need; cn+=need; qn+=need; }
    steps.push({label:'เข้าเกณฑ์สภาพคล่องครบ (CR/QR/Cash)', type:'STOCK', flow, stock, sc:scoreOf(ca,cl,qn,cn,ni,mo)});
  }
  return steps;
}
function monthlyNI(tr){
  const out=[];
  for(let i=0;i<tr.length;i++){
    const mm=tr[i].t%100;
    if(tr[i].ni==null){out.push(null);continue}
    if(mm===1){out.push(tr[i].ni);continue}
    const p=tr[i-1];
    out.push(p&&p.t===tr[i].t-1&&p.ni!=null?tr[i].ni-p.ni:null);
  }
  return out;
}
function renderGapSolver(h, s){
  const box=document.getElementById('gapBox'); if(!box) return;
  const t=h.trend[h.trend.length-1];
  if(!t || t.cl==null || !t.cl){ box.innerHTML='<div class="note">งวดนี้ไม่มีค่าดิบงบดุล (ตัวส่วนเป็น 0 หรือ shard เวอร์ชันเก่า)</div>'; return; }
  const mo=t.t%100;
  const cur=scoreOf(t.ca,t.cl,t.qn,t.cn,t.ni,mo);
  const CR_T=1.5,QR_T=1.0,CASH_T=0.8;
  const rows=[
    {name:'Current Ratio',val:fmtR(cur.cr),th:'≥ 1.5',fail:cur.cr<CR_T,type:'STOCK',
     opt:`เพิ่มสินทรัพย์หมุนเวียน <b>+${fmtM(CR_T*t.cl-t.ca)}</b> หรือ ลดหนี้หมุนเวียน <b>−${fmtM(t.cl-t.ca/CR_T)}</b>`,
     head:`เกิน ${fmtR(cur.cr-CR_T)}`},
    {name:'Quick Ratio',val:fmtR(cur.qr),th:'≥ 1.0',fail:cur.qr<QR_T,type:'STOCK',
     opt:`เพิ่มสินทรัพย์เร็ว <b>+${fmtM(QR_T*t.cl-t.qn)}</b> หรือ ลดหนี้หมุนเวียน <b>−${fmtM(t.cl-t.qn/QR_T)}</b>`,
     head:`เกิน ${fmtR(cur.qr-QR_T)}`},
    {name:'Cash Ratio',val:fmtR(cur.cash),th:'≥ 0.8',fail:cur.cash<CASH_T,type:'STOCK',
     opt:`เพิ่มเงินสด+เงินฝาก <b>+${fmtM(CASH_T*t.cl-t.cn)}</b> หรือ ลดหนี้หมุนเวียน <b>−${fmtM(t.cl-t.cn/CASH_T)}</b>`,
     head:`เกิน ${fmtR(cur.cash-CASH_T)}`},
    {name:'NWC เงินทุนหมุนเวียนสุทธิ',val:fmtM(cur.nwc),th:'≥ 0',fail:cur.nwc<0,type:'STOCK',
     opt:`ปิดช่องว่าง <b>+${fmtM(-cur.nwc)}</b> (เพิ่มสินทรัพย์ฯ หรือลดหนี้ฯ)`,
     head:`บวกอยู่ ${fmtM(cur.nwc)}`},
    {name:'NI กำไร/ขาดทุนสะสม',val:fmtM(t.ni),th:'≥ 0',fail:t.ni<0,type:'FLOW',
     opt:`ทำกำไรเพิ่มอีก <b>+${fmtM(-t.ni)}</b> ภายในสิ้นปีงบ`,
     head:`กำไรอยู่ ${fmtM(t.ni)}`},
    {name:'SU คะแนนอยู่รอด',val:cur.su,th:'= 0',fail:cur.su>0,type:'STOCK',
     opt:`ต้องมี <b>NWC ≥ 0 และ NI ≥ 0 พร้อมกัน</b> (SU จะลดทันทีเมื่อพ้น 2 เงื่อนไขนี้)`,
     head:`ปลอดภัย`},
  ];
  const tbl=`<table class="gaptbl">
    <tr><th class="l">เกณฑ์</th><th>ค่าปัจจุบัน</th><th>เกณฑ์ผ่าน</th><th class="l">ต้องทำเท่าไหร่ถึงผ่าน</th><th>ชนิด</th><th>สถานะ</th></tr>
    ${rows.map(r=>`<tr class="${r.fail?'':'pass-row'}">
      <td class="l">${r.name}</td>
      <td class="${r.fail?'gp-fail':'gp-pass'}">${r.val}</td>
      <td>${r.th}</td>
      <td class="opt">${r.fail?r.opt:'<span class="gp-pass">✓ '+r.head+'</span>'}</td>
      <td>${r.fail?`<span class="lvchip ${r.type==='FLOW'?'flow':'stock'}">${r.type}</span>`:'—'}</td>
      <td class="${r.fail?'gp-fail':'gp-pass'}">${r.fail?'✗':'✓'}</td>
    </tr>`).join('')}
  </table>`;

  // ── headline + ladder ──
  const steps=buildLadder(t, mo);
  let hl, ladderHtml='', noteHtml='';
  if(cur.risk<=0){
    hl=`<div class="gap-hl done">✓ ${h.name} ผ่านทุกเกณฑ์ในงวดนี้ (Risk 0) — ตารางด้านล่างแสดง "ระยะห่างเหนือเกณฑ์" ของแต่ละตัว เพื่อเฝ้าระวังไม่ให้หลุดกลับ</div>`;
  }else{
    const first=steps[0];
    if(first && first.type==='FLOW'){
      const monthsLeft=Math.max(1,12-mo);
      const req=(-t.ni)/monthsLeft;
      hl=`<div class="gap-hl flow">เกณฑ์แรกที่ควรโจมตี = <b>NI (กำไร)</b> ซึ่งอยู่ในมือ รพ. — ห่างเป้าแค่ <b>${fmtM(-t.ni)}</b> ≈ +${fmtM(req)}/เดือน อีก ${monthsLeft} เดือน แล้วคะแนนจะลดจาก ${cur.risk} → ${first.sc.risk} ทันที (ST ลด 1)</div>`;
    }else if(first){
      hl=`<div class="gap-hl stock">งวดนี้เกณฑ์ที่เหลือเป็น <b>STOCK</b> (ต้องใช้เงินก้อน/ปรับหนี้) — ก้อนแรก ${fmtM(first.stock)} จะลดคะแนน ${cur.risk} → ${first.sc.risk}</div>`;
    }
    // ladder rungs: เริ่มจากคะแนนปัจจุบัน แล้วไล่ตาม milestone
    const startBadge=`<div class="rung">
      <div class="rbadge" style="background:${riskColor(cur.risk)}">${cur.risk}</div>
      <div class="rmain"><div class="rl">คะแนนปัจจุบัน (LI ${cur.li} + ST ${cur.st} + SU ${cur.su})</div>
      <div class="rs">พลาด ${cur.li+cur.st+ (cur.su>0?1:0)} กลุ่มเกณฑ์</div></div>
      <div class="rcost"></div></div>`;
    const rungs=steps.map((st_,i)=>{
      const prev=i===0?cur:steps[i-1].sc;
      const drop=prev.risk-st_.sc.risk;
      const costHtml=`${st_.flow>0?`<span class="cf">กำไร +${fmtM(st_.flow)}</span>`:''}${st_.flow>0&&st_.stock>0?'<br>':''}${st_.stock>0?`<span class="cs">เงินก้อน +${fmtM(st_.stock)}</span>`:''}<span class="cl">สะสมรวม</span>`;
      return `<div class="rung">
        <div class="rbadge" style="background:${riskColor(st_.sc.risk)}">${st_.sc.risk}</div>
        <div class="rmain"><div class="rl">${st_.label}</div>
          <div class="rs">${st_.type==='FLOW'?'FLOW · ทำเองได้':'STOCK · ต้องการทรัพยากร'} → ลด ${drop} คะแนน (LI ${st_.sc.li}+ST ${st_.sc.st}+SU ${st_.sc.su})${drop>=2?' · <b>ลดหลายคะแนนพร้อมกันเพราะปลดล็อก SU</b>':''}</div></div>
        <div class="rcost">${costHtml}</div></div>`;
    }).join('');
    ladderHtml=`<div class="wf-title" style="margin-top:14px">บันไดลดคะแนน Risk (จำลอง)</div><div class="ladder">${startBadge}${rungs}</div>`;
  }

  // ── NI capability note (เฉพาะเมื่อ NI ยังติดลบ) ──
  if(t.ni<0){
    const mn=monthlyNI(h.trend).slice(-6);
    const vals=mn.filter(v=>v!=null);
    const mx=Math.max(1,...vals.map(v=>Math.abs(v)));
    const spark=`<span class="spark">${mn.map(v=>{
      if(v==null)return '<i style="height:2px;background:var(--line)"></i>';
      const hgt=Math.round(Math.abs(v)/mx*18)+2;
      return `<i title="${fmtM(v)}" style="height:${hgt}px;background:${v>=0?'var(--green)':'var(--red)'}"></i>`;
    }).join('')}</span>`;
    const last3=monthlyNI(h.trend).slice(-3).map(v=>v==null?'—':(v>0?'+':'')+fmtM(v));
    noteHtml=`<div class="gap-note">💡 <b>NI เป็นคันโยก FLOW เพียงตัวเดียว</b> — กำไรรายเดือน 6 งวดล่าสุด ${spark} (เขียว=กำไร แดง=ขาดทุน) · 3 เดือนล่าสุด: ${last3.join(' / ')} ล้านบาท<br>
    เมื่อ NI สะสมพลิกบวก คะแนน ST จะลด 1 แต่ <b>SU มักยังค้างที่ 2</b> เพราะเวลาที่กำไรจะดัน NWC กลับบวกยังนานเกิน 6 เดือน — ต้องแก้ NWC (STOCK) ควบคู่ SU จึงจะปลดล็อก</div>`;
  }

  box.innerHTML=hl+tbl+ladderHtml+noteHtml;
}

// ── NI Bridge: สะพานกำไร 3 ชั้นทางการ (กองเศรษฐกิจสุขภาพ) ────────
function renderNITiers(h, s){
  const box=document.getElementById('niTierBox'); if(!box) return;
  const t=h.trend[h.trend.length-1];
  if(!t || t.rev==null || t.e33y==null){ box.innerHTML='<div class="note">งวดนี้ไม่มีค่าดิบรายได้/ค่าใช้จ่ายทางการ (shard เก่า)</div>'; return; }
  const niDep=t.rev-t.exp;        // 3007X = NI มีค่าเสื่อม (Risk ST/SU)
  const niNoDep=t.rev-t.e33y;     // 3006X = NI ไม่มีค่าเสื่อม
  const ebitda=t.e33x-t.e33y;     // 333  = EBITDA
  const dep=t.exp-t.e33y;         // ค่าเสื่อม (บวกกลับ)
  const invRev=t.rev-t.e33x;      // รายได้งบลงทุน (ตัดออก)
  const cls=v=>v>=0?'pos':'neg';
  const tiers=`<div class="ni-bridge">
    <div class="ni-tier ${cls(niDep)}"><div class="lbl">NI มีค่าเสื่อม<br><span>3007X · Risk ST/SU</span></div><div class="val">${fmtM(niDep)}</div></div>
    <div class="ni-op">+ ค่าเสื่อม<br><b>${fmtM(dep)}</b></div>
    <div class="ni-tier ${cls(niNoDep)}"><div class="lbl">NI ไม่มีค่าเสื่อม<br><span>3006X</span></div><div class="val">${fmtM(niNoDep)}</div></div>
    <div class="ni-op">− รายได้งบลงทุน<br><b>${fmtM(invRev)}</b></div>
    <div class="ni-tier ${cls(ebitda)}"><div class="lbl">EBITDA<br><span>333</span></div><div class="val">${fmtM(ebitda)}</div></div>
  </div>`;
  let vtxt, vcls;
  if(niDep>=0){
    vcls='good'; vtxt=`<b>NI เป็นบวก ${fmtM(niDep)}</b> — ผ่านเกณฑ์ NI ของ ST อยู่แล้ว`;
    if(ebitda<0) vtxt+=` แต่ EBITDA ติดลบ ${fmtM(ebitda)} (พึ่งรายได้งบลงทุน ${fmtM(invRev)}) — ควรจับตาความยั่งยืน`;
  }else if(niNoDep>=0){
    if(ebitda>=0){ vcls='mid'; vtxt=`<b>ขาดทุน NI ${fmtM(niDep)} เกิดจากค่าเสื่อมราคา (ไม่ใช่เงินสด) ${fmtM(dep)} เป็นหลัก</b> — ทั้ง NI ไม่มีค่าเสื่อม (+${fmtM(niNoDep)}) และ EBITDA (${fmtM(ebitda)}) เป็นบวก การดำเนินงานยังสร้างเงินสดได้ · เกณฑ์ ST ยึดชั้นบนสุด (มีค่าเสื่อม) จึงจับติดลบ`; }
    else { vcls='mid'; vtxt=`<b>NI ${fmtM(niDep)} ติดลบเพราะค่าเสื่อม ${fmtM(dep)}</b> — NI ไม่มีค่าเสื่อมเป็นบวก (+${fmtM(niNoDep)}) แต่ EBITDA กลับติดลบ ${fmtM(ebitda)} เพราะกำไรก้อนนี้พึ่ง<b>รายได้งบลงทุน ${fmtM(invRev)}</b> ที่ไม่ประจำ — การดำเนินงานหลักเกือบเท่าทุน/ขาดทุนเล็กน้อย`; }
  }else{
    vcls='bad'; vtxt=`<b>ขาดทุนทุกชั้น</b> — แม้บวกกลับค่าเสื่อม (NI ไม่มีค่าเสื่อม ${fmtM(niNoDep)}) และตัดงบลงทุนเป็น EBITDA (${fmtM(ebitda)}) ก็ยังติดลบ — เป็นปัญหาการดำเนินงานจริง ไม่ใช่แค่ค่าเสื่อม/งบลงทุน`;
  }
  const hint = niDep<0 ? `<div class="note" style="margin-top:6px">📎 ถ้าเกณฑ์ ST ใช้ EBITDA แทน NI มีค่าเสื่อม รพ.นี้จะ${ebitda>=0?'<b style="color:var(--green)">ผ่าน</b>':'<b style="color:var(--red)">ยังไม่ผ่าน</b>'} — แต่เกณฑ์ทางการยึด NI มีค่าเสื่อม จึงยังนับเป็นความเสี่ยง</div>` : '';
  box.innerHTML=tiers+`<div class="ni-verdict ${vcls}">${vtxt}</div>`+hint;
}

// ── C: Payables Stress — เจ้าหนี้การค้ารายหมวด + เดือนค้างจ่าย ──
function renderPayables(h){
  const box=document.getElementById('payablesBox'); if(!box) return;
  const p=h.payables;
  if(!p || (!(p.supplier||[]).length && !(p.claims||[]).length)){ box.innerHTML='<div class="note">งวดนี้ไม่มีข้อมูลเจ้าหนี้การค้า</div>'; return; }
  const moChip=r=>{
    if(r.monthsOut==null) return '<span class="mo-chip na">—</span>';
    const v=r.monthsOut, cls=v>12?'hi':v>6?'warn':'ok';
    return `<span class="mo-chip ${cls}">${v}${r.capped?'+':''} เดือน</span>`;
  };
  const supTbl=`<table class="acctbl">
    <tr><th>หมวดเจ้าหนี้การค้า</th><th>คงเหลือ</th><th>อัตราใช้/เดือน</th><th style="text-align:center">ค้างจ่าย≈</th></tr>
    ${p.supplier.map(r=>`<tr>
      <td>${r.name}${r.usageAcct?`<div class="note" style="font-size:10.5px">คู่กับ: ${r.usageAcct}</div>`:''}</td>
      <td>${fmtM(r.value)}</td>
      <td>${r.monthlyRate!=null?fmtM(r.monthlyRate):'<span class="note">—</span>'}</td>
      <td style="text-align:center">${moChip(r)}</td>

  let claimsTbl='';
  if((p.claims||[]).length){
    claimsTbl=`<div class="pay-sub">เจ้าหนี้ตามจ่าย/เคลม (ชำระระหว่างหน่วยบริการ — ไม่มีรอบการใช้ จึงไม่คำนวณเดือนค้างจ่าย)</div>
    <div class="acctbl-wrap" style="max-height:none"><table class="acctbl">
      <tr><th>รายการ</th><th>คงเหลือ</th><th>Δ เทียบเดือนก่อน</th></tr>
      ${p.claims.map(r=>`<tr><td>${r.name}</td><td>${fmtM(r.value)}</td>
        <td style="color:${deltaColor(r.delta,'CL')};font-weight:700">${r.delta>0?'+':''}${fmtM(r.delta)}</td></tr>`).join('')}
    </table></div>`;
  }
  const t=h.trend[h.trend.length-1];
  const clTotal=t?t.cl:null;
  const recon=`<div class="pay-recon">รวมเจ้าหนี้การค้า <b>${fmtM(p.totalTrade)}</b> (ซื้อเชื่อการค้า ${fmtM(p.totalSupplier)} + ตามจ่าย/เคลม ${fmtM(p.totalClaims)})${clTotal?` · คิดเป็น ${(p.totalTrade/clTotal*100).toFixed(0)}% ของหนี้สินหมุนเวียนทั้งหมด ${fmtM(clTotal)}`:''}<br>
  🔗 เทียบ APP ทางการ (RatioID 260 · ยา/เวชภัณฑ์): <b>${t&&t.app!=null?fmtR(t.app)+' วัน ≈ '+(t.app/30.4).toFixed(1)+' เดือน':'—'}</b> — สูตรทางการใช้ยอดซื้อรายเดือน (ตัวเดียว) จึงแกว่งกว่าค่าเฉลี่ยรายหมวดด้านบนที่ใช้อัตราใช้เฉลี่ยทั้งปีงบ</div>`;
  box.innerHTML=`<div class="acctbl-wrap" style="max-height:none">${supTbl}</div>${claimsTbl}${recon}`;
}

     pass: t.opMargin!=null && peerGrp.opMargin_med!=null && t.opMargin>=peerGrp.opMargin_med},
    {label:'Return on Asset (ROA) %', val:t.roa, unit:'%', thLabel:`≥ ค่ากลางกลุ่ม (${fmtR(peerGrp.roa_med)}%)`,

    {label:'Average Collection Period — กรมบัญชีกลาง', val:t.acpCs, unit:'วัน', thLabel:'≤ 60 วัน', pass: t.acpCs!=null && t.acpCs<=60},
    {label:'Average Collection Period — ประกันสังคม', val:t.acpSs, unit:'วัน', thLabel:'≤ 90 วัน', pass: t.acpSs!=null && t.acpSs<=90},
    {label:'Inventory Management (ยา/เวชภัณฑ์)', val:t.invDays, unit:'วัน', thLabel:'≤ 60 วัน', pass: t.invDays!=null && t.invDays<=60},
  ];
  box.innerHTML=`<table class="eff-tbl">
    <tr><th>ตัวชี้วัด</th><th>ค่าปัจจุบัน</th><th>เกณฑ์เป้าหมาย</th><th>ผล</th></tr>

    </tr>`).join('')}
  </table>`;
}

// ── L2: ratio trend + peer band ──────────────────────────────
function renderRatioChart(h){
  const ctx=document.getElementById('ratioChart');
  const labels=h.trend.map(r=>tLab(r.t));
  const own=h.trend.map(r=>r[ratioMetric]);
  const peerSeries=h.peer[peerDim]||[];
  const peerByT={}; for(const p of peerSeries) peerByT[p.t]=p;
  const p25=h.trend.map(r=>{const p=peerByT[r.t];return p?p[ratioMetric+'_p25']:null});
  const p75=h.trend.map(r=>{const p=peerByT[r.t];return p?p[ratioMetric+'_p75']:null});
  const med=h.trend.map(r=>{const p=peerByT[r.t];return p?p[ratioMetric+'_med']:null});
  const ink=getCss('--ink'), blue=getCss('--blue'), mut=getCss('--mut'), line=getCss('--line');

  if(ratioChart) ratioChart.destroy();
  ratioChart=new Chart(ctx,{
    type:'line',
    data:{labels, datasets:[
      {label:'P75 กลุ่ม',data:p75,borderWidth:0,pointRadius:0,fill:false,order:3},
      {label:'ช่วง P25–P75',data:p25,borderWidth:0,pointRadius:0,fill:'-1',backgroundColor:mut+'33',order:3},
      {label:'Median กลุ่ม',data:med,borderColor:mut,borderDash:[4,4],borderWidth:1.5,pointRadius:0,fill:false,order:2},
      {label:h.name,data:own,borderColor:blue,backgroundColor:blue,borderWidth:2.5,pointRadius:2,fill:false,order:1},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{font:{family:'Sarabun',size:11},color:ink},filter:it=>it.text!=='P75 กลุ่ม'}},
      scales:{
        x:{ticks:{font:{family:'Sarabun',size:10},color:mut,maxRotation:45},grid:{color:line}},
        y:{ticks:{font:{size:10},color:mut},grid:{color:line}},
      }
    }
  });
}

// ── L2b: decomposition ────────────────────────────────────────
function renderDecomp(h){

  const items=[['cr','Current Ratio'],['qr','Quick Ratio'],['cash','Cash Ratio']];
  box.innerHTML=`<div class="note" style="margin-bottom:8px">เทียบกับงวด ${tLab(d.baseT)} ${d.baseT}</div>

    const v=d[k];
    if(!v)return `<div class="dcard"><div class="lbl">${label}</div><div class="note">ไม่มีข้อมูล</div></div>`;

    const col=x=>x>0?'var(--green)':x<0?'var(--red)':'var(--mut)';
    return `<div class="dcard">
      <div class="lbl">${label}</div>
      <div class="tot" style="color:${col(v.total)}">${sign(v.total)}${v.total.toFixed(3)}</div>
      <div class="brk">
        <span>จากสินทรัพย์: <b style="color:${col(v.fromNumerator)}">${sign(v.fromNumerator)}${v.fromNumerator.toFixed(3)}</b></span>
        <span>จากหนี้สิน: <b style="color:${col(v.fromDenominator)}">${sign(v.fromDenominator)}${v.fromDenominator.toFixed(3)}</b></span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── L3: waterfall by subgroup ──────────────────────────────────
const GOOD_UP_CLS=new Set(['CA','REV']); // เพิ่มขึ้น=ดี(เขียว) — CL/EXP เพิ่มขึ้น=แย่(แดง)
function deltaColor(delta, cls){
  if(delta===0) return 'var(--mut)';
  const pos = GOOD_UP_CLS.has(cls) ? delta>0 : delta<0;
  return pos?'var(--green)':'var(--red)';
}
function wfRows(rows, cls){
  const maxAbs=Math.max(1,...rows.map(r=>Math.abs(r.delta)));
  return rows.slice(0,12).map(r=>{
    const col=deltaColor(r.delta, cls);
    const w=Math.min(50,Math.abs(r.delta)/maxAbs*50);
    return `<div class="wf-row">
      <div class="top"><span class="nm" title="${r.name}">${r.name}</span><span class="dl" style="color:${col}">${r.delta>0?'+':''}${fmtM(r.delta)}</span></div>
      <div class="wf-bar"><i style="width:${w}%;background:${col};${r.delta<0?'right:50%':'left:50%'}"></i></div>
    </div>`;
  }).join('') || '<div class="note">ไม่มีการเปลี่ยนแปลงมีนัยสำคัญ</div>';
}
function renderWaterfall(h){
  const box=document.getElementById('wfBox');
  const wf=h.waterfall[periodMode];
  if(!wf){box.innerHTML='<div class="note">ไม่มีข้อมูลงวดเปรียบเทียบ</div>';return}
  box.innerHTML=`<div class="wf-cols">
    <div><div class="wf-title">สินทรัพย์หมุนเวียน (CA)</div>${wfRows(wf.ca,'CA')}</div>
    <div><div class="wf-title">หนี้สินหมุนเวียน (CL)</div>${wfRows(wf.cl,'CL')}</div>
  </div>`;
}

// ── L4: top accounts ─────────────────────────────────────────
function renderAcctTable(tblId, accounts){
  const tbl=document.getElementById(tblId);
  if(!accounts || !accounts.length){tbl.innerHTML='<tr><td style="padding:10px;color:var(--mut)">ไม่มีข้อมูล</td></tr>';return}
  tbl.innerHTML=`<tr><th>รหัส</th><th>ชื่อบัญชี</th><th>ประเภท</th><th>มูลค่าปัจจุบัน</th><th>Δ เปลี่ยนแปลง</th></tr>` +
    accounts.map(a=>`<tr>
      <td style="font-family:monospace;font-size:11.5px">${a.acc}</td>
      <td>${a.name}</td>
      <td><span class="clstag ${a.cls}">${a.cls}</span></td>
      <td>${fmtM(a.value)}</td>
      <td style="color:${deltaColor(a.delta,a.cls)};font-weight:700">${a.delta>0?'+':''}${fmtM(a.delta)}</td>
    </tr>`).join('');
}
function renderTopAcc(h){
  const t=h.topAccounts[periodMode];
  renderAcctTable('acctbl', t?t.accounts:null);
}

// ── L2c/L3b/L4b: รายได้-ค่าใช้จ่าย (P&L) ─────────────────────────
function renderNIBridge(h){
  const box=document.getElementById('niBridgeBox');
  const v=(h.decomp[periodMode]||{}).ni;
  if(!v){box.innerHTML='<div class="note">ไม่มีข้อมูลงวดเปรียบเทียบ</div>';return}
  const baseT=h.decomp[periodMode].baseT;
  const sign=x=>x>0?'+':'';
  const rawExpDelta=-v.fromExpense; // = ค่าใช้จ่ายงวดนี้ − งวดฐาน (บวก=ค่าใช้จ่ายเพิ่ม)
  box.innerHTML=`<div class="note" style="margin-bottom:8px">เทียบกับงวด ${tLab(baseT)} ${baseT}</div>
  <div class="nibridge-row">
    <div class="dcard"><div class="lbl">รายได้เปลี่ยน</div><div class="tot" style="color:${deltaColor(v.fromRevenue,'REV')}">${sign(v.fromRevenue)}${fmtM(v.fromRevenue)}</div></div>
    <div class="dcard"><div class="lbl">ค่าใช้จ่ายเปลี่ยน</div><div class="tot" style="color:${deltaColor(rawExpDelta,'EXP')}">${sign(rawExpDelta)}${fmtM(rawExpDelta)}</div></div>
    <div class="dcard"><div class="lbl">ผลสุทธิ (NI เปลี่ยน)</div><div class="tot" style="color:${v.total>0?'var(--green)':v.total<0?'var(--red)':'var(--mut)'}">${sign(v.total)}${fmtM(v.total)}</div></div>
  </div>`;
}
function renderWaterfallPL(h){
  const box=document.getElementById('wfPLBox');
  const wf=h.waterfall[periodMode];
  if(!wf){box.innerHTML='<div class="note">ไม่มีข้อมูลงวดเปรียบเทียบ</div>';return}
  box.innerHTML=`
    <div><div class="wf-title">รายได้ (REV)</div>${wfRows(wf.rev,'REV')}</div>
    <div><div class="wf-title">ค่าใช้จ่าย (EXP)</div>${wfRows(wf.exp,'EXP')}</div>`;
}
function renderTopAccPL(h){
  const t=h.topAccountsPL[periodMode];
  renderAcctTable('acctblPL', t?t.accounts:null);
}

init();
</script>
</body>
</html>
