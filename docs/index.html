<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Trend — เขตสุขภาพที่ 1</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--mut:#64748b;--line:#e2e8f0;--blue:#3b82f6;--gold:#d97706;--red:#dc2626;--green:#16a34a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
header{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:18px;font-weight:700}
header .sub{font-size:12px;color:#cbd5e1}
.bar{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--line);padding:10px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.bar label{font-size:12px;color:var(--mut);display:block;margin-bottom:2px}
.bar select,.bar input{font-family:inherit;font-size:13px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:#fff;max-width:210px}
.seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{font-family:inherit;font-size:13px;font-weight:600;padding:7px 14px;border:none;background:#fff;color:var(--mut);cursor:pointer}
.seg button.on{background:var(--ink);color:#fff}
.wrap{max-width:1280px;margin:0 auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card .t{font-size:12px;color:var(--mut)}
.card .v{font-size:22px;font-weight:700;margin-top:2px}
.card .d{font-size:12px;margin-top:2px}
.pos{color:var(--red)}.neg{color:var(--green)}.zero{color:var(--mut)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
.panel h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.panel h2::before{content:'';width:4px;height:18px;border-radius:99px;background:linear-gradient(180deg,#f59e0b,#d97706)}
.chartbox{position:relative;height:430px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;color:var(--mut);font-weight:600;text-align:right;padding:7px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
td{padding:6px 10px;border-bottom:1px solid #f1f5f9;text-align:right;white-space:nowrap}
tr.click{cursor:pointer}tr.click:hover{background:#eff6ff}
.note{font-size:12px;color:var(--mut)}
.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:10px;padding:8px 12px;font-size:12.5px}
.btn{font-family:inherit;font-size:13px;font-weight:600;padding:7px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;color:var(--ink)}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.chips{display:flex;gap:6px;flex-wrap:wrap;max-width:480px}
.chip{font-size:12px;padding:3px 10px;border-radius:99px;color:#fff;cursor:pointer}
.hm{overflow-x:auto}
.hm td{padding:5px 8px;font-size:12px;text-align:center;border:1px solid #fff;border-radius:4px}
.hm th{text-align:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.chartbox{height:340px}}
#filtToggle{display:none;margin-left:auto}
@media(max-width:768px){
  #filtToggle{display:inline-block}
  .bar:not(.open)>div:not(#presetRow){display:none}
  .bar select{max-width:150px}
  header nav{flex-basis:100%}
}
@media print{
  .bar,footer,.btn,#filtToggle,.seg{display:none!important}
  body{background:#fff}
  .wrap{max-width:100%;padding:4px}
  .panel,.card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
  .chartbox{height:340px}
  #paneTop,#paneHm{display:block!important}
  .anl .tip{border:1px solid #ddd}
  header{background:#0f172a!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
footer{padding:18px;text-align:center;font-size:12px;color:var(--mut)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:s 1s linear infinite;vertical-align:-2px}
.pb{font-family:inherit;font-size:12.5px;font-weight:600;padding:5px 12px;border:1px solid var(--line);border-radius:99px;background:#fff;cursor:pointer;color:var(--ink)}
.pb:hover{border-color:var(--blue);color:var(--blue)}
.pb.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.card.click{cursor:pointer;transition:border-color .15s,box-shadow .15s}
.card.click:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(59,130,246,.15)}
.card.actv{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
#headline{margin-bottom:10px;padding:10px 14px;border-radius:10px;font-size:14.5px;font-weight:600;line-height:1.5}
#headline.good{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
#headline.bad{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
#headline.mid{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.anl ul{padding-left:20px;display:flex;flex-direction:column;gap:7px}
.anl li{line-height:1.6;font-size:13.5px}
.anl .tip{margin-top:10px;background:#f0f9ff;border:1px solid #bae6fd;color:#075985;border-radius:10px;padding:9px 12px;font-size:13px;line-height:1.6}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <h1>📊 Financial Trend Dashboard</h1>
  <div class="sub">งบการเงินโรงพยาบาล เขตสุขภาพที่ 1 · 103 แห่ง · ปีงบ <span id="hYears"></span> · อัปเดต <span id="hUpd"></span></div>
  <nav style="margin-left:auto;display:flex;gap:14px;font-size:13px;flex-wrap:wrap">
    <a href="https://pitaknan.github.io/Risk-Score-Rh1/" target="_blank" style="color:#cbd5e1;text-decoration:none">🎯 Risk Score</a>
    <a href="https://rh1-tps-v-3-1.vercel.app" target="_blank" style="color:#cbd5e1;text-decoration:none">🏆 TPS</a>
  </nav>
</header>

<div class="bar">
  <div id="presetRow" style="flex-basis:100%;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
    <span class="note" style="font-weight:600">มุมมองด่วน:</span>
    <button id="filtToggle" class="pb" onclick="document.querySelector('.bar').classList.toggle('open')">⚙ ตัวกรองทั้งหมด</button>
  </div>
  <div><label>มุมมอง</label>
    <div class="seg">
      <button id="vBs" class="on" onclick="setView('bs')">ยอดคงเหลือสิ้นเดือน</button>
      <button id="vMv" onclick="setView('mv')">เคลื่อนไหวรายเดือน</button>
    </div>
  </div>
  <div><label>งบ</label><select id="selFin" onchange="dimChange('fin')"></select></div>
  <div><label>หมวด</label><select id="selAccg" onchange="dimChange('accg')"></select></div>
  <div><label>กลุ่ม</label><select id="selSub" onchange="dimChange('sub')"></select></div>
  <div><label>หมวดงบประมาณ</label><select id="selBud" onchange="dimChange('budget')"></select></div>
  <div><label>รายการ (GF)</label><select id="selGf" onchange="dimChange('gf')"></select></div>
  <div><label>พื้นที่</label>
    <div class="seg">
      <button id="aRegion" class="on" onclick="setArea('region')">ทั้งเขต</button>
      <button id="aProv" onclick="setArea('prov')">จังหวัด</button>
      <button id="aHosp" onclick="setArea('hosp')">โรงพยาบาล</button>
    </div>
  </div>
  <div id="entPick" style="display:none"><label id="entLab">เลือก</label><select id="selEnt" onchange="entAdd()"></select></div>
  <div><label>ความละเอียด</label>
    <div class="seg">
      <button id="gM" onclick="setGran('m')">เดือน</button>
      <button id="gQ" class="on" onclick="setGran('q')">ไตรมาส</button>
      <button id="gY" onclick="setGran('y')">ปี</button>
    </div>
  </div>
  <div><label>ช่วงเวลา</label>
    <select id="selFrom" onchange="render()"></select> – <select id="selTo" onchange="render()"></select>
  </div>
  <div style="margin-left:auto;display:flex;gap:6px"><label style="display:none">&nbsp;</label><button class="btn" onclick="copyLink(this)">🔗 คัดลอกลิงก์</button><button class="btn" onclick="window.print()">🖨 พิมพ์/PDF</button><button class="btn" onclick="exportCsv()">⬇ CSV</button></div>
  <div id="chipRow" class="chips" style="display:none;flex-basis:100%"></div>
</div>

<div class="wrap">
  <div class="warn" id="warnBox" style="display:none"></div>
  <div class="panel" style="padding:12px 16px">
    <h2>ภาพรวมทั้งเขต ทุกหมวดสำคัญ <span class="note" id="execNote"></span></h2>
    <div class="cards" id="execCards" style="grid-template-columns:repeat(auto-fit,minmax(175px,1fr))"></div>
  </div>
  <div class="cards" id="kpis"></div>
  <div class="panel"><h2 id="chartTitle"></h2>
    <div id="headline" style="display:none"></div>
    <div class="chartbox"><canvas id="mainChart"></canvas></div>
    <div class="note" id="chartNote" style="margin-top:6px"></div></div>
  <div class="panel"><h2>📝 บทวิเคราะห์อัตโนมัติ</h2><div id="analysis" class="anl"></div></div>
  <div class="panel">
    <div class="seg" style="display:inline-flex;margin-bottom:12px">
      <button id="tabTop" class="on" onclick="setTab('top')">🏆 ตารางอันดับ</button>
      <button id="tabHm" onclick="setTab('hm')">🗓 Heatmap เดือน×ปี</button>
    </div>
    <div id="paneTop">
      <h2 id="topTitle">อันดับ</h2>
      <div style="max-height:420px;overflow:auto"><table id="topTbl"></table></div>
    </div>
    <div id="paneHm" style="display:none">
      <h2>Heatmap เดือน × ปีงบ <span class="note" id="hmNote"></span></h2>
      <div class="hm"><table id="hmTbl"></table></div>
    </div>
  </div>
</div>
<footer>สำนักงานเขตสุขภาพที่ 1 · ข้อมูลจากงบทดลอง GL (DataIn) · สร้างด้วย Chart.js บน GitHub Pages</footer>

<script>
'use strict';
const TH_M=['ต.ค.','พ.ย.','ธ.ค.','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.'];
const PAL=['#3b82f6','#d97706','#16a34a','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d'];
let META=null,REGION=null,PROV=null,HOSPSUB=null;const HOSPB={};
let state={view:'bs',dim:{fin:'',accg:'หนี้สิน',sub:'',budget:'',gf:''},area:'region',ents:[],from:null,to:null,gran:'q'};
let chart=null;

const fmtM=v=>{const m=v/1e6;return (Math.abs(m)>=100?m.toLocaleString('th-TH',{maximumFractionDigits:0}):m.toLocaleString('th-TH',{maximumFractionDigits:1}))+' ลบ.'};
const fmtB=v=>v.toLocaleString('th-TH')+' บาท';
const tLab=t=>{const fy=Math.floor(t/100),fm=t%100;const by=fm<=3?fy-1:fy;return TH_M[fm-1]+String(by%100).padStart(2,'0')};
const pct=(a,b)=>b?((a-b)/Math.abs(b)*100):null;

// ---------- มุมมองด่วน (Preset) ----------
const PRESETS=[
  {ic:'💵',lb:'เงินสด',f:{budget:'1.1.1'}},
  {ic:'📥',lb:'ลูกหนี้',f:{budget:'1.1.2'}},
  {ic:'📤',lb:'เจ้าหนี้',f:{budget:'2.1.1'}},
  {ic:'🏦',lb:'หนี้สินรวม',f:{accg:'หนี้สิน'}},
  {ic:'📈',lb:'รายได้ YTD',f:{accg:'รายได้'}},
  {ic:'📉',lb:'ค่าใช้จ่าย YTD',f:{accg:'ค่าใช้จ่าย'}},
];
function presetDim(p){
  if(p.f.accg){const g=META.groups.find(g=>g.accg===p.f.accg);
    return {fin:g?g.fin:'',accg:p.f.accg,sub:'',budget:'',gf:''}}
  const g=META.groups.find(g=>g.budget.startsWith(p.f.budget));
  return g?{fin:g.fin,accg:g.accg,sub:g.sub,budget:g.budget,gf:''}:null;
}
const dimEq=(a,b)=>a&&b&&['fin','accg','sub','budget','gf'].every(k=>(a[k]||'')===(b[k]||''));
function applyPreset(i){const d=presetDim(PRESETS[i]);if(!d)return;state.dim=d;buildDims();render()}
function presetUI(){
  const row=document.getElementById('presetRow');
  if(!row.dataset.built){
    document.getElementById('filtToggle').insertAdjacentHTML('beforebegin',PRESETS.map((p,i)=>
      `<button class="pb" id="pb${i}" onclick="applyPreset(${i})">${p.ic} ${p.lb}</button>`).join(''));
    row.dataset.built='1'}
  PRESETS.forEach((p,i)=>document.getElementById('pb'+i).classList.toggle('on',dimEq(state.dim,presetDim(p))));
}
// ---------- การ์ดสรุปผู้บริหาร (ทั้งเขต ทุกงวด) ----------
function spark(vals,color){
  if(vals.length<2)return'';
  const w=110,h=26,mn=Math.min(...vals),mx=Math.max(...vals);
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-2-(v-mn)/((mx-mn)||1)*(h-4)).toFixed(1)}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8"/></svg>`;
}
function renderExecCards(){
  const el=document.getElementById('execCards');
  const html=PRESETS.map((p,i)=>{
    const d=presetDim(p);if(!d)return'';
    const gfSet=new Set(META.groups.filter(g=>(!d.fin||g.fin===d.fin)&&(!d.accg||g.accg===d.accg)&&(!d.sub||g.sub===d.sub)&&(!d.budget||g.budget===d.budget)).map(g=>g.gfId));
    const m=new Map();
    for(const r of REGION){if(!gfSet.has(r[0]))continue;m.set(r[1],(m.get(r[1])||0)+r[2])}
    const ts=[...m.keys()].sort((a,b)=>a-b);if(!ts.length)return'';
    const last=ts[ts.length-1],cur=m.get(last),py=m.get(last-100);
    const pol=POLAR[d.accg]??0;
    let badge='<span class="zero">—</span>';
    if(py!=null){const dv=cur-py,good=(dv>0)===(pol>0);
      const col=pol===0?'#64748b':good?'#16a34a':'#dc2626';
      badge=`<span style="color:${col};font-size:12px;font-weight:600">${dv>0?'▲':dv<0?'▼':''} ${Math.abs(pct(cur,py)??0).toFixed(1)}% YoY</span>`}
    const sp=spark(ts.slice(-12).map(t=>m.get(t)),'#64748b');
    const actv=dimEq(state.dim,d)?' actv':'';
    return `<div class="card click${actv}" onclick="applyPreset(${i})">
      <div class="t">${p.ic} ${p.lb}</div>
      <div class="v" style="font-size:18px">${fmtM(cur)}</div>
      <div style="display:flex;justify-content:space-between;align-items:end;gap:6px">${badge}${sp}</div></div>`;
  }).join('');
  el.innerHTML=html;
  const lastAll=META.periods[META.periods.length-1];
  document.getElementById('execNote').textContent=`— ยอด ณ ${tLab(lastAll)} เทียบปีก่อน · คลิกการ์ดเพื่อเจาะหมวดนั้น`;
}
// ---------- URL state (แชร์ลิงก์มุมมองปัจจุบัน) ----------
function writeHash(){
  const q=new URLSearchParams();const d=state.dim;
  q.set('v',state.view);q.set('g',state.gran);q.set('a',state.area);
  if(state.ents.length)q.set('e',state.ents.join('|'));
  q.set('p1',state.from);q.set('p2',state.to);
  for(const k of ['fin','accg','sub','budget','gf'])if(d[k])q.set(k,d[k]);
  history.replaceState(null,'','#'+q.toString());
}
function readHash(){
  if(!location.hash||location.hash.length<2)return;
  try{
    const q=new URLSearchParams(location.hash.slice(1));
    if(['bs','mv'].includes(q.get('v')))state.view=q.get('v');
    if(['m','q','y'].includes(q.get('g')))state.gran=q.get('g');
    if(['region','prov','hosp'].includes(q.get('a')))state.area=q.get('a');
    if(q.get('e'))state.ents=q.get('e').split('|').filter(Boolean);
    if(q.get('p1'))state.from=+q.get('p1');
    if(q.get('p2'))state.to=+q.get('p2');
    for(const k of ['fin','accg','sub','budget','gf'])if(q.get(k))state.dim[k]=q.get(k);
  }catch(e){}
}
function copyLink(b){
  navigator.clipboard.writeText(location.href).then(()=>{
    const t=b.textContent;b.textContent='✓ คัดลอกแล้ว';setTimeout(()=>b.textContent=t,1500)});
}
function syncUI(){
  document.getElementById('vBs').classList.toggle('on',state.view==='bs');
  document.getElementById('vMv').classList.toggle('on',state.view==='mv');
  for(const[id,k]of[['gM','m'],['gQ','q'],['gY','y']])document.getElementById(id).classList.toggle('on',state.gran===k);
  areaUI();
}
async function boot(){
  META=await (await fetch('data/meta.json')).json();
  REGION=await (await fetch('data/region_gf.json')).json();
  document.getElementById('hUpd').textContent=META.updated;
  const fys=[...new Set(META.periods.map(t=>Math.floor(t/100)))];
  document.getElementById('hYears').textContent=Math.min(...fys)+'–'+Math.max(...fys);
  state.from=META.periods[0];state.to=META.periods[META.periods.length-1];
  readHash();
  buildDims();buildRange();syncUI();renderExecCards();render();
}
function opt(sel,items,cur,allLabel){
  const el=document.getElementById(sel);
  el.innerHTML='<option value="">'+allLabel+'</option>'+items.map(x=>`<option ${x===cur?'selected':''}>${x}</option>`).join('');
}
function filteredGroups(d){
  return META.groups.filter(g=>(!d.fin||g.fin===d.fin)&&(!d.accg||g.accg===d.accg)&&(!d.sub||g.sub===d.sub)&&(!d.budget||g.budget===d.budget)&&(!d.gf||g.gf===d.gf));
}
// ขั้วของหมวดบัญชี: +1 = เพิ่มแล้วดี (สินทรัพย์/ทุน/รายได้), -1 = เพิ่มแล้วต้องเฝ้าระวัง (หนี้สิน/ค่าใช้จ่าย), 0 = ผสม
const POLAR={'สินทรัพย์':1,'ทุน':1,'ส่วนทุน':1,'รายได้':1,'หนี้สิน':-1,'ค่าใช้จ่าย':-1};
function polarity(){
  const accs=[...new Set(filteredGroups(state.dim).map(g=>g.accg))];
  const ps=[...new Set(accs.map(a=>POLAR[a]??0))];
  return ps.length===1?ps[0]:0;
}
// สีตามผลดี/เสีย (ลูกศร/เครื่องหมายบอกทิศทางแยกต่างหาก)
function dirCol(v){const p=polarity();
  if(v>0)return p>0?'#16a34a':p<0?'#dc2626':'#2563eb';
  if(v<0)return p>0?'#dc2626':p<0?'#16a34a':'#d97706';
  return '#64748b'}
function dirCls(v){const p=polarity();if(!v)return'zero';if(p===0)return'zero';
  return ((v>0)===(p>0))?'neg':'pos'} /* .neg=เขียว .pos=แดง ตาม CSS เดิม */
function buildDims(){
  const d=state.dim,uniq=(arr,k)=>[...new Set(arr.map(g=>g[k]))];
  opt('selFin',uniq(META.groups,'fin'),d.fin,'ทุกงบ');
  opt('selAccg',uniq(filteredGroups({fin:d.fin}),'accg'),d.accg,'ทุกหมวด');
  opt('selSub',uniq(filteredGroups({fin:d.fin,accg:d.accg}),'sub'),d.sub,'ทุกกลุ่ม');
  opt('selBud',uniq(filteredGroups({fin:d.fin,accg:d.accg,sub:d.sub}),'budget'),d.budget,'ทุกหมวดงบฯ');
  opt('selGf',uniq(filteredGroups({fin:d.fin,accg:d.accg,sub:d.sub,budget:d.budget}),'gf'),d.gf,'ทุกรายการ');
}
function dimChange(lv){
  const order=['fin','accg','sub','budget','gf'];
  state.dim[lv]=document.getElementById({fin:'selFin',accg:'selAccg',sub:'selSub',budget:'selBud',gf:'selGf'}[lv]).value;
  for(const k of order.slice(order.indexOf(lv)+1))state.dim[k]='';
  buildDims();render();
}
function buildRange(){
  const o=p=>META.periods.map(t=>`<option value="${t}" ${t===p?'selected':''}>${tLab(t)} (${Math.floor(t/100)})</option>`).join('');
  document.getElementById('selFrom').innerHTML=o(state.from);
  document.getElementById('selTo').innerHTML=o(state.to);
}
function setView(v){state.view=v;
  document.getElementById('vBs').classList.toggle('on',v==='bs');
  document.getElementById('vMv').classList.toggle('on',v==='mv');render()}
function setTab(t){
  document.getElementById('tabTop').classList.toggle('on',t==='top');
  document.getElementById('tabHm').classList.toggle('on',t==='hm');
  document.getElementById('paneTop').style.display=t==='top'?'':'none';
  document.getElementById('paneHm').style.display=t==='hm'?'':'none';
}
function setGran(g){state.gran=g;
  for(const[id,k]of[['gM','m'],['gQ','q'],['gY','y']])document.getElementById(id).classList.toggle('on',g===k);render()}
// จัดกลุ่มงวดตามความละเอียด: เดือน/ไตรมาส/ปีงบ
function buckets(periods){
  if(state.gran==='m')return periods.map(t=>({label:tLab(t),fy:Math.floor(t/100),ts:[t]}));
  const out=[];let cur=null;
  for(const t of periods){const fy=Math.floor(t/100),q=Math.ceil((t%100)/3);
    const key=state.gran==='y'?''+fy:fy+'Q'+q;
    if(!cur||cur.key!==key){cur={key,fy,ts:[],label:state.gran==='y'?'ปีงบ '+fy:'Q'+q+'/'+String(fy%100)};out.push(cur)}
    cur.ts.push(t)}
  return out;
}
// ค่าใน bucket: bs = ยอดงวดสุดท้ายที่มีข้อมูล, inc/dec = ผลรวม
function bVal(s,b){
  let bs=null,inc=0,dec=0,has=false;
  for(const t of b.ts){const o=s.m.get(t);if(!o)continue;has=true;inc+=o.inc;dec+=o.dec;bs=o.bs}
  return has?{bs,inc,dec}:null;
}
function entList(a){
  return a==='prov'?[...new Set(META.orgs.map(o=>o.prov))].sort((x,y)=>x.localeCompare(y,'th'))
    :META.orgs.slice().sort((x,y)=>x.name.localeCompare(y.name,'th')).map(o=>o.id);
}
function areaUI(){ // sync ปุ่ม/ตัวเลือกพื้นที่ตาม state (ไม่แตะ state)
  const a=state.area;
  for(const[id,k]of[['aRegion','region'],['aProv','prov'],['aHosp','hosp']])document.getElementById(id).classList.toggle('on',a===k);

    entList(a).map(e=>`<option value="${e}">${a==='prov'?e:orgName(e)}</option>`).join('');
}
function setArea(a){
  state.area=a;
  state.ents=a==='region'?[]:[entList(a)[0]];
  areaUI();render();
}
const orgName=id=>{const o=META.orgs.find(o=>o.id===id);return o?o.name:id};
function entAdd(){
  const v=document.getElementById('selEnt').value;if(!v)return;
  const max=state.area==='prov'?8:6;
  if(!state.ents.includes(v)){state.ents.push(v);if(state.ents.length>max)state.ents.shift()}
  document.getElementById('selEnt').value='';render()}
function entDel(v){state.ents=state.ents.filter(e=>e!==v);if(!state.ents.length)state.area==='prov'?state.ents=[]:null;render()}

async function ensureData(){
  if(state.area==='prov'&&!PROV)PROV=await (await fetch('data/prov_gf.json')).json();
  if(state.area==='hosp'){
    const d=state.dim;
    if(d.budget||d.gf){
      const g=filteredGroups(d)[0];if(g&&!(g.bId in HOSPB))HOSPB[g.bId]=await (await fetch(`data/hosp/b${g.bId}.json`)).json();
    } else if(!HOSPSUB)HOSPSUB=await (await fetch('data/hosp_sub.json')).json();
  }
}
// รวม records [id,t,bs,inc,dec] ตาม filter → Map t→{bs,inc,dec}
function sumSeries(recs,idSet){
  const m=new Map();
  for(const r of recs){
    if(idSet&&!idSet.has(r[0]))continue;
    const t=r[1];if(t<state.from||t>state.to)continue;
    let o=m.get(t);if(!o){o={bs:0,inc:0,dec:0};m.set(t,o)}
    o.bs+=r[2];o.inc+=r[3];o.dec+=r[4];
  }return m;
}
function seriesFor(ent){ // ent=null → ทั้งเขต
  const gs=filteredGroups(state.dim);
  const gfSet=new Set(gs.map(g=>g.gfId));
  if(state.area==='region')return sumSeries(REGION,gfSet);
  if(state.area==='prov')return sumSeries(PROV[ent]||[],gfSet);
  const d=state.dim;
  if(d.budget||d.gf){const b=gs[0]?HOSPB[gs[0].bId]:null;return sumSeries(b?b[ent]||[]:[],gfSet)}
  const sSet=new Set(gs.map(g=>g.sId));return sumSeries(HOSPSUB[ent]||[],sSet);
}
function dimLabel(){
  const d=state.dim;
  return d.gf||d.budget||d.sub||d.accg||d.fin||'ทุกหมวดบัญชี';
}
async function render(){
  state.from=+document.getElementById('selFrom').value||state.from;
  state.to=+document.getElementById('selTo').value||state.to;
  if(state.from>state.to)[state.from,state.to]=[state.to,state.from];
  await ensureData();
  const periods=META.periods.filter(t=>t>=state.from&&t<=state.to);
  const ents=state.area==='region'?[null]:state.ents;
  const series=ents.map(e=>({ent:e,m:seriesFor(e)}));
  renderChips();renderWarn(periods);renderKpis(series[0],periods);
  renderHeadline(series[0],periods);
  renderChart(series,periods);renderTop(periods);renderHeat(series[0]);renderAnalysis(series,periods);
  presetUI();renderExecCards();writeHash();
}
function renderChips(){
  const row=document.getElementById('chipRow');
  if(state.area==='region'||!state.ents.length){row.style.display='none';return}
  row.style.display='';
  row.innerHTML=state.ents.map((e,i)=>`<span class="chip" style="background:${PAL[i%PAL.length]}" onclick="entDel('${e}')">${state.area==='prov'?e:orgName(e)} ✕</span>`).join('');
}
function renderWarn(periods){
  const f=META.flagged.filter(t=>t>=state.from&&t<=state.to);
  const box=document.getElementById('warnBox');
  if(!f.length){box.style.display='none';return}
  const fys=[...new Set(f.map(t=>Math.floor(t/100)))].join(', ');
  box.style.display='';
  box.textContent=`⚠ ปีงบ ${fys} ข้อมูลต้นทางอาจไม่ครบ (ไฟล์ Excel ถูกตัดที่ 1,048,575 แถว) — ตัวเลขในช่วงดังกล่าวอาจต่ำกว่าจริง`;
}
function renderKpis(s0,periods){
  const el=document.getElementById('kpis');if(!s0){el.innerHTML='';return}
  const last=periods[periods.length-1],prev=periods[periods.length-2],yoy=last-100;
  const g=t=>s0.m.get(t);
  const cur=g(last),pv=g(prev),py=g(yoy);
  const dd=(v,b)=>{if(v==null||b==null)return'<span class="zero">—</span>';
    const d=v-b,p=pct(v,b);
    return `<span style="color:${dirCol(d)}">${d>0?'▲':d<0?'▼':''} ${fmtM(Math.abs(d))}${p!=null?' ('+Math.abs(p).toFixed(1)+'%)':''}</span>`};
  const nets=periods.slice(-12).map(t=>g(t)?.['inc']??0).reduce((a,b)=>a+b,0);
  const netd=periods.slice(-12).map(t=>g(t)?.['dec']??0).reduce((a,b)=>a+b,0);
  const p12=periods.slice(-12);
  el.innerHTML=`
   <div class="card"><div class="t">ยอดคงเหลือ ${tLab(last)} ปีงบ ${Math.floor(last/100)}</div><div class="v">${cur?fmtM(cur.bs):'—'}</div><div class="d note">${dimLabel()}</div></div>
   <div class="card"><div class="t">เทียบเดือนก่อน (MoM)</div><div class="v" style="font-size:17px">${dd(cur?.bs,pv?.bs)}</div><div class="d note">${tLab(last)} vs ${prev?tLab(prev):'—'}</div></div>
   <div class="card"><div class="t">เทียบปีก่อน (YoY)</div><div class="v" style="font-size:17px">${dd(cur?.bs,py?.bs)}</div><div class="d note">${tLab(last)} vs ${tLab(yoy)}</div></div>
   <div class="card"><div class="t">เคลื่อนไหว 12 เดือนล่าสุด</div><div class="v" style="font-size:17px"><span style="color:${dirCol(1)}">▲ ${fmtM(nets)}</span> / <span style="color:${dirCol(-1)}">▼ ${fmtM(Math.abs(netd))}</span></div><div class="d note">เพิ่ม / ลด สะสม ช่วง ${tLab(p12[0])}–${tLab(last)} (สี = ผลดี/เฝ้าระวัง)</div></div>`;
}
function fySummary(s0,periods){
  // สรุปต่อปีงบ: mv = Σ เคลื่อนไหวสุทธิทั้งปี | bs = Δ ยอดคงเหลือจากงวดสุดท้ายของปีก่อน
  const byFy=new Map();
  for(const t of periods){const fy=Math.floor(t/100);
    if(!byFy.has(fy))byFy.set(fy,{net:0,lastBs:null,lastT:0});
    const o=s0.m.get(t);if(!o)continue;const e=byFy.get(fy);
    e.net+=o.inc+o.dec;if(t>e.lastT){e.lastT=t;e.lastBs=o.bs}}
  const fys=[...byFy.keys()].sort();const out=new Map();
  fys.forEach((fy,i)=>{const e=byFy.get(fy);
    if(state.view==='mv')out.set(fy,{v:e.net,vs:'รวมทั้งปี'});
    else{const pe=i>0?byFy.get(fys[i-1]):null;
      out.set(fy,(pe&&pe.lastBs!=null&&e.lastBs!=null)
        ?{v:e.lastBs-pe.lastBs,vs:`${tLab(e.lastT)} vs ${tLab(pe.lastT)}`}
        :{v:null,vs:''})}});
  return out;
}
function fyPlugin(bks,sums){
  return {id:'fyMark',afterDraw(c){
    const xs=c.scales.x,ys=c.scales.y;if(!xs||!ys)return;const ctx=c.ctx;ctx.save();
    // เส้นประกั้นปีงบ (ข้ามในโหมดรายปี — ทุกแท่งคือคนละปีอยู่แล้ว)
    const bounds=[0];
    for(let i=1;i<bks.length;i++)if(bks[i].fy!==bks[i-1].fy){
      bounds.push(i);
      if(state.gran!=='y'){
        const x=(xs.getPixelForValue(i-1)+xs.getPixelForValue(i))/2;
        ctx.strokeStyle='#cbd5e1';ctx.setLineDash([4,4]);ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(x,ys.top);ctx.lineTo(x,ys.bottom);ctx.stroke()}}
    bounds.push(bks.length);
    // ป้ายสรุปรายปี 3 บรรทัด: ปีงบ / คู่เทียบ (ก.ย.66 vs ก.ย.65) / ค่า
    if(sums){ctx.setLineDash([]);ctx.textAlign='center';
      for(let b=0;b<bounds.length-1;b++){
        const i0=bounds[b],i1=bounds[b+1]-1;if(i1<i0)continue;
        const fy=bks[i0].fy,o=sums.get(fy);
        const x0=xs.getPixelForValue(i0),x1=xs.getPixelForValue(i1);
        if(x1-x0<46&&state.gran==='m')continue;
        if(x1-x0<30)continue;
        const cx=(x0+x1)/2;
        ctx.font='600 11px Sarabun';ctx.fillStyle='#475569';
        ctx.fillText(state.gran==='y'?String(fy):'ปีงบ '+fy,cx,ys.top-34);
        if(o&&o.vs&&x1-x0>=78){ctx.font='10px Sarabun';ctx.fillStyle='#94a3b8';
          ctx.fillText(o.vs,cx,ys.top-22)}
        if(!o||o.v==null)continue;
        ctx.font='600 11px Sarabun';ctx.fillStyle=dirCol(o.v);
        ctx.fillText((o.v>0?'▲ +':o.v<0?'▼ −':'')+fmtM(Math.abs(o.v)),cx,ys.top-8)}}
    ctx.restore()}};
}
// แถบสรุปสั้นภาษาคน เหนือกราฟ
function renderHeadline(s0,periods){
  const el=document.getElementById('headline');
  if(!s0||periods.length<2){el.style.display='none';return}
  const last=periods[periods.length-1],prev=periods[periods.length-2];
  const cur=s0.m.get(last),pv=s0.m.get(prev),py=s0.m.get(last-100);
  if(!cur){el.style.display='none';return}
  const p=polarity();
  const dM=pv?cur.bs-pv.bs:null,dY=py?cur.bs-py.bs:null;
  const w=v=>v>0?'เพิ่มขึ้น':v<0?'ลดลง':'ทรงตัว';
  const entName=state.area==='region'?'ทั้งเขต':(state.area==='prov'?'จ.'+(state.ents[0]??''):orgName(state.ents[0]??''));
  let txt=`${dimLabel()} (${entName}) ล่าสุด ${tLab(last)} = ${fmtM(cur.bs)}`;
  if(dM!=null)txt+=` · ${w(dM)} ${fmtM(Math.abs(dM))} (${tLab(last)} vs ${tLab(prev)})`;
  if(dY!=null)txt+=` · ${w(dY)} ${fmtM(Math.abs(dY))} (${tLab(last)} vs ${tLab(last-100)})`;
  let cls='mid',ico='ℹ️';
  const ref=dY??dM;
  if(p!==0&&ref){const good=(ref>0)===(p>0);cls=good?'good':'bad';ico=good?'✅':'⚠️'}
  el.className='';el.id='headline';el.classList.add(cls);
  el.style.display='';el.textContent=`${ico} สรุปสั้น: ${txt}`;
}
function renderChart(series,periods){
  const flag=new Set(META.flagged);
  const bks=buckets(periods);
  const labels=bks.map(b=>b.label);
  const bFlag=bks.map(b=>b.ts.some(t=>flag.has(t)));
  const granW={m:'รายเดือน',q:'รายไตรมาส',y:'รายปีงบ'}[state.gran];
  const title=state.view==='bs'?`เทรนยอดคงเหลือ (${granW})`:`การเคลื่อนไหวเพิ่ม/ลด (${granW})`;
  document.getElementById('chartTitle').textContent=`${title} — ${dimLabel()} (${state.area==='region'?'รวมทั้งเขต':state.area==='prov'?'รายจังหวัด':'รายโรงพยาบาล'})`;
  const vals=series.map(s=>bks.map(b=>bVal(s,b)));
  let ds=[];
  if(state.view==='bs'){
    ds=series.map((s,i)=>({type:'line',label:s.ent?(state.area==='prov'?s.ent:orgName(s.ent)):'ทั้งเขต',
      data:vals[i].map(v=>v?v.bs:null),borderColor:PAL[i%PAL.length],backgroundColor:PAL[i%PAL.length],
      borderWidth:state.gran==='m'?2:2.5,pointRadius:bks.length>40?0:state.gran==='m'?2.5:4,
      pointStyle:bFlag.map(f=>f?'triangle':'circle'),tension:.25,spanGaps:false}));
  }else if(series.length===1){
    ds=[{type:'bar',label:'เพิ่มขึ้น',data:vals[0].map(v=>v?v.inc:null),backgroundColor:dirCol(1)+'99'},
        {type:'bar',label:'ลดลง',data:vals[0].map(v=>v?v.dec:null),backgroundColor:dirCol(-1)+'99'},
        {type:'line',label:'สุทธิ',data:vals[0].map(v=>v?v.inc+v.dec:null),borderColor:'#0f172a',borderWidth:2,pointRadius:state.gran==='m'?0:3,tension:.2}];
  }else{
    ds=series.map((s,i)=>({type:'bar',label:s.ent?(state.area==='prov'?s.ent:orgName(s.ent)):'ทั้งเขต',
      data:vals[i].map(v=>v?v.inc+v.dec:null),backgroundColor:PAL[i%PAL.length]+'cc'}));
  }
  if(chart)chart.destroy();
  // ป้ายรายปี: bs = Δ เทียบสิ้นปีก่อน, mv = สุทธิรวมปี (คำนวณจากข้อมูลรายเดือนเสมอ)
  const sums=series.length===1?fySummary(series[0],periods):null;
  chart=new Chart(document.getElementById('mainChart'),{data:{labels,datasets:ds},
   plugins:[fyPlugin(bks,sums)],options:{
    responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    layout:{padding:{top:48}},
    scales:{x:{ticks:{maxRotation:60,autoSkip:true,font:{family:'Sarabun',size:state.gran==='m'?11:12.5}},stacked:state.view==='mv'&&series.length===1},
      y:{stacked:state.view==='mv'&&series.length===1,ticks:{font:{family:'Sarabun'},callback:v=>fmtM(v)}}},
    plugins:{legend:{position:'bottom',labels:{font:{family:'Sarabun'},boxWidth:14,padding:12}},tooltip:{titleFont:{family:'Sarabun'},bodyFont:{family:'Sarabun'},
      callbacks:{label:c=>`${c.dataset.label}: ${fmtB(c.parsed.y??0)}`,
        title:items=>{const b=bks[items[0].dataIndex];
          return b.label+(state.gran==='y'?'':' ปีงบ '+b.fy)+(bFlag[items[0].dataIndex]?'  ⚠ ข้อมูลอาจไม่ครบ':'')}}}}}});
  const p=polarity();
  const colorNote=p===0?'มุมมองนี้รวมหลายหมวดที่ทิศทางดี/เสียต่างกัน → ใช้สีกลาง (น้ำเงิน=เพิ่ม, ส้ม=ลด)'
    :`สี: เขียว = ทิศทางที่ดี, แดง = ควรเฝ้าระวัง (หมวดนี้ "${p>0?'เพิ่มขึ้น = ดี':'ลดลง = ดี'}")`;
  document.getElementById('chartNote').textContent=(state.view==='mv'
    ?'แท่งบน = เพิ่มขึ้น · แท่งล่าง = ลดลง · เส้นดำ = สุทธิ · ป้ายบนกราฟ = เคลื่อนไหวสุทธิรวมทั้งปีงบ'
    :'ป้ายบนกราฟ = เปลี่ยนแปลงเทียบสิ้นปีงบก่อนหน้า (ก.ย. vs ก.ย.) · ▲ สามเหลี่ยม = งวดที่ข้อมูลต้นทางอาจไม่ครบ')
    +(state.gran!=='m'?' · จุดสุดท้ายของช่วงที่ยังไม่จบ = ยอด ณ เดือนล่าสุดที่มีข้อมูล':'')
    +' · เส้นประแนวตั้ง = รอยต่อปีงบ (ก.ย.|ต.ค.) · '+colorNote
    +' · 💡 ดูภาพรวมง่ายสุด: กดความละเอียด "ปี" ก่อน แล้วค่อยซูมลง "ไตรมาส/เดือน"';
}
function renderTop(periods){
  const last=periods[periods.length-1],prev=periods[periods.length-2];
  const tbl=document.getElementById('topTbl'),title=document.getElementById('topTitle');
  const gs=filteredGroups(state.dim),gfSet=new Set(gs.map(g=>g.gfId));
  let rows=[];
  if(state.area!=='hosp'){
    // จัดอันดับกลุ่มบัญชีภายใน filter (ระดับถัดลงไป)
    const d=state.dim;
    const lvl=d.budget?'gf':d.sub?'budget':d.accg?'sub':d.fin?'accg':'accg';
    const keyOf=g=>g[lvl];
    const recs=state.area==='region'?REGION:(state.ents.length?PROV[state.ents[0]]:[]);
    const byG=new Map();
    const gMap=new Map(gs.map(g=>[g.gfId,keyOf(g)]));
    for(const r of recs){if(!gfSet.has(r[0]))continue;
      const k=gMap.get(r[0]);let o=byG.get(k);if(!o){o={cur:0,prev:0};byG.set(k,o)}
      if(r[1]===last)o.cur+=r[2];if(r[1]===prev)o.prev+=r[2]}
    rows=[...byG.entries()].map(([k,o])=>({name:k,cur:o.cur,d:o.cur-o.prev}))
      .sort((a,b)=>Math.abs(b.cur)-Math.abs(a.cur)).slice(0,15);
    title.textContent=`อันดับตามยอดคงเหลือ ${tLab(last)}${state.area==='prov'&&state.ents.length?' — '+state.ents[0]:''}`;
    tbl.innerHTML=`<tr><th>กลุ่ม</th><th>ยอดคงเหลือ ${tLab(last)}</th><th>Δ (${tLab(last)} vs ${tLab(prev)})</th></tr>`+
      rows.map(r=>`<tr class="click" onclick="drill('${lvl}','${r.name.replace(/'/g,"\\'")}')"><td>${r.name}</td><td>${fmtM(r.cur)}</td><td class="${dirCls(r.d)}">${r.d>0?'▲ +':r.d<0?'▼ −':''}${fmtM(Math.abs(r.d))}</td></tr>`).join('');
  }else{
    const d=state.dim,useB=d.budget||d.gf;
    const src=useB?(gs[0]?HOSPB[gs[0].bId]:{}):HOSPSUB;
    const idSet=useB?gfSet:new Set(gs.map(g=>g.sId));
    rows=META.orgs.map(o=>{let cur=0,pv=0;
      for(const r of (src?.[o.id]||[])){if(!idSet.has(r[0]))continue;if(r[1]===last)cur+=r[2];if(r[1]===prev)pv+=r[2]}
      return {id:o.id,name:o.name,cur,d:cur-pv}}).filter(r=>r.cur||r.d)
      .sort((a,b)=>Math.abs(b.cur)-Math.abs(a.cur)).slice(0,20);
    title.textContent=`อันดับโรงพยาบาล ${tLab(last)} — ${dimLabel()}`;
    tbl.innerHTML=`<tr><th>โรงพยาบาล</th><th>ยอดคงเหลือ ${tLab(last)}</th><th>Δ (${tLab(last)} vs ${tLab(prev)})</th></tr>`+
      rows.map(r=>`<tr class="click" onclick="hospPick('${r.id}')"><td>${r.name}</td><td>${fmtM(r.cur)}</td><td class="${dirCls(r.d)}">${r.d>0?'▲ +':r.d<0?'▼ −':''}${fmtM(Math.abs(r.d))}</td></tr>`).join('');
  }
}
function drill(lvl,val){state.dim[lvl]=val;
  const order=['fin','accg','sub','budget','gf'];
  for(const k of order.slice(order.indexOf(lvl)+1))state.dim[k]='';
  buildDims();render()}
function hospPick(id){if(!state.ents.includes(id)){state.ents.push(id);if(state.ents.length>6)state.ents.shift()}render()}
function renderHeat(s0){
  const tbl=document.getElementById('hmTbl');if(!s0){tbl.innerHTML='';return}
  document.getElementById('hmNote').textContent=state.view==='bs'?'(ยอดคงเหลือ)':'(เคลื่อนไหวสุทธิ)';
  const fys=[...new Set(META.periods.filter(t=>t>=state.from&&t<=state.to).map(t=>Math.floor(t/100)))];
  const vals=[];const get=t=>{const o=s0.m.get(t);if(!o)return null;return state.view==='bs'?o.bs:o.inc+o.dec};
  for(const fy of fys)for(let m=1;m<=12;m++){const v=get(fy*100+m);if(v!=null)vals.push(v)}
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const p=polarity();
  const upRGB=p>0?'22,163,74':p<0?'220,38,38':'37,99,235';
  const dnRGB=p>0?'220,38,38':p<0?'22,163,74':'217,119,6';
  const color=v=>{if(v==null)return'#f8fafc';
    if(state.view==='mv'){const a=Math.min(1,Math.abs(v)/(Math.max(Math.abs(mn),Math.abs(mx))||1));
      return v>=0?`rgba(${upRGB},${.12+.55*a})`:`rgba(${dnRGB},${.12+.55*a})`}
    const a=(v-mn)/((mx-mn)||1);return `rgba(59,130,246,${.08+.6*a})`};
  tbl.innerHTML='<tr><th>ปีงบ</th>'+TH_M.map(m=>`<th>${m}</th>`).join('')+'</tr>'+
    fys.map(fy=>'<tr><td style="font-weight:600;text-align:left">'+fy+'</td>'+
      Array.from({length:12},(_,i)=>{const v=get(fy*100+i+1);
        return `<td style="background:${color(v)}" title="${v!=null?fmtB(v):'ไม่มีข้อมูล'}">${v!=null?(v/1e6).toFixed(0):'–'}</td>`}).join('')+'</tr>').join('');
}
// ---------- บทวิเคราะห์อัตโนมัติ ----------
const ACC_TIP={
 'หนี้สิน':'หนี้สินที่เพิ่มขึ้นต่อเนื่องสะท้อนภาระเจ้าหนี้ (การค้า/ยา/เวชภัณฑ์) ที่สูงขึ้น ซึ่งกดดันสภาพคล่องและ Cash Ratio — หากลดลงแสดงถึงความสามารถในการชำระหนี้ที่ดีขึ้น ควรดูคู่กับเงินสดคงเหลือว่าการจ่ายหนี้ไม่ได้ทำให้เงินสดตึงตัวเกินไป',
 'สินทรัพย์':'สินทรัพย์ (โดยเฉพาะเงินสดและรายการเทียบเท่า) ที่เพิ่มขึ้นช่วยเสริมสภาพคล่อง — หากลดลงต่อเนื่องควรแยกสาเหตุ: จ่ายชำระหนี้ (ดี ถ้าหนี้ลดตาม), ลงทุนในครุภัณฑ์ (ดูงบลงทุนประกอบ) หรือรายได้รับจริงต่ำกว่าค่าใช้จ่าย (สัญญาณเตือน)',
 'ทุน':'ส่วนทุนสะท้อนฐานะสุทธิสะสมของหน่วยบริการ การลดลงต่อเนื่องหมายถึงผลการดำเนินงานขาดทุนสะสม ควรเชื่อมโยงกับ NI/EBITDA ในระบบ Risk Score',
 'รายได้':'ยอดรายได้เป็นแบบสะสมตั้งแต่ต้นปีงบ (YTD รีเซ็ตทุก ต.ค.) ควรเทียบช่วงเดียวกันปีก่อน (YoY) และเทียบแผน Planfin — รายได้ที่โตช้ากว่าค่าใช้จ่ายคือสัญญาณกดดัน EBITDA',
 'ค่าใช้จ่าย':'ยอดค่าใช้จ่ายเป็นแบบสะสม YTD (รีเซ็ตทุก ต.ค.) หมวดที่ควรเฝ้าระวังคือ ค่าแรง (LC) ยา และวัสดุ — หากโตเร็วกว่ารายได้จะกดดัน EBITDA/NI โดยตรง'};
function renderAnalysis(series,periods){
  const el=document.getElementById('analysis');
  const s0=series[0];
  if(!s0||periods.length<2){el.innerHTML='<span class="note">ข้อมูลไม่พอสำหรับวิเคราะห์</span>';return}
  const p=polarity();
  const entName=state.area==='region'?'ภาพรวมทั้งเขต':(state.area==='prov'?'จังหวัด'+(state.ents[0]??''):'รพ.'+(orgName(state.ents[0]??'')));
  const get=t=>s0.m.get(t);
  const last=periods[periods.length-1],cur=get(last),prev=get(periods[periods.length-2]),py=get(last-100);
  const dirW=v=>v>0?'เพิ่มขึ้น':v<0?'ลดลง':'ทรงตัว';
  const judge=v=>{if(!v||p===0)return'';
    return ((v>0)===(p>0))?' <b style="color:#16a34a">✓ ทิศทางที่ดี</b>':' <b style="color:#dc2626">⚠ ควรเฝ้าระวัง</b>'};
  const B=[];
  // 1) สถานะล่าสุด + MoM
  if(cur){let s=`<b>${dimLabel()}</b> (${entName}) ณ <b>${tLab(last)} ปีงบ ${Math.floor(last/100)}</b> มียอดคงเหลือ <b>${fmtM(cur.bs)}</b>`;
    if(prev){const d=cur.bs-prev.bs;s+=` ${dirW(d)} ${fmtM(Math.abs(d))} หรือ ${Math.abs(pct(cur.bs,prev.bs)??0).toFixed(1)}% (${tLab(last)} vs ${tLab(periods[periods.length-2])})${judge(d)}`}
    B.push(s)}
  // 2) YoY
  if(cur&&py){const d=cur.bs-py.bs;
    B.push(`เทียบช่วงเดียวกันปีก่อน ${dirW(d)} <b>${fmtM(Math.abs(d))}</b> หรือ ${Math.abs(pct(cur.bs,py.bs)??0).toFixed(1)}% (${tLab(last)} vs ${tLab(last-100)})${judge(d)}`)}
  // 3) แนวโน้มต่อเนื่อง (streak ไม่ข้ามปีงบ เพราะหมวด P&L รีเซ็ต YTD)
  let st=0,dir=0;
  for(let i=periods.length-1;i>0;i--){
    if(Math.floor(periods[i]/100)!==Math.floor(periods[i-1]/100))break;
    const a=get(periods[i]),b=get(periods[i-1]);if(!a||!b)break;
    const d=Math.sign(a.bs-b.bs);if(!d)break;if(!dir)dir=d;if(d!==dir)break;st++}
  if(st>=3)B.push(`ยอดคงเหลือ${dirW(dir)}ติดต่อกัน <b>${st} เดือน</b> ในปีงบนี้${judge(dir)}`);
  // 4) สะสมปีงบปัจจุบัน
  const fyNow=Math.floor(last/100),inFy=periods.filter(t=>Math.floor(t/100)===fyNow);
  const sum=k=>inFy.reduce((a,t)=>{const o=get(t);return a+(o?o[k]:0)},0);
  const inc=sum('inc'),dec=sum('dec'),net=inc+dec;
  B.push(`ปีงบ ${fyNow} (${inFy.length} เดือนที่มีข้อมูล) เคลื่อนไหวเพิ่มสะสม <b>${fmtM(inc)}</b> ลดสะสม <b>${fmtM(Math.abs(dec))}</b> สุทธิ${dirW(net)} <b>${fmtM(Math.abs(net))}</b>${judge(net)}`);
  // 5) เดือนเคลื่อนไหวแรงสุดรอบ 12 เดือน
  let mx=null;
  for(const t of periods.slice(-12)){const o=get(t);if(!o)continue;const n=o.inc+o.dec;
    if(!mx||Math.abs(n)>Math.abs(mx.n))mx={t,n}}
  if(mx&&mx.n)B.push(`รอบ 12 เดือนล่าสุด เดือนที่เคลื่อนไหวสุทธิแรงสุดคือ <b>${tLab(mx.t)}</b> (${dirW(mx.n)} ${fmtM(Math.abs(mx.n))}) — ควรทราบเหตุการณ์เบื้องหลัง เช่น การจัดสรรงบ/จ่ายหนี้ก้อนใหญ่`);
  // 6) ฤดูกาล
  const mSum=Array(12).fill(0),mCnt=Array(12).fill(0);
  for(const t of periods){const o=get(t);if(!o)continue;mSum[t%100-1]+=o.inc+o.dec;mCnt[t%100-1]++}
  let bi=-1,bv=0;
  for(let i=0;i<12;i++){if(!mCnt[i])continue;const a=Math.abs(mSum[i]/mCnt[i]);if(a>bv){bv=a;bi=i}}
  if(bi>=0&&bv)B.push(`เชิงฤดูกาล: เดือนที่มักเคลื่อนไหวแรงสุดในรอบหลายปีคือ <b>${TH_M[bi]}</b> (สุทธิเฉลี่ย ${dirW(mSum[bi])} ${fmtM(Math.abs(mSum[bi]/mCnt[bi]))}/ปี)${bi===11?' สอดคล้องกับการเร่งเบิกจ่าย/ปรับปรุงบัญชีปลายปีงบ':''}`);
  // 7) เปรียบเทียบหลายพื้นที่
  if(series.length>1){
    const rk=series.map(s=>{const a=s.m.get(last),b=s.m.get(last-100);
      return {n:s.ent?(state.area==='prov'?s.ent:orgName(s.ent)):'ทั้งเขต',bs:a?a.bs:null,g:a&&b?pct(a.bs,b.bs):null}})
      .filter(r=>r.bs!=null);
    if(rk.length>1){
      const hi=[...rk].sort((a,b)=>Math.abs(b.bs)-Math.abs(a.bs))[0];
      const fast=[...rk].filter(r=>r.g!=null).sort((a,b)=>Math.abs(b.g)-Math.abs(a.g))[0];
      let s=`ในกลุ่มที่เลือก ยอดสูงสุดคือ <b>${hi.n}</b> (${fmtM(hi.bs)})`;
      if(fast)s+=` และเปลี่ยนแปลง YoY แรงสุดคือ <b>${fast.n}</b> (${fast.g>0?'+':''}${fast.g.toFixed(1)}%)${judge(fast.g)}`;
      B.push(s)}}
  // 8) คุณภาพข้อมูล
  const fl=META.flagged.filter(t=>t>=state.from&&t<=state.to);
  if(fl.length){const fys=[...new Set(fl.map(t=>Math.floor(t/100)))].join(', ');
    B.push(`<span class="note">⚠ ข้อจำกัดข้อมูล: ปีงบ ${fys} มาจากไฟล์ที่ถูกตัดแถว ตัวเลขอาจต่ำกว่าจริง — การเทียบข้ามช่วงนี้ให้ใช้ความระมัดระวัง (ยกเว้น ก.ย. 2568 ซึ่งใช้ข้อมูลสมบูรณ์จากไฟล์ปีถัดไป)</span>`)}
  // 9) คำแนะนำเชิงหมวดบัญชี
  const accs=[...new Set(filteredGroups(state.dim).map(g=>g.accg))];
  const tip=accs.length===1?ACC_TIP[accs[0]]:
    'มุมมองนี้รวมหลายหมวดบัญชีที่ทิศทางดี/เสียต่างกัน (เช่น สินทรัพย์เพิ่ม = ดี แต่หนี้สินเพิ่ม = ต้องเฝ้าระวัง) แนะนำเลือกเจาะรายหมวดจากช่อง "หมวด" เพื่อให้บทวิเคราะห์และสีแปลผลได้แม่นยำ';
  el.innerHTML='<ul>'+B.map(b=>`<li>${b}</li>`).join('')+'</ul>'
    +(tip?`<div class="tip">💡 <b>การแปลผลหมวดนี้:</b> ${tip}</div>`:'');
}
function exportCsv(){
  const periods=META.periods.filter(t=>t>=state.from&&t<=state.to);
  const ents=state.area==='region'?[null]:state.ents;
  let csv='﻿งวด,ปีงบ,เดือน,'+ents.map(e=>{const n=e?(state.area==='prov'?e:orgName(e)):'ทั้งเขต';
    return `"${n} ยอดคงเหลือ","${n} เพิ่ม","${n} ลด"`}).join(',')+'\n';
  const ss=ents.map(e=>seriesFor(e));
  for(const t of periods){csv+=`${t},${Math.floor(t/100)},${tLab(t)},`+
    ss.map(m=>{const o=m.get(t);return o?`${o.bs},${o.inc},${o.dec}`:',,'}).join(',')+'\n'}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`fin-trend_${dimLabel()}_${state.from}-${state.to}.csv`;a.click();
}
boot();
